title": "목) 해야할 업무", "content": "팀서화에 받을 자료\n- 정선영 선생님 촬영 가이드: 10/3(금) 받고 선생님께 전달\n- 무빙 포스터\n- 정재승 교수님 계약서 컨펌 여부\n  품의서 미리 작성해놓기\n- 다마스 기획\n\n팀서화에 확인할 거\n- 언제까지 진행 대로변 건물, 다마스 10월 10일에 진행 예정 \n\n내가 할 일\n- 정재승 교수 지출결의 세팅\n-  \n- 9월 판촉물 재고현황 보고\n- 굿즈안 정리해 추가 정리하기\n\n\n수기공모전\n \n==========================\n\n1) KCS 인스타:14일(화)에 19일(일) 초청하는 구구절절한 DM를 보낸다.\n2) 촬영: 전경 10.15(수) / 200\n           피플 10.19(일) / 60\n3) 품의 틀 작성 \n4) 구구절절 \n\n=========================\n[완료]\n- 대상 2명 초대하였는지ㅇ/상장과 돈은 교육지원팀에 주기로 (월요일에 다 주기)\n\n\n사진 작가 컨택 /", "category": "기타", "tags": []}, {"id": 56, "filename": "251013(월) 이사님 미팅.txt", "date": "2025-10-13", "title": "월) 이사님 미팅", "content": "9\n- 네이버 플레이스 세팅 KCS (김윤진대표한테 요청) 기획안이 간단히 들어가있으면 좋을 것 같다\n- 기안을 올리면 좋을 것 같다 (네이버 플레이스 / 홍보 키워드 돌리기 / \n 볼펜까지해서 다시 쭉 받으면 좋을 것 같고\n- 네이버 스토어 \n- 전시초대장: 오시는 분 PR\n  콘텍할만한 채널을 정리\n\n- 정선영 선생님 지금 중 올리기 \n- 굿즈: 고리 다르게 해서 디자인 시안 다시 받기\n\n\n카카오톡 리스트업하기\n\n굿즈 OPP \n\n좀마", "category": "미팅", "tags": []}, {"id": 57, "filename": "251015(수) 회의 사항.txt", "date": "2025-10-15", "title": "수) 회의 사항", "content": "- 훈희: 90 내일 두명 / 영상까지 \n- 강효임: 책정리 오고 있음\n-", "category": "회의", "tags": []}, {"id": 58, "filename": "251020(월) 팀서화-금성출판사 미팅.txt", "date": "2025-10-20", "title": "월) 팀서화-금성출판사 미팅", "content": "1/WBS \n2/반영되었으면 좋겠다 싶은 부분\n\n*대로변건물\n야간 책장이 제대로 보이지 않음\n주간 붙여놨더니 잘 안보인다\n서화: 1. 컬러풀하게 네온색상으로 해본다. 단, 현 검정유리를 교체해야 하는데 비용이 들기에 회사에서 논의해야봐야 한다 > 네온은 폐기한다\n        2. 조명을 세게 쎄게 쓰는 걸 \n>> 조명 더 많이 써본다. + 앞으로 당겨본다?\nRE. 다시 얘기하기\n\n*AI 룸\n전시, 파트별 설명 GPT에 학습을 시키놓으면 퍼블릭오픈때 문제가 되지 않을 것 같다.\n해당 전시에 대한 내용을 학습시키는 \n\n*리플렛/포스터\n다시 인쇄할 때의 파일+스펙\n기존 의뢰 제작소 알려주시면 더 수월하게 진행할 것 같다 \n\n*대로변 시트지\n시트지 인쇄물 정보/파일 공유\n\n*방판차량 등\n책 원본이 있는 것들을 취급주의? 안내 글들을 붙여주시면 좋을 것 같다.\n\n*LED wall\n메인 영상 리사이징을 다시 한 번 요청드릴 것 같다\n\n*운영매뉴얼\n 시간/인력구성/기본적인 \n\n*미팅 끝나고 추가 보수 사항 체크\n\n*책의 미로 \n교과서 구조물이 이동되었으면 좋겠다.\n교과서와 푸르넷 사이가 유독 공간이 넓은 느낌이 있다\n\n*우리 pr 일정 공유하고, \n서화에서도 한다면 서로 공유\n\n*스위치, 소방 공간\n시공하면서 변경된 사항들 문서로 공유해주시면 저희가 편할 거 같다.\n\n*다 완료가 되면 용산에서 한번 더 최종점검하고 클로징\n\n-----------------------------------------------------------------------------\n\n[이사님]+코대표\n오늘 전시 공간 사진 셀렉되면  \n네이버 맵,\n 카카오맵 대표님이 정리되는대로 알려주시기\n\n15일 사진 중에 셀렉된 걸로 수요일에  pr하고\n11월초에 한번 더 할 예정\n\n인스타세팅\n수량 조절 인스타용 순서를 정하는 걸 따로 정하면 될 것 같다.\n\n딱 들어갈 때 보일 수 있게.\n비슷한 디자이너, \n내부에서 1열을 빠르게 정리하기 정재\n승 \n \n==========================================\n1. 전시 포스팅 전에 2건 학회 올릴려고 생각 중\n2. \n수 전경\n==========================================\n섬네일 3개 규격으로 핑크 배경\n 새로 요청하기 (릴스 / 전시 전경 /하루만에 올리기)\n\n=========================================\n전달용 미디어 자료\n\n목요일부터 판매하는 것으로 고려하기\n사진 찍기, \n방문 리뷰 이벤트 리셉션에 피오피를 만들어서 공유드리기(우리가 하기)\n(금성/팝업 배너)포스트잇 하나 드리는 걸로\n\n카페에도 전시가 안내가 되면 좋을 것 가다(대표님)\n\n팝업 배너 등록 요청(\n\n재단: 사업자등록증/발급받을 이메일 주소 전달 코대표님께 전달\n\n======================================\n화요일에 누가 오실 예정\n수요일에 추가 프리뷰\n다시한번 얘기 나눌 얘길\n\n수요일 오후 5시 대관행사", "category": "팀서화", "tags": []}, {"id": 59, "filename": "251027_(월).txt", "date": "2025-10-27", "title": "251027_(월)", "content": "1. 서화 계약 종료 관련 일정\n2. 대로변 건물 점검, 의견 논의\n3. 사이시공 전시 종료 관련 일정\n4. 굿즈 카페 판매 관련\n5. 전시 홍보 관련..\n6. 전시장 입장객 수 공유 받기(관련 구글파일 있는 것으로 알고 있음)\n\n===============================================\n\n11월\n- 인플루언서 작업을 한 두명이라도 해봐야하지않을까?\n- 인플루언서데이를 하루 정도 \n- 좀 더 \n\n구체적인 가이드를 주고 \n\n1. 리셉션- 코대표 사진찍는 것 정도는 충분히 부탁할 수 있다.\n- 업로드까지는 어려울 것 같다. \n수림님 (마케팅도 했었음, 영화 제작 쪽 SNS도 했었으나 대행사끼고 했었음)\n>>> 그분들께 짧은 영상 정도만 요청하고 드라이브에서 올려주시면 마케팅팀에서 올리기\n전시 톤앤매너로 올리기 \n\n2. 리그램\n- 평일 마케팅팀/ \n\n3. 인스타에 어떨 걸 올리지 공유하는 드라이브 공유\n\n4. 메타 광고는 추가로 다른 소스에도 붙여보고 다른 \n주 단위로 메타광고의 효율을 공유하기\nAI룸 기준으로 돌릴까?\n\n5. 전시장 방문객 추이\n\n6. 인플룰언서 초청은 좀 정리해서 보고드리기로\n\n7. 전시 예정 업로드 예정 11.19 방문 후 업데이트 예정 \nhttps://www.instagram.com/oottoogi/\n\n8. 서화 대로변 이슈\n팀서화 - 체크\n클로징 이슈> 회장님 포함 종료하는 미팅\n\n9. 종료 보고\n그간의 파일 정리\n계약상으로는 더는 요청할 건 없을 듯\n\n10. 회장님 외관 이슈\n팀서화랑 할지? 다른 곳이랑 할지?\n코대표님: 저녁때 사진이랑 영상 공유할 예정\n천으로 프레임 짜고 조명작업을 해야 구청 허가 사항인지?\n얼마나 복잡한듯? \n프레임 안박고 가격은 얼마일지?\n스카이차 써야하고, 무슨 인사이트?!?1?!?!?!?!1?!1?1\n어떤 정보 전달을 하면 하면 좋을지?\n크리에이티브????????? 빌리지에 대한 강점이 되어야 하지 않나?\n뭘 홍보하면 좋을지 정해지면 전시를 오게 하는 게 핵심 옥외\n\n재밌는 한 구절만 보여준다던지?\n한 컷만 재밌게 뽑는다던지?, \n\n비용을 먼저 알아보고 OOH\n\n-팀서화에 얘기는 꺼내볼 수 있지는 않을까?\n- 현수막이 ㅣ제일 저렴할 것 같고,  저희는 저희대로 \n* 팀서화와 수요일 오전으로 미팅 잡기\n회장님 미팅은 따로 잡기\n==========================================================\n\n11.팀.서화 사이시공 전시 이번주까지\n우리가 챙겨할 것들을 알려주시면 우리가 챙기겠다.\n<내일 3시반 5시반 - 토크 공간 무상으로 대여, 목요일 2시간, 금 오전/오후 모두 쓰기>\n내일 직접 그 공간을 보면서 설명하기로 했다.\n건물관리 관련한 인수인계가 필요할 것 같다. 총무팀을 불러서라도\n \n12. 굿즈\n좌대 세팅할 때 알려주시면, 이사님과 효상 선임정도 세팅때 할 수 있을 것 같다\n\n13. 스피커\n스피커 올려두는 다이. 서치하고 코대표님께 공유하기\n\n14. 미디어월은 내일 오전에 확인해보겠다.\n\n15. 화환들 이번 주는 일단 그대로 두기\n\n----------------------------------------------------------------------------------------------------------'\n\n팀서화 미팅 10시반, 우리끼리는 10시에 먼저 만나기\n\n------------------------------------------------------------------------------------------------------------\n\n박예정, 아티스트\n\n금성출판사/ 현재 로고 전달하기\n\n-------------------------------------------------------------------------------------------------------------\n※ 이사님과 미팅 정리\n\n임원회의 끝나고 3이서 미팅", "category": "기타", "tags": []}, {"id": 60, "filename": "251027_월요일 팀장 미팅.txt", "date": "2025-10-27", "title": "월요일 팀장 미팅", "content": "1/ 60주년 행사 관련 시트\nhttps://docs.google.com/presentation/d/1HsHVzK8Hf5VygQQ9URfVlCv6PQc6BouEUhDkehTDpfw/edit?usp=sharing\n\n2/ 보카킹 - 교육자료\n\n3/ 포스티잇\n네이버: 천경자 제외하고 네이버\n\n4/kcs 인스타그램 업무 추가 \n- \n\n5/용산-월 4시(코대표님) 굿즈 디스플레이, \n\n6/ 10월 결산때 60주년 관련 시트를 싹다 정리 \nsns / 행사 / 사진 / 영상\n\n7/ kcs: 건물 옥외 광고 ex) 토스 예시\n되는지? > 얼마 드는지 > 얼마나 걸리는지\n\n정리: 완수금, 이정빈, 빔 프로젝터 \n인플루언서 dm 기간 길게 \n정재승, 최재천 태그하기\nkcs 아모레, 팀서화 >> 스토리 \n짧은 영상 찍기 11월 계획\n\n팀서화: 수 오전으로 회신하겠습니다.\n미술\n\n인터비즈 콜드메일 보내기\n---------------------------------------------------------\n<기록하는 사람들> 온라인 공유 이력\n\n---------------------------------------------------------\n단기 수/목/금\n70명명 11워 중순 포스팅 사려깊은 11/16\n전시 위주로는 \n---------------------------------------------------------\n이사님이 내일 전화하기\n---------------------------------------------------------\n최재천 교수님, 소포보내기, \n---------------------------------------------------------\n네이버 예약 - 예약 포스트잇 \n---------------------------------------------------------\n불나방 - \n교과서 - \n\n월간 \n---------------------------------------------------------\n오너: \n\n\n---------------------------------------------------------\n26 - 계획", "category": "팀장회의", "tags": []}, {"id": 61, "filename": "251110(월) 팀서화 프로젝트 종료 미팅.txt", "date": "2025-11-10", "title": "월) 팀서화 프로젝트 종료 미팅", "content": "못 자국 정리, 시트지 뜯긴 자국 이슈 \n숲빌딩, \n\n설치 수/목\n금요일 전시 시작\n\n폐기물은 오늘 4시에 오기\n통도장은 날짜잡아서 \n퍼티 작업은 총무팀이 할 수 있음\n\n-------------------------------------------------\n\n거울의 방, 외벽전체에 이러 거를 픤트를 행서 \nㄹ\n책과 거울의 방 전경 중 하나로 골라서, 실사 크기, 확장해서\n들어가본 거첫 간판을 만드는 걸 고민을 해볼겠다.\n\n\n뭐 하는 곳이다를 알리는 게 목적일나면\n메탈판, 현수막도 을 하면 누가 /또 낙서를 할 수 있다.\n\n1. 실사 인쇄안은 있으면 좋을 것 같다 (나중에는 다른 이미지, 광고로 갈아끼울 수 있게끔)'\n프레임 짜서 거기다가 갈아끼우는 건 어떨지? 포맥스 하는 것 보단 저렴할 듯?\n\n메탈판에 붙엿다 뗏따하면?\n\n2. 임시매장 커밍 순 이렇게? 실사이미지를?\n\n,,>>>>>>>>>>>>>>>> 철판 아시바 막아서 포맥스나 시트지\n프레임으 ㄹ짜서 지==정 사각\n크게 실사 이미지 육면체에 앞 포맥스 뒤 포맥스\n옆면은 거리감 있게 두고 \n십자 \n\n맵이 하나 있어야 하지 않을까?\naif\n포맥스 사이즈 1200*2400  최대치\n거의 땅에 붙엉있는 정도 아래 위로는 고정되어 있고, \n철대를 뚫어버리면 \n\n좌측 맵과 공간 소개( \n오른쪽엔 책과 거울의방 전체 아시바\n길다란 간판은 너무 좋음\n중앙 통로쪽엔 맵으로 추가(메탈로)\n이렇게 정리해보겠다.\n일정상 차주중 미팅을 잡기 (월화) 4\n월요일 오후 2시일단 픽스  안만 좀더 구체화해서 \n회장님 참석하는 걸로 어렵다면 이렇게 안내하기\n이렇게 했을 때의 제작비용도 그날 확인할 수 있으면 좋겠다.\n공간마다 길다란 간판\n\n메모지 프린트하기\n데이트립에서도 다루기, 오뚜기도 다음 주에 오시거\n널윟나문화예술 11~12월에 올라갈 예정", "category": "팀서화", "tags": []}, {"id": 62, "filename": "251117(월)_팀서화 미팅.txt", "date": "2025-11-17", "title": "월)_팀서화 미팅", "content": "외벽 세팅관련 \n- 프레임 420만원\n- 프레임 290만원 \n- 포맥스 별도(원당 17만원)\n-- 9+10\n- 뿌리동은 어떻게 할 것이냐?\n- 주황색 큰 지도가 있으면 좋을 것 같다 뿌리 건물 근처에 세워놓는\nex. 주차장 들어오기 전,  \n\n\n철판에 바로 인쇄 83만원 / 벽에 바로 인쇄\n그냥 사다리로 설치가 필요한 작업\n\n동일하게 2개가 자체 지도가 인쇄되는  걸로\n뿌리동, \n\n양옥집도 울타리 벽쪽에 세로로 다는 것도 고려\n ------------------------------------------------------------------------------\n\n1~7 세로 긴버전으로 하기\n책거울 사이니지: 시간이 꽤나 걸릴 수 있음 (넉넉잡아 2주)\nㄴ\n서는 입간판 제외가 1230~\n대략 1500이상~ (입간판 2개 추가되면)\n\n이 정도 큰틀에서 할지 말지 정하는 거\n일정은 결정하는 것으로 2~3주 소요\n\n------------------------------------------------------------------------------\n※ 표지판 추가해서 (견적도 세부적으로)\n추가해서 보고 드\n강력자석으로 붙이는 방안", "category": "팀서화", "tags": []}, {"id": 63, "filename": "251118(화) 임원회의 후 미팅.txt", "date": "2025-11-18", "title": "화) 임원회의 후 미팅", "content": "1월 16일(금) \n수상자만 부르는 식+ 국장 정도 +\n\n*수상자: 60명 내외 + 국장(10) + 본사 임원\n80명 정도 행사로 바뀔 것 같다. \n스케치 사진: 11시~5시까지 하지 않을까?\n스케치 영상: 1종이면 충분 \n\n브랜드 영상 1개쓰기,\n60주년 이벤트 댓글들 기반인 영상? \n고객과 가족들이 모두 축하하는 \n국민들에 사랑받는 금성출판사 모션영상 정도로\n\n미국스타일: 초대장 \n\n홍이삭 아이디어: 회장님 완전 개인취향\n\n밥을 알아보라 하셨는데, \n하이브 싹동에 세팅하는 방안\n차주 임원회의 후 콘택해보는 순으로 \n--------------------------------------------------------------------\n포스트잇 50, \n택배 \n--------------------------------------------------------------------\n이번 주까지는 60보고가 비중있게 가고\n다음주부터는 라이트하게 변경하겠다.\n\n--------------------------------------------------------------------\n사업계획에 뉴싯에 대한 내용으로 감동으로 주고 다가가는 내용으로\n연초, 연말에 홍보자료 활용 사례 이벤트 공모전\n1:1 가이드 \n--------------------------------------------------------------------\n- mbn 물어보고 확인해보기\n\n70G 최소 5만개 \n- \n\n하트 \n\n12/13 인플루언서 연말 기부 플리\n12/6\n12/5 자동차 \n12/27 무지카에스마키나 \n\n- 굿즈: 위주로 \n- 책의 미로", "category": "임원회의", "tags": []}, {"id": 64, "filename": "251125(화) 임원회의 후 미팅.txt", "date": "2025-11-25", "title": "화) 임원회의 후 미팅", "content": "1. sbs 동물농장 협찬 광고 2개월 / 김혜진 기안 준비 계약서\n2. 주문제작\n3. 연도대상 \n80명 기준으로 초대장 문구도 빨리 만들어놓기\n드레스 코드 <보라색>이런 문구도 넣어야 할까요?\n라잌: 김지희 팀장 결혼식\n---------------------------------------------------\n4. 밥과 와인을 케이터링 행사장 꾸미기 대행사 ?!!? 래퍼런스 미팅, 견적\n5. 사진 견적 품의 상신하기\n---------------------------------------------------", "category": "임원회의", "tags": []}, {"id": 65, "filename": "251201_주간회의.txt", "date": "2025-12-01", "title": "주간회의", "content": "- 29 입점제안 오늘 문구 작성 및 보고\n- 케이터링 견적 이제 옴 > 견적와서 \n- 지상파 티비 프로그램 자막 광고 \n  (더 저렴할수도, SBS에서 하는 광고대행사그쪽에도 콘택)\n\n- 창작동화대상 4종 > 인터뷰 채널YES 안된다면 다른데도 콘택  \n- 전시 11월에 총 몇명왔는지 정리 시트 확인해서 >써놓기 \n\n- 금주중 결산장표 보고\n\n-", "category": "주간회의", "tags": []}, {"id": 66, "filename": "251202_임원회의.txt", "date": "2025-12-02", "title": "임원회의", "content": "위펀 3페이지 맨 왼쪽\n데코 수주\n<보스턴 컨설팅> 기준으로  고기류\n4~5만원대\n- 아이씨뱅큐? \n- 위에다가 고정시키는 게 방법\n\n닫으면 안되는 문\n\n- 유리문이랑 스태프 온리 5시까지 안오면 전화해서 받기(부산)\n- 발걸리는 거 생각해보고 회신준다고 했는데\n- 유리 (상/하단 고정?)\n- 와인 자체 구매 >교육지원팀 와인 서버 \n- 플라스틱 와인잔\n- 현장에서 미팅가능한 날짜? \n- 수/ 금 오전? (미팅날짜 잡아보기)\n- 생화장식이면 좋을 것 같고, 로고 디지트\n- 포토월 \n- 야외용 스탠딩 난로 \n- 리플렛 천매만 \n-ㅜ\n\n-12/26 강제인데 자발적으로 올리는 식으로 올려가\n-1/2 연차를 스스로 올려야 한다\n(금금)", "category": "임원회의", "tags": []}, {"id": 67, "filename": "251203(수) 이사님 미팅.txt", "date": "2025-12-03", "title": "수) 이사님 미팅", "content": "- 리플렛 300 이미 남아있음\n- 리플렛 \n- 케이터링 업체 금요일 11시 미팅으로 확정하기\n- 리플렛 한 파트정도의 푸르넷 (따수함st) 제미나이\n- 60주년 그 부분이 참 좋았다 > 푸르넷파트가 참 괜찮았다.  >>>\n- 지도 네임택, 어제 저녁에 도착했다고 합니다.\n- 굿즈 재고 관리(\n-", "category": "미팅", "tags": []}, {"id": 68, "filename": "251203_이사님 회의.txt", "date": "2025-12-03", "title": "이사님 회의", "content": "1.\n스토리 텔링 > 작년에 고민을 세개를 띄어놓고 스토리라인\n이 스토리라인을 좀 챙겨가면 어떨지? 카피를 바꿔도 괜찮을지? \n\n2.", "category": "회의", "tags": []}, {"id": 69, "filename": "251208(월)_주간회의.txt", "date": "2025-12-08", "title": "월)_주간회의", "content": "", "category": "주간회의", "tags": []}, {"id": 70, "filename": "251209(화) 임원회의 후.txt", "date": "2025-12-09", "title": "화) 임원회의 후", "content": "완)1. 빔 프로젝터 업체 공유드리기 이사님께 \n완)2. 포토 부스는 운영지원팀이 알아서 하기로, 거기서 하면 좋을 것 같다\n\n완) 3. 케이터링만 우리가 하기로 6만 5천원짜리로 가되(업하되)\n완)-  아베 끄뚜아: 우리 도면을 보내고(가이드 안내서) 보내고 혹시 이렇게 들어갈지?\n완)- 기둥, 싹동에 음식세팅, 상황이 이런데 들어갈 것 같냐?\n완) 4. 기존 카페라, 커피도 빠졌으면 한다. \n완) 5. 싹동에 테이블에 레이아웃 배치를 잡아달라. 배치도를 받아야 할 듯?\n완) 6. 메뉴 정확히 확정해 달라, 아메리카노는빼고, 디저트류중에 일부를 로고쿠기등의 답례품으로 할 수 있는가?\n7. 싹동 \n-----------------------------------------------------------------------------------------------------------------------------------------", "category": "임원회의", "tags": []}, {"id": 71, "filename": "251216(화) 임원회의 후.txt", "date": "2025-12-16", "title": "화) 임원회의 후", "content": "1. 케이터링 업체\n- 테이블 꽃병을 생화로 하면 > 꼭 생화로 하고 싶다 > \n- 테이브\n\n임원 테이블 6명\n나머지 102명 \n\n11명 2개 \n12명 6개\n6명  1개\n전날  오전에 다 된다\n전날 세팅은  다 되는 걸로 \n\n- 커피: 직원출근하라고 했다. \n- 커피를 빼고>음료 1종 추가 가능한지?\n- 디저트: 로고 마카롱 같은 200개? 로고디저트? /\n   파크 (떡, 18 페이지 스타일)\n- 로고: 책나무 로고픽으로  \n---------------------------------------------------\n2. 초대장 디자인 진행 중: 보라색: > 감안해서 디자인 ㅎ 곧. \n3. 포토존은 마당에 설치하기로 함\n4. 싹동 화장실 가리는 가림막 파티션?도 구매를 해야 함 \n---------------------------------------------------\n디저트를 강화하고 떡은 필요 없고, \n메인 서브 가지수를 줄이고, \n---------------------------------------------------\n빠르게 \n정선영 선생님 촬영 연휴때 출근 / 1일 \n프리뷰-토일 / 2일\n\n야근들 ~~~ 너무 많은다 체크했는데: / \n---------------------------------------------------", "category": "임원회의", "tags": []}, {"id": 72, "filename": "251230_임원회의 후 미팅.txt", "date": "2025-12-30", "title": "임원회의 후 미팅", "content": "1. \n아베끄뚜아 케이터링 계약서 1부만 보내고, 이미 파일 내 날인본이기에\n다만, 메일에는 명시하고, 12/31 내일까지 계약금 계산서 발행할 것\n1. 식사 종료 시간 이후부터 모든 케이터링 기물과 음식 철수\n2. 개인 매트, 꽃 병 와인잔 식사 이후에도 유지필요한지? 필요함\n\n2. SNS\n- 기록하는 사람들 (오늘 스토리 / 내일 피드-편집자 주 멘트 압축 수정)\nhttps://docs.google.com/presentation/d/1V_xabPISBXc92NmhYusBl7XdBO1HITMudaL78UlMBiI/edit?slide=id.g3ab350182da_0_0#slide=id.g3ab350182da_0_0\n\n- 남안동 지점(오늘 발행/블로그만)\nhttps://docs.google.com/document/d/1roDd0fUBBFElwHPHw9SQ5fTIMJf0H7DevNExA1pu5mM/edit?usp=sharing\n\n3. 푸르넷뉴스\n교육부 콘텐츠 활용해서 / 저학년/고학년별 발달 특성 정리\nhttps://docs.google.com/presentation/d/1EAG-BS9KujaePcXFzQThJ_ZlPPeChJlLY4UKhNfE_9o/edit?slide=id.g3ab26f89f51_0_5#slide=id.g3ab26f89f51_0_5\n\n4. 결산 뉴스레터\n\n5. 주간보고/결산\n- 1/2(금) 쉬는지? 별도 연차 상신? 아닌지 1/2에 일괄 휴무 맞고, 별도 액션 안취해도 된다. (쉬는/결산) \n- 2025 MBO 평가 개인별 셀프 정리하여 차주 화요일까지 요청함. 체크해서 하겠슴\n\n6. 초대장의 경우 (12/31 예정) / \n- 우리가 직접 분류해서 행랑 발송해? (그럼 교육지원팀에 명단받고 해야함)\n- 아니면 창고에 입고되면 알아서 하게끔해?/\n- 교육지원팀 \n\n==================================================================\n\nKCS 네이버 예약 \n- 명절들 모두 쉬는 걸로 뺐었는데 1/1에도 운영해요? 예약가능하게 세팅해요?\n-  \n\n===================================================================\n- 최소 제작 수량 및 개당 단가 적어놓기\n- 힙하게 가야 하나? / 약간 /  캔바 > 다양한 시도 > 디자인 웍을 다르게 해봐도 괜찮을까?\n- 국장회의때도 릴스를 활용하거나. 자유롭게 활용하는 식으로 \n\n===================================================================", "category": "임원회의", "tags": []}, {"id": 73, "filename": "260105(월) 전시장 관련 이사님 공유사항.txt", "date": "2026-01-05", "title": "월) 전시장 관련 이사님 공유사항", "content": "========================================================================\n- 시트지는 다시 붙이기로, 히터때문에 떨어진다. \n\n- 리셉션 AI룸쪽 히터키를 안키는 게 나을듯? \n  시켜야 한다면 오픈하고 1시간 - 30분만 키는 게 나\n  이에 대한 가이드를 작성해?\n\n-  2번 직원의 생각 키크신분: 직접 만나면 물어봐야 할듯\n\n- 3번 해결되었음\n\n- 인터넷이 끊겼다는 리셉션분들한테 양해를 구하겠다.\n  메신저 남겨달라. 주요 이슈들 안내를 해주시면 \n  주요 리셉션 가이드 정리하기\n\n- 가이드를 C/S 노출되어있다고 생각하면 탛벼\n\n- 책의미로: 전구가 문제가 있었는데. 이번 주에 팀서화 교체를 해주기로 \n  일정 체크를 해보면 좋을 것 같은데 > 그 김에 전구 교체하는 걸 봐도 될 것 같고?\n\n- AI룸 히터는 에어컨 날개를 달기로 했고\n\n- 방판다마스도 많이 망가짐, > 고침\n\n========================================================================\n\n- 굿즈 판매 시트 \n\n- 총무팀", "category": "기타", "tags": []}, {"id": 74, "filename": "260107_케이터링 업체 미팅.txt", "date": "2026-01-07", "title": "케이터링 업체 미팅", "content": "4. 케이터링 업체 미팅\nhttps://docs.google.com/presentation/d/15WUnPWEgstqt703hfxw43njajqTMSCElOngwi4dLsQc/edit?slide=id.p#slide=id.p\n- 일정표 공유\n- 1/15(목) 테이블 세팅: 오시는 담당자 성함 / 오시는 시간\n  *테이블/의자 레이아웃: 6인석 1개/11인석 2개/12인석 6개 안내해줄듯\n\n> 꽤 옹기종기 앉게 될 것 같다.\n- 식사 후 접시 치우는 방안 > 바스켓을 어디다가? 직접 옮기는지?\n- 꽃 조화 사진 체크 > 생화로 한다고 하면 테이블 세팅할 때 꽃병도 가능할지? 보고 꽃 직접 세팅할 예정\n- 접시/식기류 넉넉하게\n- 부탄가스 체크 / 케이터링 세팅할때 가림막 같은 게 있는지? 화장실 앞 가리기\n\n\n-===================================================\n\n파티션을 회신 주시면 사이즈에 맞춰서 현수막을 제작 할수도 있을 것 갔다\n테이블보 조화도 케이터링 쪽에 세팅이 된다\n\n즉석 앞쪽에 접시들을 너허고 \n테이블 매트는 네이비 : pvc\n\n주문 인원의 3배 이상, 그릇, 접시는 \n퇴식구를 밖에다가 세팅하는 거로 \n가능하다면 화장실 \n\n꽃이 조화 스케일을 높이는 방안? 고민하기\n화병은 딱 저거다 오케이.. \n\n\n-----------------------------------------------------------------------------------\n테이블보 의자 9~10시 렌탈 담당 사장님 \n인덕션은 하나만 사용할 예정, 전기용 그릴 여러 개 쓸 예정,  \n큰 차량을 들어올 수 있응ㄹ 것 같다. \n\n위생백같은 것도 원하는 것도 >\n조화 가지수 >> 보라색  \n\n===================================================\n\n도시락을 한 번 해볼까싶다.\n\n푸짐하게 하면 3만원 정도\n\n=================================================\n기본적으로 냅킨, 추가 작은 냅킨 종이컵은 여러개 / 와인잔은 딱 100개\n차량 \n4163\n\n수상 소감 위주로 가고, \n마이크+녹음기 묶어서\n\n화이팅, 사진\n\n임원들은 개인소장용 사진만 따로 찍어드리기\n꽃집 업체가 꼿층 \n\n-=============================== entation/d/1V_xabPISBXc92NmhYusBl7XdBO1HITMudaL78UlMBiI/edit?slide=id.g2814068d082_0_0#slide=id.g2814068d082_0_0\n- 이번 주 일정: 전시 / 교육박람회?\n- 벚꽃 팔로업\n- 건빵은 차주 초정도에 샘플 택배 올 예정", "category": "임원회의", "tags": []}, {"id": 82, "filename": "260205_회의.txt", "date": "2026-02-05", "title": "회의", "content": "1. 목금 MBO / 설전 지급\n- 직급에 따라 한도 다르고, 중간 입사 차감\n- 44억에서 6억 예상(푸르넷 예산만)\n- MBO 자체가 많이 줄었다.\n- 25: 한도가 각 120, 110, 85(소담) \n- 한도 보다는 더 나가겠지만, 작년(210 있었다)\n\n2. 여유있게 먹있던 금요일 3월 점심 회식  \n3. 4월 전/후\n4. 소담: 세상 좀\n5. 카페 매니저\n6.", "category": "회의", "tags": []}, {"id": 83, "filename": "260224(화) 임원회의 후.txt", "date": "2026-02-24", "title": "화) 임원회의 후", "content": "3월 전국 지점장 관리교사 주임교사 교육:\n뭔가 발표를 하라고 했다. 또 뭔가를 발표를 하라 SNS SEO?!?!? 결산 발표에 추가/우리가 어떻게 바뀌었는지\n\n- 대행사 출신 없다....\n- 3채널,\n- 공부방: 간식 매뉴얼 \n\n무슨 교육할지:3월 천: 오픈채팅/네이버 톡톡채널  > 제미나이\n4~5월:  SNS 브랜딩 교육 / 캔바 교육   \n\n* 문해력: 한자사전> 출고 요청해보겠습니다.\n* 6070 조금만 트렌디하면 좋을듯? \n\n\n\n---------------------------------------------------------------------------------------------------------------------------\n판촉물\n- 비닐쇼핑백: 그냥 맘에 안든다> \n- 건빵:+전시장 레트로 MZ 화끈하게 래퍼런스(프릳츠 힙힙힙) \n\n\nASL\n- 미팅 일정은 언제로 잡을지? 차주 수목?(3.4) 완료  \n- 킥오프 미팅 후 기안 상신\n> 각 본부장님, 발제안 제안 단계를 어떤식으로 \n\n\nKCS \n- 도슨트 관련 내용 (3/7)\n· 사진은 인물 나온 걸로 적당한 거 찾기가 어려움\n· 도슨트 네이버예약 버튼을 활성화+현장 도슨트 참여 가능하게 끔\n· 매주 토욜 오후 3시에 고정? 도슨트는 20분 남짓?\n· 도슨트 예시 추가해서 넣기\n\n- 이정빈 작가 요청 국 아티스트 비자 발급받는 과정예술관련 증빙자료서 계약 이정빈 작가 <용역수행확인서> ㅇㅇ\n\n- 분기 검토 요청 메일 보냄(코대표 회신오는대로 내부 품의 상신)\n\n- 벚꽃관련 이벤트\n\nhttps://docs.google.com/presentation/d/1qS-NydYw2IpuQ0RhmwvhNLZQTSyqSUMtm_wslhaoWaY/edit?usp=sharing\n\n\n팀서화 \n\n\n- 당근 비즈프로필 자랑하기 +단종 인증 이벤트 \nhttps://daangn.com/kr/shorts/4yHKUW5V\nhttps://daangn.com/kr/shorts/4YfcDyaz\n\n\n서울 마포구 만리재옛길 23 금성출판사", "category": "임원회의", "tags": []}, {"id": 84, "filename": "260304(수) 임원회의 하루 후.txt", "date": "2026-03-04", "title": "수) 임원회의 하루 후", "content": "1. 사장님. 철거 완전히 완료? 최종확인하러 갈거라.\n\n제외한 11,240,000, 부가세 별도\n1. 법인계좌에 입금하려다보니 협약서 서류가 있어서요. 이거는 작성되면 안내드릴게요.\n2. 11,240,000, 부가세 별도 다포함된 견적서 요청(경량 철골 텍스붙이기랑 백체, 페인트,, 배전판 모두 들어간 견적서 요청\n3. 사업자등록증도 요청.\n\n-------------------------------------\n1. 건빵 디자인 요청 <전달 완료> \n\n2. 강동50+ 미팅 주선 > 전국적으로 물꼬만 터줘도 좋을 것 같은데: \n  (처음하는 사업설명회는 본사? 지점???) 금 오전/ 다음 주 월요일 미팅 날짜 잡기\n\n3. 광고 <전달 완료>\n다음 주 혜진 선임님이랑 해서 4월부터 tv를 광고를 어떻게하면 좋을지? 바꿀지? 시간대를 안할 수도 있고 의견 포함한 결과 보고\n결과 보고 / 먼저 검토를 해서 보고를 \n\n4. 수학경시대회 <전달 완료>\n- tip을 함께 올렸으면 좋겠다: 어떤 식으로 블로그 인스타그램에서 써볼 수 있을지 주제정도로 던져줘도 좋겠다\n- 릴스 콘텐츠\n상장, 성적표를\n\n5. 시흥지점 업체 소통 완>\n- 증빙 우리가 세금계산서를 끊어주려면 (뭐라도 써야되는 상황)\n- 현금으로 입금해주셔도 된다. 통장사본 보내겠다. (체크하고 금액)\n- 목요일 오후 2시 정도 끝나 있냐??!?1?1 바닥까지 완료\n- 간 김에 관리사무소 아저씨한테 가서 상세 도면과  \n- 특약사항 6조. 학원으로 최미화(용도변경)을 책임질지? \n  일부 원복 안하는 걸 공유를 해 말어?1?11?1?\n  간 김에 부동산에 용도변경은 어떻게 되었어요? 구두 소통? / 인테리어 \n\n6.", "category": "임원회의", "tags": []}, {"id": 85, "filename": "260305_ASL 미팅.txt", "date": "2026-03-05", "title": "ASL 미팅", "content": "저희 소개 > 어떻게 타임 타이블 발표 \n3학년, 4학년 컨 \n'티칭허브는 드랍 >\nAI기반 학습 모델 고도화 전략을 어떻게>\n발제식: \n참여인원 60명, (KCS에서 해도 괜찮지 않나?)\n\n계약서 3월 중 진행할 수 있겠네?\n용역 계약서(파트너쉽 계약서)를 우리가 전달하는 형식\n산학 지원 계약은 아님 / 보안유지에 대한 계약서가 있을 것 같음\n(엠오유는 없이 계약서로 갈음하는 구조)\n\n발제안이 확정되고 나서 발제식에서 발표하는 것임 3~4월중에 정하면 되겠다. \n9개팀이 다 PT를 하게 된다 (60명) \n평가표에 맞춰서 진행  평가를 한다  / 1/1/2 수상한 팀\n\nPR를 진행하는 경우? 코웨이, 효성그룹 있었음\n\n550만원은 한번에 지급하면 케이스\n\n계약서 \n----------------\n--------------------------\n다음 \n발제안 정해서 알려드리기, 계약서\n\nKCS과 연계된 아젠다도 있으면 좋겠다는 생각도 들고,\nEX. 교사 확장 전략, (연령대 대한 아젠다)\n관련 자료는 드리면 될 것 같다. \n\n블루개러지 인턴채용 케이스\n다임리서치 / 3.3 랜딩페이지\n\n※\n- 발제안 3/16금까지 발제안을 제안하기\n- 5/12(금) 발제식 장소 KCS \n- 수료증과 상장도 발급해줘야 한다.", "category": "미팅", "tags": []}, {"id": 86, "filename": "260305_팀서화 견적 이야기.txt", "date": "2026-03-05", "title": "팀서화 견적 이야기", "content": "[팀서화 견적 이야기]\n\n냉난방기는 알파로 따로 빼기\n회장님은 자동문 원함\n기성품으로 구매하는 건 오른쪽으로 빼기\n게시판에 대한 니즈가 엄청 크다 \n부엌에 대한 환기 시스템은 어떻게 하면 좋을까?\n\n자재에 대한 명시를 해주시면 좀더 쉽게 갈 수 있을 것이다 \n책장벽-시그니쳐, 쇼윈도 좀 줄이기\n교실 사무실 구조도에서 데스크 넣기\n응접실이 회의 공간로도 활용할 수 있게끔\n\n최종 소프트 카피로 견적 업데이트해서 받으면 조율하고 할지 받을지\n다음주에 결론내 > 회장님 미팅 \n계약서 양식도수령하면 \n회장님: 모듈형가구처럼 배치한게 인상 깊었다.\n\n외투걸어놓는 공간 고안\n\n복도에다가 신발장 \n거치 바닥과 거친 벽도 괜챃다 회장님\n\n내일 오전까지 전달 \n\n하게 된다면 20일부터 하는 걸로", "category": "팀서화", "tags": []}, {"id": 87, "filename": "260306_강동50플러스 미팅.txt", "date": "2026-03-06", "title": "강동50플러스 미팅", "content": "- 50권역별로 있음\n- 제2의 직업 교육과정\n- 채용 창업 설명회 1년에 6번정도 진행/편의점/무인점포창업/채용설명회/현장면접\n- 교육쪽 은퇴하시는 분들이 공부방 창업(진행해본적은 없음)\n- 40~64 \n\n----------------------\n-50대 가장 많으심, \n-하게 된다면 본사에서도 지원이 가능\n\n-인기가 있음 /강사 양성 돌봄 교실 / 일자리 프로그램의 반 이상 차지함\n\n-강사로 하고싶어하는 분도 가능? 강동권 원하는 티오를 파악해서 구체적으로 진행이 가능\n-인당 12만원 받아내기\n지원하고 3개월내에 하기 > \n타 업체와 달리 뭐를 더 제공하고, 시상금, \n창업보다는 채용쪽으로 설명회를 추천\n교육선생님 설명회 모집 스타일 \n강동/송파쪽에 선생님 티오가\n\n안내 자료들 보내드리기, 강동/송파 특화 티오가 있는지 그것도 전달하기\n모집문구나 이런 것들은 주무관 가능여부 체크 해볼 수 있고,\n거의 1대1을 원한다. 설명회를 40분 정도를 하고 뒤에 q&a 상담 할 수 있는 스타일\n최대 1시간반~2시간,\n최소 한 달전에는 가이드라인이 나와서 빨리하면 4~5월도  가능\n행사 주기는 정해지지 않았음 구소식지가 25~26일에 발행 매월 중순~말 교육이 게시가 된다.\n전달할 거 참고들 / 하기된다면 4월에 하고 싶다. \n\n최대 1시간만 스토리 \n푸르넷 채용/창업 설명(40분)\nQ&A (20분)\n1:1 문의 및 현장 면접 (~30분)", "category": "미팅", "tags": []}, {"id": 88, "filename": "260306_담주 해야할 일 정리.txt", "date": "2026-03-06", "title": "담주 해야할 일 정리", "content": "-  asl에 메일을 먼저 받고\n- 기안 준비 해놓기((월)\n- 보고용 ppt //몇개 캡쳐해서 진행\n-  \n\n 시훙\n\n\n\n\n강동구\n- 최근 사업설명회 자료 보내기(월) + 자격 이수\n- 이것도 간단하게 설명 ppt 이리 생겼고 이런 걸 해줄 수 있고\n동부 영업국장님알 ㅇ해볼 수 잇을 것 같다.. 서울에는 지역별로 있고, 전국ㄱ에 얼마 있으니 확산해 볼 수 이\n 것다아 > 보고 화요잉ㄹ  마케팅도 지원 ppt만 만들기", "category": "기타", "tags": []}, {"id": 89, "filename": "260310_임원회의 후 미팅.txt", "date": "2026-03-10", "title": "임원회의 후 미팅", "content": "- AI룸 대표와 연락이 안됨, 다음에 팀서화 통해서 소통해야 할 듯\n- KCS 벚꽃 이벤트는 그대로 추진? 이벤트 품의 올리면서 > 엽서 디자인 의뢰\n- 강동 50플러스 추진 컨펌 > 신청서에 써야 할 것들이 있는데 내 선에서 애매한 것들(교육지원팀)\n- 노트류 2권만 먼저 품의 상신 > 디자인 리뉴얼할필요가 있을지? \n- 비닐장갑도 따로 품의 올릴 예정\n-\n 금 대휴 3개중 1개 소진\n- 혜진 1.5개 남아서 16일(월)오후 반차, 4/6(월) 1일 사용 예정\n \n- 정규대학 입학 후 2년 이상 수료 후 중퇴자(제적자)(70학점 이상 취득)\n--------------------------------------------------------------------------------------------------------------\n\n1. 강동50플러스 \n- 국장으로 변경, \n- 신청서 관련해서 지도/상담/행정교사\n- 유경숙 팀장한테 내용 정리 \n- 신청서 이사님게 보고드리기\n\n2. 팀서화\n- 1억까지 깍아라\n- 금요일 발표: 시흥지점 인테리어안으로 새로운 \n\n3. ASL\n- 기안올리기\n- 발제안: \n   교사모집 방안(자세한 풀이풀이풀이 페인포인트, ,\n  일관 마케팅 메세지를 위한 활용 방안 만들 것 능력편차가 크고\n- AI 생산성을 높이는,    \n\n1. 첫 번째거는 괜찮\n2. 푸르넷 영업 조직 확장을 위한 푸르넷 리포지셔닝 리텐션 강화 전략 고민\n3. 본사/사업국/교사 직접 마케팅 GEO 방\n>>> 정리해서 보고드리기 \n- 기안 올리기\n\n4. 벚꽃 보고 못함\n- 추진 품의 > 디자인 의뢰 >\n- 폼포드 \n- 마스킹종이 테이프 \n> 이벤트 홍보를 하고\n-----------------------------------------------------------------\n전시장 굿즈 쇼핑백에 담아놓기", "category": "임원회의", "tags": []}, {"id": 90, "filename": "260311(수) 팀서화 미팅 내용.txt", "date": "2026-03-11", "title": "수) 팀서화 미팅 내용", "content": "[배]\n- 자습동굴은 빼기\n- 보이지 않는 않는 부분 응정십, 사무실 미니마이징\n- 예쁜 안쪽이 보이게끔 처리\n- 주방: \n- 디자인적 부분들을 조금 더 줄인다\n- 폴더월은 안해도 될 것 같다\n- \n---------------------------------------------------------------------------------------------\n\n[팀서화]\n- 한다면: 수입자재비용 모두 오를 것 같다(전쟁+유가 이슈), 퀄리티 이슈, 포트폴리오에도 쓰기엔 애매함\n- 안한다면: 금성과의 관계는 정리 > 좋게좋게~ \n- 컨설팅비용: 싹동예시: 지치는 감, 기획에 드는 품. 저번에도 명절에 직접 메꾼 것도 많음, 저희가 저희 가치를 깍고 가는 건 아닐까, 이거를 하는 게 맞나? \n- 고민 가/부: 마지막 견적: 요소를 줄인 기획을 다시 주시면 > 그것 기준으로 하기\n\n- ※ 일단 빼서 하는 게 가능한지 고민하겠다. 손해보는 거면 안하는 걸 /  A/S 버퍼를 잡기\n     이번 주 주말까지 가능여부 확인 > 차주에 결정하는 식으로 하기 / 회장님 직접 뵙고 설명 추진\n     진행이 안되면 서로 협업 죄송한 수준,  \n\n[BAE]\n- 마지노선을 정리기: 최선을 정하고 제안주시기\n- 1억~1억5천 사이가 컨펌나지 않을까\n- 최종안을 직접 설명드리는 안<회장님께>도 있을 것 \n- AI 관련팀서화 메일 보낸다.", "category": "팀서화", "tags": []}, {"id": 91, "filename": "260317_임원회의 후 미팅.txt", "date": "2026-03-17", "title": "임원회의 후 미팅", "content": "- 교육지원팀 강동50플러스 신청서\n- ena 예능 관련 컨택\n- 다른 ddp 관련 \n- 벚꽃 디자인\n- 판촉물 비닐... 건빵\n\n-----------------------------------------------------------------------\n- 최대한 덜어낼 수 있는 것들은 덜어냈다\n- 책장: 보, 파이프라인이 지나가는 관 다 막을 생각이엇으나 단가 많음> 높이를 낮춤\n- 책장이자 레거시월로 만들어버림(하단부 장 비용도 큼, 삭제)\n- 자습동굴이 없어짐, 책장벽 두께가 얇아짐, 원장실/사무실(공간당 9분씩 충분히 가능할 듯) / 티파니블루로 도장\n- 교실 크기가 조금 더 커짐\n- 주방은 오픈형 공간으로 변경함\n\n[배]\n- 예전 주방으로 가는 곳을 덮개장으로 바꿀수도 있지 않을까?\n- 의자 겸 장이 추가될 수 도 있고 \n- 무조건 인덕셔 자리\n\n+ 쓸때없는 페이지 다시 추가\n- 모델하우스 느낌의 장표가 되면 좋을 것 같다\n- 쇼윈도 시트지 내용 추가(하단은 불투명 시트지, 벤치형 수납장)\n- 라운드 처리 된거 업데이트\n- 책장에 레거시 월 조금씩 있으면 좋을 것 같다\n- 가장빠르게 공사 시작, 소방업체 체크 후 진행(그거 조율 1주일)\n- 책장 내 조명은 없는데  다는 없어도 한 줄씩은 있으면 이쁠 것 같다\n- 교실 유ㅉ리는 \n\n[내가 할 것] \n- 계약서 검토 및 추진 품의 작성하기\n- 공사 일정 넣기, 빨리주시면 빨리 검토하고, \n- 내일 용산 미팅 3시반~4시: 예정 \n- 시흥 목욜 \n-------------------------------------------------------------------------\n\n- 비닐: 카툰스타일로 진행하겠습니다.\n- 건빵: \n\n- 광고: 줄이면 좋겠다. 줄이되, 다른 방송사 단독 건으로 저렴하게 하고 있는 건 잇는지 알아보겠다.\n- 청음실: 워우워 ,LP카페: 리플렛을 만들어야 하는 상황,", "category": "임원회의", "tags": []}, {"id": 92, "filename": "260319_팀서화 관련 미팅.txt", "date": "2026-03-19", "title": "팀서화 관련 미팅", "content": "[기획안 관련 내용]\n- 회장님 아이디어: 캐릭터요. \n- 최종 파일에 안하는 건 모두 빼기\n- 33 게시판: 한쪽 자석 / 핀꽂는 게시판 (소재 믹스)\n- 34~35 페이지: 35 민트색 조명이면 좋겠다\n- 가구를 골라서 하는 비용까지 모두 포함\n- 40 페이지: 원장실 >사무실(상담실) 바꾸기 벽면에 뭐가 있으면 좋겠다(비용 추가 예정), 사무실에도 책상배치 레이아웃 도면이 있으면 좋겠다. \n- 49페이지: 유리창 시트는 캐릭터 얘기(회장님 아이디어),  \n- 회장님 복도 가스 배관 래핑할 수 없냐?\n\n[계약서 관련 내용]\n- 사이니지가 외관에 빠져, 사이니지는 시공금액에서 포함되지 않지만 ~~~ 본 견적금액에는 협의 진행 한다 (계약서)\n반영)- 제반 비용 엘리베이터 . 사다라치ㅏ 사용료, 관리소 납임금, 등 \n계약서 반영하기\n\n----------------------------------------------------------------------- \n- 강동 50+ 미팅??1?1?!?1?1?\n-----------------------------------------------------------------------", "category": "팀서화", "tags": []}, {"id": 93, "filename": "260324_임원회의 후 미팅.txt", "date": "2026-03-24", "title": "임원회의 후 미팅", "content": "- 채팅방 메뉴는 이런거가 있어요. 아예 샘플이 있다\n- 카카오오픈채팅을 왜 해야 하는지? 전화번호 노출없이, 바로 가기 링크를 넣어줄 수잇따.\n- 블로그 프로필에 넣을 수 있다. \n- 카카오톡 활용 사례를 명확하게 \n\n- 교사모집만으로 템플릿 정리하기\n\n- 판촉물 (비닐/건빵) > 회장님 결재)\n업체/광고  \n\n- 팀서화 (26일 미팅) (인감? 법인? 사용?)\n메일로 보낸 거 \n\n- 벚꽃 이벤트 발주\nhttps://docs.google.com/presentation/d/1qS-NydYw2IpuQ0RhmwvhNLZQTSyqSUMtm_wslhaoWaY/edit?slide=id.g3d20042bd5b_0_43#slide=id.g3d20042bd5b_0_43\n바로 발주 준비\n\n- 강동50플러스 >> 차주 중에 미팅 잡기\n교육지원팀 날짜는 잡혔는데 > 4/1 동대전 학부모 설명회 그날 현장사진 공유인물 블러처리\n\n======================================\n- 교사모집을 2~4하고 있는 (22개 지점)\n- 당근정도만 \n- ai 강아지 하던대로 신선한 것들이 \n- ai 관련 강의 오프라인/온라인도 알아보고 \n- ai 한계 ?!?!?!?\n- 블로그 콘텐츠 톤이 바뀔 필요는 있을 것 같다. \n-=====================================\n- \n- 그거 아닌 것들은 영\n- 힉스필드/젠스파크 \n- 여의도 벚꽃축제 시즌 ~ 추천 ~ 이벤트~~ ~~~\n----------------------------------------------------------------------\n곧 / 벚꽃을 \n\n-----------------------------------------------------------------------\n힉스필드  /그로스 마케터 / 가성비 / \n---------------------------------------------------\n개발자 //// \n\n- 교육지원팀: 블로그에라도 푸르넷 진단서에 제미나이를 연동하는 콘텐츠를 가는 중\n\n=====\n5월에 지점장 교육 5/14 \n-", "category": "임원회의", "tags": []}, {"id": 94, "filename": "260331(화) ASL 전화 확인 사항.txt", "date": "2026-03-31", "title": "화) ASL 전화 확인 사항", "content": "ASL 전화 확인 사항\n──────────────────────────────\n\nStep 1. 처음 품의 시점의 문제\n- 550만원 VAT 포함으로 이야기\n  → 세금계산서 수취를 전제로 한 것\n  → 공급가액 500만원 + VAT 50만원 = 550만원 구조 상정\n\nStep 2. ASL은 세금계산서 발행 자체가 불가\n- ASL은 사업자 등록이 없는 학생 동아리\n- 법인도 아니고 사업자도 아님 → 세금계산서 발행 주체 없음\n- 처음 품의의 \"VAT 포함\" 자체가 성립 안 됨\n\nStep 3. 이 거래의 실질\n- 협약서에 개인 3인 기타소득으로 잡혀있음\n- 실질은 법인(금성출판사) → 개인들(ASL 구성원)에게 용역비 지급\n- VAT 없고, 원천징수(8.8%)만 적용\n\nStep 4. 계약서를 단체 명의로 하면 안 되는가?\n- 단체 명의 계약 + 개인 기타소득 처리는 모순\n  · 단체(ASL) 명의 → 세금계산서 발행 불가\n  · 개인(오민서 외) → 계약서 주체와 세금 처리 주체 불일치\n  · 60명의 명단이 필요하진 않음\n\nStep 5. 다른 기업은 어떻게 했는지 ASL에 확인\n- ASL이 먼저 협약서 초안을 들고 온 것 = 타사 진행 경험 있을 가능성\n- 확인 사항\n  · 동일한 방식(단체 명의 계약 + 개인 계좌 수령)으로 타사 진행 사례 있는지\n  · 있다면 그 기업에서 비용처리를 어떻게 했는지 알고 있는지\n  · 지도교수 또는 학교 산학협력단 통해 계약한 사례 있는지\n\nStep 6. 핵심 질문\n① ASL 명의로 세금계산서 발행 가능한 사업자 주체 있는지\n   → 없으면 VAT 포함 구조 불가 → 품의 전면 재검토 필요\n② 개인 기타소득 처리 시 계약 주체를 대표자 개인(오민서)으로\n   변경할 의사 있는지\n③ 최종적으로 원하는 금액이 세전 550만원인지,\n   세후 실수령 550만원인지 재확인\n\n결론\n- 산학협력단 경유 가능 → 세금계산서 수취 + 현 품의 구조 유지\n- 대표자 개인 계약 전환 → 기타소득 원천징수 + 품의 재상신\n- 타사 전례 확인됨 → 그 방식 참고하여 내부 경리팀 협의", "category": "기타", "tags": []}, {"id": 95, "filename": "260331(화) 임원회의 후 미팅.txt", "date": "2026-03-31", "title": "화) 임원회의 후 미팅", "content": "1. 5/14(목) 케이터링 관련\n- 만약에 뷔페식으로 진행한다면 이번에는 날씨가 좋아서 마당에서 추진할 수도 있음. \n  다만 지난번과 유사한 인원이기에 음식 웨이팅 이슈, 청결 이슈, 그릇 이슈가 있음 > 굳이 이걸 겪어야할 필요는 없음\n- 한식 도시락 구성으로 의뢰 \n- 저번 아베끄뚜아 케이터링은 인당 5만원+부대항목일괄25만원(VAT 별도) 엿음\n- 여기에 조금 더 저렴한 버전(인당 4만원대)로 문의해?\n- 파크닉도 도시락으로 문의\n- 본도시락 이런데 문의해도 돼\n- 브라더 한정식 도시락: https://www.brotherdosirak.com/product/%EB%96%A1%EA%B0%88%EB%B9%84%EC%99%80-%EC%83%90%EB%9F%AC%EB%93%9C%EB%8A%94-%EC%97%B0%EC%95%A0%EC%A4%91/30/category/68/display/1/\n\n2. ASL 관련해서는 통화 문의함\n\n3. KCS 인스타는 벚꽃 현장 사진같은 거 + 이벤트 현장 사진 위주로 해?\n\n4. 판촉물 비닐장갑 재고 소진되었는데 : 워낙 비용 변동이 커서 먼저 디자인 후 (1~2주후) 기준으로 견적 받아서 품의 진행해도 괜찮을지?\n\n5.  ai\n- 뉴스클리핑 자동화 방법\n-\n\n벚꽃 야외에서 뭐라도 / 야외에서 뭐라도 했봤으면  벚꽃 기록나무?\n- kcs 인스타그램 > \n- 벚꽃 기록나무\n- 테이블이 있음 그 테이블을 묶어서\n- \n\n- '현수막 제작\" 봄을 기록하는 사람들\n- 벚꽃나무에 엽서를 코팅해서 달기 > \n- 나무의 \n- 손글씨 \n- 포스트잇 써서", "category": "임원회의", "tags": []}, {"id": 96, "filename": "260409_임원회의 후 미팅.txt", "date": "2026-04-09", "title": "임원회의 후 미팅", "content": "1. \nKCS 판매 / 정산\n이 세트를 다 팔아야 할듯\n북타임즈, 북 드림북스\n\n2. \n케이터링은 본도시락 <12,900원> \n디저트가 없는 거 같아서 컵과일 > 확인해보겠습니다.\n\n3.", "category": "임원회의", "tags": []}, {"id": 97, "filename": "85~6 뮤지션 이브 카페 흙.txt", "date": "2025-01-01", "title": "~6 뮤지션 이브 카페 흙", "content": "8/5~6 뮤지션 이브 카페 흙\n8/22 팀.서화 오프닝 파티\n8/23 88 7~10 \n8/30", "category": "기타", "tags": []}, {"id": 98, "filename": "구체적인 실행 예산 규모(수익).txt", "date": "2025-01-01", "title": "구체적인 실행 예산 규모(수익)", "content": "구체적인 실행 예산 규모(수익)\n동절기 전략, 야장 빼곤 어떤 수익 구조?\n카페 흙 전시동 변경사항 유무\nF&B 외 프로그램 유무(체험, 문화 프로그램?)\n마일스톤 일정\n\n\n컨셉\n\n예산\n\n수익\n\n운영\n\n컨셉\n1. 달라진 것 같은 포인트가 있다. 대형출판사의 출판 창고같은 느낌으로 한다고 했는데 그게 약화된 거 같다\n폭포랑 조명은 멋지지만 우리만 할 수 있는 건 아니지 않나? 컨셉이 달라진 건가?\n물, 빛을 추가로 얹어 주신 신거  어반인큐베이터라는 게 약간 모호한건지?\n>>>\n건물들이 떨어져서 하나의 그룹처럼 보이지 않았다\n가장 중점으로 생각한 건 시각적으로 진입할 수 있는 건 보여주자\n시각적으로 사람을 바로 유입할 수 있는 방안 > 파사드 미치 게이트로 궁금증을 자아내야한다고 생각,\n도심에서 볼 수 없는 특별한 요소 물, 조명 스토리텔링의 기준 우리가 갖고 있는 뿌리를  전시 입구서부터 히스토리를 느끼게 되어 있다. \n\n\n\n2. 예산 수익 운영\n어느 예산으로 잡고 기획했는지? 금액적인 대략적인 금액은 \n\n하절기랑 동절기가 다르게 운영하면 어떻게 어떤 수익을 하나? 하절기만 있어서\n운영을 어떻게하실 걸 생각하신 건지, 대행하면 되나?\n\n>>> \n첫 미팅때 예산이 6억???, \n야장 공간은 설비시설이 있기에 가능, \n좌석 구역은 플라스틱으로 반영될 예정, 그래서 얼마? \n맞출 수 있는 비용? 낮에는 플리마켓으로? \n연희동을 예시로 복합문화공간처럼 작가들이 스튜디오 탈바꿈이 되었다.\n떨어져있는 주택들이 전시를 한다던가, 플리마켓을 한다던가. \n\n\n1. 금액: 정말 대략적 금액은 다음 미팅때 추가하겠다.\n2. 프로그램: 야장, 푸드, 푸드트럭, 나머지 전시 공간이 활성화 된다면(나중에 팝업으로 들어올 수 있다?)\n3. \n\n공간콘텐츠 사업을 하겠다라는 선언적인 의미인데 > 금성이 시작 프로젝트라는 건 \n금성출판사라는 걸 드러내는 공간(전시)도 하겠다?\n\n이사님: 아크앤북 > 출판 교육을 하는 곳이니 그런 느낌\n(자연이 포커스되고 있고 있는 지금, 출판 공부방 이런 것들이 전시가 없어도 있다면 좋을 거 같다)\n폭포 조명은 부차적이지, 출판 교육의 아이덴디티 주적인 거 이\n\n\n글: \n금성출판사의 무언가를 보여주는 것 보다 사람들이 오는 게 목표(\n실내 공간에서 금성 역사 서적 전시도 하다. \n \n윤:\n어린이 교육 > 생명 > 흙싹뿌리 >>> 그런게 연결되었으면 좋겠다\n금성출판사의 아이덴티디가 더 기획안에 드러나야하지 않을까 \n(가을부터 아트페어도 함)\n적어도 필로티 아래나 확실히 금성이 드러나야하지 않을까\n어떻게 전체가 잘 스토리텔링이 될 수 있을지? (지금은 카페만 아는데 전체를 아우를 수 있을지?)\n느좋... 레트로하고 톤다운된 느낌하고 맞춰주시면 좋지 않을까?\n\n이사:\n청와대 근처 00여관 공간은 잘되어있는데 싹 뿌리 어디있지라고 잘 인식하\n\n글:\n모든 것들을 하나의 원더공간이 그동안 없었지만 원더존으로 오히려 하나로 만들 수 잇다고 생각\n연결성을 줄 것이다. > 전체 단지가 금성출판사의 단지다 라고 느끼게 할 수 있을 것?\n그것도 저희가 더 신경써서 해보겠다.\n\n부산비엔날레 예시, 삼청동 예시, 골목골목사이사이 투어 (학고재) \n\n이사:\n컨셉얘기는 좀 더 내부적으로 정리해서 피드백 드리겠다(이메일)\n각 요소별 <예산>이 궁금하다. 예산적인 이유로 덜어내야한다면 우선순위는 어떻게?\n6, 3억각각 버전씩을 의뢰했던 이유가 어쨌든 예산적인 우선순위?\n플랜B, 저렴,완성버전 차이? \n\n글:\n기획안이 엄청 덜어낸 버전이다. 뭘 덜어내야 하지? 그것도 고민해보겠다.\n\n이사:\n다시 수익, 동절기는 어떻게 할 생각?\n야장은 동절기에는 오프되는건지?\n\n글:\n겨울 야장 감성도 있다. 동절기만의 느낌이 나도록 운영하는 것도 생각하고 있따.\n야외에서 크리스마스 시즌에 맞춰서 하는 것도 꽤나 괜찮다. 동절기에도 가능하다\n\n이사:\n기획안에 동절기 부분도 언급이 되었으면 좋겠다\n그러면 또 예상치못한 추가 예산이 있을 거고, 동절기는 어떻게 생각하신건지 <기획안에 녹아 있으면 좋겠다>\n기존 공간간의 연결성(전시카페), 통일성을\n\n글:\n새롭게 만든 공간에 집중해서 기획안 만든 거고, <기존 공간과의> 연결성 내용도 기획안에 추가해 넣겠다\n\n이사:\n뭔가 타운의 느낌을 줄 수 있는 기존공간까지 연결되는 \n대관 하고픔(5-1, 5-2, 5-3) 대관 수익이 훨씬 더 클텐데 어떻게 하면 어필하면 좋겠다 컨셉과 전략이 있게!\n그런 내용의 코멘트를 해주시면 좋겠다\n\n운영적인 부분에서 대행운영을 해주실 생각? 그런 부분의 마케팅이 포함된 건지? 야장의 워킹만?\n\n글:\n운영과 마케팅은 분리되어 있다. \n\n이사:\n실제로 실행한다고 생각하면 전체 공간을 잡아주는 구심점이 되는 운영이 어떻게 되는건지?\n우리가 선택할 수 있는 운영이 있으면 좋겠다. 어떤 비용, 이떤 스펙? 이런 식으로 갈지? 코워킹으로 갈지?\n여튼 <실제 운영 사항이 기획안>에 들어가면 좋겠다, \n<><>><><>\n2. 오늘 중에 피드백을 드리도록 하겠다.\n3. PT 일정을 잡아야 할 것 같다 >>> 5/15~16 중 희망\n유대표님이 참석여부 > 이사: 2회 중에 한 번은 참석해주시면 좋겠다.\n\n차주에 대표님 들어오면 같이 정리 해보겠다.\n금요일 정도 \n\n일정 피드백, \n\n이사:\n용산뿐만 아니라 중장기적인 것도 \n여기서 커피장사, 술장사하려고 한 건 아니다. 좀더 큰 그림이 들어간 내용이 좋겠다.\nE.O.D 장기적인 키워드도 들어가면 좋지 않을까?\n\n\n대표님:\n큰 창고공간은 다르게 활용할 수 있어서, 대로변 건ㅁ은 공간 초록 빌딩도 활용이 가능하다\n\n필로티아래 공간은 완전히 야외잖아요. 거기 구조물들은 어떤 재질이나 미디엄??\n\n글:\n계속 바뀌겠죠? 그것에 대한 것도 추가해 놓겠다. \n\n이사님:\n조금만 더 구체적으로 언급해주실 수 잇는 부분으로 넣으먄 좋겠다 기획안에 \n\n오늘 오후에 정리해서 드리겠다\n\n\n\n.----------------------------------------------------------------------------------------------------------------------\n2차. 이사님과 미팅\n\n메일 요청 사항은 무엇\n\n\n1. 컨셉\n기존공간과 묶여있을 수 있도록 한 타운으로 묶일 수 있게끔 통일성을 기획안에서 보완해달라\n(실제적인 동선, 설계)\n\n5-2, 5-3 금성출판사 전시공간이 아니라 (다르게 활용)\n5-1(초록건물)이나 6-1(블랙건물)쪽으로 갈 수 있으면 좋겠다 가능하다면\n\n대표님: 불, 빛 요소가 굳이 네이밍이 안되어도 될 것 같다. 굳이 드러나지 않아도 될 것같다\n회장님이 말씀하신 <벚꽃나무가 책나무>이기도 하다 옛날 레트로 로고와 책나무인게 밝혀진다 금성의 상징이 되는 벚나무\n벚나무가 조명만 있는 게 아니라 <책나무>라서 거기에 있는 것이다\n \n폭포는 사람은 많이 오겠지만, 너무 맥락이 없으면 흐름이 뚝 끊길 것 같다. \n(물이 천장에 똒똑같은 미디어아트도 가능)  > (속: 폭포가 맘에 안듬)\n폭포를 하는데 너무 많이 돈이 들어가면 그냥 그렇지.. \n\n<폭포가 언급하지는 않되, 연결성을 언급해달라 \n<출판사 로서가지고 잇는 해리티지가 좀 더 기획안에 담겨있으면 좋겠다 - 책나무 스토리텔링> 코멘트 \n\n\n대표님: 카페는 더는 필요없고, 경험형 전시이면 좋을 것 같다.\n다른 전시실을 하나 더한다면 관리가 되어야 하는 상황인데, (옛날 필름이나 책 )\n\n2. 예산\n각 요소별 예산을 쪼개서 알려달라 (최소, 최대치가 각각 포함 대략적으로라도)\n각 요소별의 우선순위 > 우리가 다하지 못할 수 있기 때문에\n한다면 몇개씩 픽한다면 어떻게 믹스하면 좋을지?\n(예상컨데 5억정도이지 않을까?)\n\n\n\n3. 운영\n이사님: 디테일한 요소들을 요청할 예정\n실제로 운영은 어떻게 되는지? 자재들은 외부환경에서 될지?\n(cctv 많은 사람들이 왔는데 아무도 없으면 관리가 안될 거 같아서 책을 냅다 꽂는 걸로 생각하신 건지?)\n테마가 존마다 실제 책과 아카이브 자료가 깊게 고민안함 > \n<카페가 2개인건 원하지 않는다> \n\n제대로된 금성을 보여주셔야 하는데 풰이크는 안대(있으나 마나)\n출판사가 \n\n야장도 디테일이 떨어진다. 동절기 하절기에 대해 명확한 \n야장 야외 전시 부분, 수도 전기 최소화하려는 건데  \n\n마케팅도 어떻게 설계가 되는 건지? 어떤 시스템이 잇는건지? 기간단위 건별로? \n\n2~3 일정 두 세개 정도로 받고 픽스 (5/15~16)", "category": "기타", "tags": []}, {"id": 99, "filename": "새 텍스트 문서.txt", "date": "2025-01-01", "title": "새 텍스트 문서", "content": "", "category": "기타", "tags": []}, {"id": 100, "filename": "조민근 감독.txt", "date": "2025-01-01", "title": "조민근 감독", "content": "1)영상\n- 조민근 감독(56K)\n- 촬영 일정\n  · 토요일 오후 2~4시 (2H), 오후 1시에 방문 예정\n  · 일요일 오후 1~5시 (4H)\n- 영상 구성\n  · 영상 1개 / 1분 이내의 가로 영상+백그라운드 영상(토+일 행사 통합)\n- 제작비: 150만원(개인사업자/ 별도VAT) \n- 영상 수급 후 일주일 내 지급\n\n\n2) 사진\n- 토요일(10/18): 확인 중\n- 일요일(10/19): 확정 완료: (이정빈 작가_팀서화 추천), (황인호 작가_코대표 추천)\n\n\n\n감독님 안녕하세요.\n방금 연락드렸던 금성출판사 김용수입니다 :)\n\n내일부터 이틀간 촬영 잘 부탁드 function getSetting(k, def) { try { return JSON.parse(localStorage.getItem(k)) ?? def; } catch { return def; } }
function setSetting(k, v) { localStorage.setItem(k, JSON.stringify(v)); }

function getCategories() { return getSetting('cats', DEFAULT_CATS); }
function getLocalMeetings() { return getSetting('meetings_custom', []); }
function saveLocalMeetings(arr) { setSetting('meetings_custom', arr); pushToGist(arr); }
function getGeminiKey() { return localStorage.getItem('gemini_key') || ''; }
function getGistToken() { return localStorage.getItem('gist_token') || ''; }
function getGistId() { return localStorage.getItem('gist_id') || ''; }

async function fetchFromGist() {
  const token = getGistToken(), id = getGistId();
  if (!token || !id) return;
  try {
    const res = await fetch(`https://api.github.com/gists/${id}`, {
      headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json' }
    });
    if (!res.ok) throw new Error('fetch failed');
    const data = await res.json();
    const file = data.files && data.files['meeting_notes.json'];
    if (file && file.content) {
      const arr = JSON.parse(file.content);
      setSetting('meetings_custom', arr);
    }
  } catch(e) { console.warn('Gist 불러오기 실패, 로컬 데이터 사용:', e); }
}

async function pushToGist(arr) {
  const token = getGistToken(), id = getGistId();
  if (!token || !id) return;
  try {
    await fetch(`https://api.github.com/gists/${id}`, {
      method: 'PATCH',
      headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' },
      body: JSON.stringify({ files: { 'meeting_notes.json': { content: JSON.stringify(arr) } } })
    });
  } catch(e) { console.warn('Gist 저장 실패:', e); }
}

async function createNewGist() {
  const token = document.getElementById('gistTokenInput').value.trim();
  if (!token) { alert('먼저 GitHub Token을 입력해주세요.'); return; }
  const statusEl = document.getElementById('gistStatusMsg');
  statusEl.style.color = '#888';
  statusEl.textContent = '생성 중...';
  try {
    const res = await fetch('https://api.github.com/gists', {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' },
      body: JSON.stringify({ description: '회의록 데이터', public: false, files: { 'meeting_notes.json': { content: JSON.stringify(getLocalMeetings()) } } })
    });
    if (!res.ok) throw new Error('create failed');
    const data = await res.json();
    document.getElementById('gistIdInput').value = data.id;
    statusEl.style.color = '#43a047';
    statusEl.textContent = '✓ Gist 생성 완료! 저장 버튼을 눌러주세요.';
  } catch(e) {
    statusEl.style.color = '#e53935';
    statusEl.textContent = '✗ 생성 실패. Token 권한을 확인해주세요.';
  }
}

function getAllMeetings() {
  const local = getLocalMeetings();
  const localMap = {};
  local.forEach(m => { localMap[m.id] = m; });
  const result = [];
  PRELOADED.forEach(m => {
    if (localMap[m.id]) { if (!localMap[m.id]._deleted) result.push(localMap[m.id]); }
    else result.push(m);
  });
  local.forEach(m => {
    if (!m._deleted && !PRELOADED.find(p => p.id === m.id)) result.push(m);
  });
  return result;
}

function findMeeting(id) {
  const local = getLocalMeetings().find(m => m.id === id);
  if (local && !local._deleted) return local;
  return PRELOADED.find(m => m.id === id);
}

// ─── Category color (auto-assign for custom) ─────────────
const COLOR_POOL = ['#d32f2f','#7b1fa2','#1565c0','#2e7d32','#e65100','#00695c','#4527a0','#37474f','#f9a825','#ad1457'];
function getCatColor(cat) {
  if (CAT_COLORS[cat]) return CAT_COLORS[cat];
  const cats = getCategories();
  return COLOR_POOL[cats.indexOf(cat) % COLOR_POOL.length] || '#888';
}

// ─── Populate selects ────────────────────────────────────
function populateCatSelects() {
  const cats = getCategories();
  const filterEl = document.getElementById('catFilter');
  const fCatEl = document.getElementById('fCat');
  const savedVal = fCatEl.value;
  filterEl.innerHTML = '<option value="">전체 분류</option>' + cats.map(c => `<option>${c}</option>`).join('');
  fCatEl.innerHTML = cats.map(c => `<option>${c}</option>`).join('');
  if (cats.includes(savedVal)) fCatEl.value = savedVal;
}

// ─── Render cards ────────────────────────────────────────
function renderCards() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const cat = document.getElementById('catFilter').value;
  const sort = document.getElementById('sortOpt').value;
  let data = getAllMeetings();

  if (q) data = data.filter(m =>
    m.title.toLowerCase().includes(q) ||
    (m.content || '').toLowerCase().includes(q) ||
    (m.category || '').toLowerCase().includes(q)
  );
  if (cat) data = data.filter(m => m.category === cat);

  if (sort === 'date-asc') data.sort((a,b) => a.date.localeCompare(b.date));
  else if (sort === 'title') data.sort((a,b) => a.title.localeCompare(b.title));
  else data.sort((a,b) => b.date.localeCompare(a.date));

  document.getElementById('statsText').textContent = `총 ${data.length}건`;
  const grid = document.getElementById('cardGrid');

  if (!data.length) {
    grid.innerHTML = '<div class="no-results">검색 결과가 없어요 😅</div>';
    return;
  }

  grid.innerHTML = data.map(m => {
    const preview = (m.content || '').replace(/\n+/g, ' ').slice(0, 150);
    const cat = m.category || '기타';
    const color = getCatColor(cat);
    return `<div class="card" data-cat="${esc(cat)}" style="border-top-color:${color}" onclick="openDetail(${m.id})">
      <div class="card-meta">
        <span class="card-date">📅 ${m.date}</span>
        <span class="card-cat" style="background:${color}22;color:${color}">${esc(cat)}</span>
      </div>
      <div class="card-title">${esc(m.title)}</div>
      <div class="card-preview">${esc(preview)}</div>
      <div class="card-actions">
        <button class="btn-sm btn-edit" onclick="event.stopPropagation();openEdit(${m.id})">✏️ 편집</button>
        <button class="btn-sm btn-del" onclick="event.stopPropagation();deleteCard(${m.id})">🗑</button>
      </div>
    </div>`;
  }).join('');
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Detail ──────────────────────────────────────────────
let detailId = null;
function openDetail(id) {
  const m = findMeeting(id);
  if (!m) return;
  detailId = id;
  document.getElementById('dTitle').textContent = m.title;
  document.getElementById('dMeta').textContent = `${m.date} · ${m.category || '기타'}`;
  document.getElementById('dContent').innerHTML = m.content || '';
  openModal('detailModal');
}
function editFromDetail() { closeModal('detailModal'); openEdit(detailId); }

// ─── Rich text formatting ─────────────────────────────────
function fmt(cmd) {
  document.getElementById('fContent').focus();
  document.execCommand(cmd, false, null);
  triggerAutoSave();
}
function applyFontSize(val) {
  if (!val) return;
  document.getElementById('fContent').focus();
  document.execCommand('fontSize', false, val);
  document.getElementById('fFontSize').value = '';
  triggerAutoSave();
}
function applyFontColor(val) {
  document.getElementById('fContent').focus();
  document.execCommand('foreColor', false, val);
  triggerAutoSave();
}
function applyBgColor(val) {
  document.getElementById('fContent').focus();
  document.execCommand('hiliteColor', false, val);
  triggerAutoSave();
}

// ─── Auto-save logic ──────────────────────────────────────
let editingId = null;
let autoSaveTimer = null;

function triggerAutoSave() {
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => {
    performSave(true);
  }, 1200); // 1.2초 후 자동 저장
}

function performSave(isAuto = false) {
  const date = document.getElementById('fDate').value || new Date().toISOString().slice(0,10);
  const title = document.getElementById('fTitle').value.trim();
  const content = document.getElementById('fContent').innerHTML.trim();
  const cat = document.getElementById('fCat').value;

  if (!title && !content) return; // 빈 경우 저장 안 함

  const locals = getLocalMeetings();

  if (editingId !== null) {
    const idx = locals.findIndex(m => m.id === editingId);
    if (idx >= 0) {
      locals[idx] = { ...locals[idx], date, title, content, category: cat };
    } else {
      const orig = PRELOADED.find(m => m.id === editingId) || {};
      locals.push({ ...orig, date, title, content, category: cat });
    }
  } else {
    // New card: create ID on first save, reuse on subsequent
    if (!window._newCardId) window._newCardId = Date.now();
    const existIdx = locals.findIndex(m => m.id === window._newCardId);
    if (existIdx >= 0) {
      locals[existIdx] = { ...locals[existIdx], date, title, content, category: cat };
    } else {
      locals.push({ id: window._newCardId, date, title, content, category: cat, tags: [], filename: '' });
    }
    editingId = window._newCardId; // 이후엔 이 ID로 덮어쓰기
  }

  saveLocalMeetings(locals);
  renderCards();

  if (isAuto) {
    const msg = document.getElementById('autosaveMsg');
    msg.classList.add('show');
    setTimeout(() => msg.classList.remove('show'), 2000);
  }
}

// ─── Open new / edit ─────────────────────────────────────
function openNew() {
  editingId = null;
  window._newCardId = null;
  document.getElementById('modalTitle').textContent = '✍️ 새 회의록';
  document.getElementById('fDate').value = new Date().toISOString().slice(0,10);
  document.getElementById('fTitle').value = '';
  document.getElementById('fContent').innerHTML = '';
  populateCatSelects();
  const cats = getCategories();
  document.getElementById('fCat').value = cats[0] || '기타';
  clearTimeout(autoSaveTimer);
  openModal('editModal');
}

function openEdit(id) {
  const m = findMeeting(id);
  if (!m) return;
  editingId = id;
  window._newCardId = null;
  document.getElementById('modalTitle').textContent = '✏️ 회의록 편집';
  document.getElementById('fDate').value = m.date;
  document.getElementById('fTitle').value = m.title;
  document.getElementById('fContent').innerHTML = m.content || '';
  populateCatSelects();
  const cats = getCategories();
  document.getElementById('fCat').value = cats.includes(m.category) ? m.category : (cats[0] || '기타');
  clearTimeout(autoSaveTimer);
  openModal('editModal');
}

function deleteCard(id) {
  if (!confirm('이 회의록을 삭제할까요?')) return;
  const locals = getLocalMeetings();
  const idx = locals.findIndex(m => m.id === id);
  if (idx >= 0) { locals.splice(idx, 1); }
  else { locals.push({ id, _deleted: true }); }
  saveLocalMeetings(locals);
  renderCards();
}

// ─── Settings ────────────────────────────────────────────
function openSettings() {
  renderCatList();
  document.getElementById('geminiKeyInput').value = getGeminiKey();
  document.getElementById('gistTokenInput').value = getGistToken();
  document.getElementById('gistIdInput').value = getGistId();
  document.getElementById('gistStatusMsg').textContent = '';
  openModal('settingsModal');
}

function renderCatList() {
  const cats = getCategories();
  document.getElementById('catListEl').innerHTML = cats.map((c, i) => {
    const color = getCatColor(c);
    return `<div class="cat-item">
      <span class="cat-dot" style="background:${color}"></span>
      <span>${esc(c)}</span>
      <button class="btn-cat-del" onclick="removeCategory(${i})" title="삭제">×</button>
    </div>`;
  }).join('');
}

function addCategory() {
  const input = document.getElementById('newCatInput');
  const name = input.value.trim();
  if (!name) return;
  const cats = getCategories();
  if (cats.includes(name)) { alert('이미 있는 분류예요!'); return; }
  cats.push(name);
  setSetting('cats', cats);
  input.value = '';
  renderCatList();
  populateCatSelects();
}

function removeCategory(idx) {
  const cats = getCategories();
  if (cats.length <= 1) { alert('분류는 최소 1개 필요해요!'); return; }
  cats.splice(idx, 1);
  setSetting('cats', cats);
  renderCatList();
  populateCatSelects();
  renderCards();
}

function saveSettings() {
  const key = document.getElementById('geminiKeyInput').value.trim();
  localStorage.setItem('gemini_key', key);
  const token = document.getElementById('gistTokenInput').value.trim();
  const gistId = document.getElementById('gistIdInput').value.trim();
  localStorage.setItem('gist_token', token);
  localStorage.setItem('gist_id', gistId);
  closeModal('settingsModal');
  populateCatSelects();
  renderCards();
}

// ─── Modal helpers ───────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', function(e) {
    if (e.target === this) {
      if (this.id === 'editModal') performSave(false); // 닫을 때도 저장
      this.classList.remove('open');
    }
  });
});

// ─── Init ────────────────────────────────────────────────
populateCatSelects();
if (getGistToken() && getGistId()) {
  fetchFromGist().then(() => renderCards());
} else {
  renderCards();
}
</script>
</body>
