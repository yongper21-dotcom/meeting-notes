<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📋 회의록 관리</title>
<style>
:root {
  --bg: #f0f2f5;
  --header-bg: #1a1a2e;
  --accent: #4f46e5;
  --text: #1e1e2e;
  --text-light: #666;
  --border: #e0e0e0;
  --shadow: 0 2px 12px rgba(0,0,0,0.10);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

header {
  background: var(--header-bg);
  color: #fff;
  padding: 0 32px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  gap: 12px;
}
header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; white-space: nowrap; }
header h1 span { color: #a5b4fc; }
.header-actions { display: flex; gap: 8px; align-items: center; }
.btn-new {
  background: #4f46e5; color: #fff; border: none;
  padding: 9px 18px; border-radius: 8px; font-size: 14px;
  font-weight: 600; cursor: pointer; transition: background 0.2s;
  white-space: nowrap;
}
.btn-new:hover { background: #4338ca; }
.btn-settings {
  background: rgba(255,255,255,0.12); color: #fff; border: none;
  padding: 9px 14px; border-radius: 8px; font-size: 16px;
  cursor: pointer; transition: background 0.2s;
}
.btn-settings:hover { background: rgba(255,255,255,0.22); }

.toolbar {
  padding: 16px 32px 10px;
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  background: var(--bg); position: sticky; top: 64px; z-index: 90;
}
.search-box {
  flex: 1; min-width: 200px; padding: 9px 14px;
  border: 1.5px solid var(--border); border-radius: 8px;
  font-size: 14px; background: #fff; outline: none; transition: border 0.2s;
}
.search-box:focus { border-color: var(--accent); }
.filter-select {
  padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 8px;
  font-size: 14px; background: #fff; outline: none; cursor: pointer; color: var(--text);
}
.stats { font-size: 13px; color: var(--text-light); margin-left: auto; white-space: nowrap; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 16px; padding: 14px 32px 40px;
}

/* Card colors by category */
.card {
  background: #fffde7; border-radius: 10px; padding: 16px;
  box-shadow: var(--shadow); cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  border-top: 4px solid #fbc02d;
  display: flex; flex-direction: column; gap: 8px; min-height: 150px;
}
.card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
.card[data-cat="임원회의"] { border-top-color: #e53935; background: #fff8f8; }
.card[data-cat="팀서화"]   { border-top-color: #8e24aa; background: #fdf8ff; }
.card[data-cat="KCS"]      { border-top-color: #1e88e5; background: #f0f7ff; }
.card[data-cat="글로우서울"]{ border-top-color: #43a047; background: #f1fff4; }
.card[data-cat="주간회의"] { border-top-color: #fb8c00; background: #fff8f0; }
.card[data-cat="팀장회의"] { border-top-color: #00897b; background: #f0fdfb; }
.card[data-cat="미팅"]     { border-top-color: #5e35b1; background: #f8f4ff; }
.card[data-cat="회의"]     { border-top-color: #546e7a; background: #f5f8fa; }

.card-meta { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
.card-date { font-size: 11px; color: var(--text-light); font-weight: 500; }
.card-cat {
  font-size: 11px; padding: 2px 8px; border-radius: 20px;
  font-weight: 600; background: rgba(0,0,0,0.07); color: var(--text); white-space: nowrap;
}
.card-title { font-size: 14px; font-weight: 700; line-height: 1.4; }
.card-preview {
  font-size: 12px; color: var(--text-light); line-height: 1.6; flex: 1;
  overflow: hidden; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical;
}
.card-actions { display: flex; gap: 6px; justify-content: flex-end; margin-top: 4px; }
.btn-sm {
  font-size: 11px; padding: 4px 10px; border-radius: 6px;
  border: none; cursor: pointer; font-weight: 600; transition: 0.15s;
}
.btn-edit { background: #e8eaf6; color: #3949ab; }
.btn-edit:hover { background: #c5cae9; }
.btn-del  { background: #fce4ec; color: #c62828; }
.btn-del:hover  { background: #ef9a9a; }

/* Modals */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.45); z-index: 200;
  align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: #fff; border-radius: 16px;
  width: 90%; max-width: 700px; max-height: 92vh;
  overflow-y: auto; padding: 28px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  display: flex; flex-direction: column; gap: 14px;
}
.modal h2 { font-size: 19px; font-weight: 700; }
.form-row { display: flex; gap: 12px; }
.form-group { display: flex; flex-direction: column; gap: 5px; flex: 1; }
.form-group label { font-size: 12px; font-weight: 600; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; }
.form-group input, .form-group select, .form-group textarea {
  padding: 9px 13px; border: 1.5px solid var(--border);
  border-radius: 8px; font-size: 14px; font-family: inherit;
  outline: none; transition: border 0.2s; color: var(--text);
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
.form-group textarea { min-height: 260px; resize: vertical; line-height: 1.7; }
.editor-toolbar {
  display: flex; flex-wrap: wrap; gap: 4px; align-items: center;
  padding: 6px 10px; background: var(--bg); border: 1.5px solid var(--border);
  border-radius: 8px 8px 0 0; border-bottom: none;
}
.editor-toolbar button {
  background: none; border: 1px solid transparent; border-radius: 5px;
  padding: 3px 8px; font-size: 13px; cursor: pointer; color: var(--text);
  font-family: inherit; transition: 0.15s; min-width: 28px;
}
.editor-toolbar button:hover { background: #e8e8f0; border-color: var(--border); }
.editor-toolbar button.active { background: #dde0ff; border-color: var(--accent); color: var(--accent); }
.editor-toolbar select {
  padding: 3px 6px; border: 1px solid var(--border); border-radius: 5px;
  font-size: 13px; font-family: inherit; background: #fff; color: var(--text); cursor: pointer;
}
.editor-toolbar .sep { width: 1px; height: 20px; background: var(--border); margin: 0 2px; }
.editor-toolbar label { font-size: 12px; color: var(--text-light); cursor: pointer; display: flex; align-items: center; gap: 3px; }
.editor-toolbar input[type=color] { width: 24px; height: 24px; border: 1px solid var(--border); border-radius: 4px; padding: 1px; cursor: pointer; }
#fContent {
  min-height: 260px; max-height: 400px; overflow-y: auto;
  padding: 9px 13px; border: 1.5px solid var(--border);
  border-radius: 0 0 8px 8px; font-size: 14px; font-family: inherit;
  outline: none; transition: border 0.2s; color: var(--text);
  line-height: 1.7; white-space: pre-wrap; word-break: break-word;
}
#fContent:focus { border-color: var(--accent); }
#fContent:empty:before { content: attr(data-placeholder); color: #aaa; pointer-events: none; }
.modal-actions { display: flex; gap: 10px; justify-content: space-between; align-items: center; }
.autosave-msg { font-size: 12px; color: #43a047; font-weight: 600; opacity: 0; transition: opacity 0.4s; }
.autosave-msg.show { opacity: 1; }
.btn-cancel { background: #f5f5f5; color: var(--text); border: none; padding: 9px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
.btn-primary { background: var(--accent); color: #fff; border: none; padding: 9px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
.btn-primary:hover { background: #4338ca; }

/* Detail modal */
.detail-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.detail-header-left .d-meta { font-size: 12px; color: #888; margin-bottom: 4px; }
.detail-header-left .d-title { font-size: 20px; font-weight: 700; }
.detail-header-right { display: flex; gap: 6px; flex-shrink: 0; }
.detail-content {
  white-space: pre-wrap; font-size: 14px; line-height: 1.8;
  color: var(--text); background: var(--bg); padding: 16px;
  border-radius: 8px; max-height: 55vh; overflow-y: auto;
  border: 1px solid var(--border);
  font-family: 'Malgun Gothic', 'Noto Sans KR', monospace;
}

/* Settings modal */
.settings-modal { max-width: 480px; }
.section-title { font-size: 13px; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.cat-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.cat-item {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg); border-radius: 8px; padding: 8px 12px;
}
.cat-item span { flex: 1; font-size: 14px; font-weight: 500; }
.cat-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.btn-cat-del {
  background: none; border: none; color: #ccc; cursor: pointer; font-size: 16px;
  padding: 2px 4px; border-radius: 4px; transition: 0.15s; line-height: 1;
}
.btn-cat-del:hover { color: #e53935; background: #fce4ec; }
.cat-add-row { display: flex; gap: 8px; }
.cat-add-row input {
  flex: 1; padding: 8px 12px; border: 1.5px solid var(--border);
  border-radius: 8px; font-size: 14px; font-family: inherit; outline: none;
}
.cat-add-row input:focus { border-color: var(--accent); }
.btn-add-cat {
  background: var(--accent); color: #fff; border: none; padding: 8px 16px;
  border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
  white-space: nowrap;
}
.divider { border: none; border-top: 1px solid var(--border); margin: 4px 0; }

/* API key */
.api-section input {
  width: 100%; padding: 9px 13px; border: 1.5px solid var(--border);
  border-radius: 8px; font-size: 13px; font-family: monospace; outline: none;
}
.api-section input:focus { border-color: var(--accent); }
.api-hint { font-size: 11px; color: #888; margin-top: 4px; }
.api-hint a { color: var(--accent); }

.no-results { grid-column: 1/-1; text-align: center; padding: 60px; color: var(--text-light); font-size: 15px; }

@media (max-width: 600px) {
  .grid { grid-template-columns: 1fr; padding: 10px 14px 32px; }
  .toolbar { padding: 12px 14px 8px; }
  header { padding: 0 14px; }
  .form-row { flex-direction: column; }
  .modal { padding: 20px; }
}
</style>
</head>
<body>

<header>
  <h1>📋 회의록 <span>관리</span></h1>
  <div class="header-actions">
    <button class="btn-settings" onclick="openSettings()" title="설정">⚙️</button>
    <button class="btn-new" onclick="openNew()">＋ 새 회의록</button>
  </div>
</header>

<div class="toolbar">
  <input class="search-box" type="text" id="searchInput" placeholder="🔍 제목, 내용으로 검색..." oninput="renderCards()">
  <select class="filter-select" id="catFilter" onchange="renderCards()">
    <option value="">전체 분류</option>
  </select>
  <select class="filter-select" id="sortOpt" onchange="renderCards()">
    <option value="date-desc">최신순</option>
    <option value="date-asc">오래된순</option>
    <option value="title">제목순</option>
  </select>
  <span class="stats" id="statsText"></span>
</div>

<div class="grid" id="cardGrid"></div>

<!-- ── New / Edit Modal ── -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h2 id="modalTitle">✍️ 새 회의록</h2>
    <div class="form-row">
      <div class="form-group">
        <label>날짜</label>
        <input type="date" id="fDate" oninput="triggerAutoSave()">
      </div>
      <div class="form-group">
        <label>분류</label>
        <select id="fCat" onchange="triggerAutoSave()"></select>
      </div>
    </div>
    <div class="form-group">
      <label>제목</label>
      <input type="text" id="fTitle" placeholder="회의 제목을 입력하세요" oninput="triggerAutoSave()">
    </div>
    <div class="form-group">
      <label>상세 내용</label>
      <div class="editor-toolbar">
        <select id="fFontSize" onchange="applyFontSize(this.value)" title="폰트 크기">
          <option value="">크기</option>
          <option value="1">매우 작게</option>
          <option value="2">작게</option>
          <option value="3">보통</option>
          <option value="4">크게</option>
          <option value="5">매우 크게</option>
          <option value="6">더 크게</option>
          <option value="7">최대</option>
        </select>
        <div class="sep"></div>
        <button onclick="fmt('bold')" title="굵게 (Ctrl+B)"><b>B</b></button>
        <button onclick="fmt('italic')" title="기울임 (Ctrl+I)"><i>I</i></button>
        <button onclick="fmt('underline')" title="밑줄 (Ctrl+U)"><u>U</u></button>
        <button onclick="fmt('strikeThrough')" title="취소선"><s>S</s></button>
        <div class="sep"></div>
        <label title="글자 색상">
          A <input type="color" id="fFontColor" value="#000000" onchange="applyFontColor(this.value)">
        </label>
        <label title="글자 배경색">
          <span style="background:#ffeb3b;padding:0 3px;border-radius:2px">A</span>
          <input type="color" id="fBgColor" value="#ffeb3b" onchange="applyBgColor(this.value)">
        </label>
        <div class="sep"></div>
        <button onclick="fmt('removeFormat')" title="서식 초기화">✕</button>
      </div>
      <div id="fContent"
        contenteditable="true"
        data-placeholder="회의 내용을 자유롭게 작성하세요...&#10;&#10;예) 주요 안건, 결정 사항, 액션 아이템 등"
        oninput="triggerAutoSave()"></div>
    </div>
    <div class="modal-actions">
      <span class="autosave-msg" id="autosaveMsg">✓ 자동 저장됨</span>
      <div style="display:flex;gap:10px">
        <button class="btn-cancel" onclick="closeModal('editModal')">닫기</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Detail Modal ── -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="detail-header">
      <div class="detail-header-left">
        <div class="d-meta" id="dMeta"></div>
        <div class="d-title" id="dTitle"></div>
      </div>
      <div class="detail-header-right">
        <button class="btn-sm btn-edit" onclick="editFromDetail()">✏️ 편집</button>
        <button class="btn-sm btn-del" onclick="closeModal('detailModal')">✕</button>
      </div>
    </div>
    <div class="detail-content" id="dContent"></div>
  </div>
</div>

<!-- ── Settings Modal ── -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal settings-modal">
    <h2>⚙️ 설정</h2>

    <div>
      <div class="section-title">📂 분류 관리</div>
      <div class="cat-list" id="catListEl"></div>
      <div class="cat-add-row">
        <input type="text" id="newCatInput" placeholder="새 분류 이름..." onkeydown="if(event.key==='Enter')addCategory()">
        <button class="btn-add-cat" onclick="addCategory()">＋ 추가</button>
      </div>
    </div>

    <hr class="divider">

    <div class="api-section">
      <div class="section-title">🤖 Gemini AI (선택)</div>
      <p style="font-size:13px;color:#666;margin-bottom:8px">API 키를 입력하면 회의록 요약 기능이 활성화됩니다.</p>
      <input type="password" id="geminiKeyInput" placeholder="AIza...">
      <p class="api-hint">
        무료 키 발급: <a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI Studio</a>
        → "Get API key" 클릭
      </p>
    </div>

    <hr class="divider">

    <div class="api-section">
      <div class="section-title">☁️ GitHub Gist 동기화 (선택)</div>
      <p style="font-size:13px;color:#666;margin-bottom:8px">설정하면 어느 기기에서도 같은 회의록을 볼 수 있습니다.</p>
      <div style="display:flex;flex-direction:column;gap:8px">
        <div>
          <label style="font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px">GitHub Personal Access Token</label>
          <input type="password" id="gistTokenInput" placeholder="ghp_..." style="width:100%;margin-top:4px;padding:9px 13px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:14px;outline:none">
        </div>
        <div>
          <label style="font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px">Gist ID</label>
          <div style="display:flex;gap:8px;margin-top:4px">
            <input type="text" id="gistIdInput" placeholder="Gist ID (자동 입력 또는 직접 입력)" style="flex:1;padding:9px 13px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:14px;outline:none">
            <button class="btn-sm btn-edit" onclick="createNewGist()" style="padding:9px 14px;font-size:13px;white-space:nowrap">새 Gist 만들기</button>
          </div>
        </div>
        <span id="gistStatusMsg" style="font-size:12px;color:#43a047;font-weight:600;min-height:18px"></span>
      </div>
      <p class="api-hint">토큰 발급: <a href="https://github.com/settings/tokens/new?scopes=gist&description=meeting-notes" target="_blank">GitHub Settings</a> → gist 권한 체크 → Generate token</p>
    </div>

    <div class="modal-actions">
      <span></span>
      <div style="display:flex;gap:8px">
        <button class="btn-cancel" onclick="closeModal('settingsModal')">닫기</button>
        <button class="btn-primary" onclick="saveSettings()">저장</button>
      </div>
    </div>
  </div>
</div>

<script>
// ─── Constants ───────────────────────────────────────────
const DEFAULT_CATS = ['임원회의','팀서화','KCS','글로우서울','주간회의','팀장회의','미팅','회의','기타'];
const CAT_COLORS = {
  '임원회의':'#e53935','팀서화':'#8e24aa','KCS':'#1e88e5',
  '글로우서울':'#43a047','주간회의':'#fb8c00','팀장회의':'#00897b',
  '미팅':'#5e35b1','회의':'#546e7a','기타':'#fbc02d'
};

(벚꽂피는 4월부터 다시 별고)\n\n회: 대관사업이 만만치 않다. 타이트하게 하려고 해도 쉽지 않다.\n    \n글: 사람을 먼저 모으고, 대관도 가능하다. 푸드영업이 그런 의미에서 가장 중요하다. 그런 힙한거에 민감한 사람이 오냐나 문제, 한 두달정도는 처음 모객이 될만한 걸 임대료 안받고, 맘대로 장사하고 (대관), \n\n희: lg에서 제안이 들어온 건데, \n\n발: 메뉴는 단톡개발을 할거다\n\n글: 1년 동안 야장은 7개월 반정도만 운영한다\n\n회: 양옥집??? 재밌게?\n\n<정동야행>\n\n\n\n\n-------------------------\n\n회: 우리 금성출판사의 문화공간임이 강조되었으면 좋겠다 + 예술적인 공간임을 추가\n글: 아트페이팅과 조명, 정도로 쓰고,  \n    주방, 야외용 가구, 설치 \n글: 먹고 마시는 건 광장이나 임대공간에서 먹게끔, 냉난방비는 들어가는 비용(예산안에 반영되어 있음)\n\n회: 주자창 사업은 어떻게? > 이사님: 조기종료는 가능하나 금액 추가가 있다\n글: 주차장이 있으면 사업을 하기가 어려울 것 같다. 대부분 퇴근하고 술드시고 오는 분위기라 \n회: 주차장 수입은 한 달에 백몇십만원 정도 나온다\n\n글: 복잡하고 한 번에 안읽혀야 재밌는 요소, 우리는 이 빌딩이 문이야~\n    조명을 보고 저건 뭔데 하면서 들어가는 요소로 한다. 빌딩들을 통과해서 가보니 이런 분위기\n\n이사: 대형 대문같은 느낌\n       조명은 낮에는 잘 안보인다, \n글: 잘 안보인다. 아쉽지만 낮에는 활동 잘 안하고, 밤에 맞추자\n이사: 데이타임에 어떻게 보여질지 궁금했었다, 유리가 칼라가 들어가는 건지, 낮시간엔 어떻게 보이는지 궁금\n글: 필름을 붙이더라도, 낮에는 그렇게 또렷하진 않다.  저렇게 이쁘게 보이진 않을거다 (낮엔)\n\n이사; 운영도 염두해두고 기획\n\n피엠: 운영방식은 짜서 드릴거고, 마케팅도 별개의 팀이 진행하기에, \n\n글: 운영 전문 외주 업체 소개, 글로우가 직접 운영해주는 방법도 있고, 관련해서 수수료가 생긴다\n글: 인스파이어(통째로 외주 운영 함), 주요 지역은 직영으로 운영함 (용산은 할 수 있음)\n\n회: <운영>에 대한 부분이 정말 중요하다. 쉽지 않다. 이 부분이 필요하다\n 운영에 대한 내용 추가 필요\n\n회: <양옥집> + 애니메이션 \n\n이사: 겨울 시즌? \n글: 겨울 시즌에도 우녕하려면 현실적으로 2억 정도 추가된다.\n실내에서 먹게 하려면 단열이 어느정도 되게끔, 냉난방 용량도 늘려서 해야 한다\n여름에 되는 걸 보고~ 겨울도 꾸준히 해도 좋겠느넫 생각하면 가을쯤에 추가공사해서 ~~ 이어서 해도 된다.\n\n회: 아예 야외라고 인식하면 굳이 실내냉방 안가고 옥외 영\n\n\n회: <어린이>를 위한 공간은 만들기 어렵나??\n글: 여기는 가족들이 오는 공간이 아님, 젊은 회사원들이 업무 끄나고 오는 공간\n회: 우리는 아이들때문에 일어난 회사, \n     cf. 목포 큰 카페, 마당 > 개도 스무마리, 애도 있다.\n    아이들이 뛰어 놀 수 있는 공간이 있으면 >> (글: 모든 걸 잡을 순 없다)\n회: <아이들> <강아지> 가족들이 놀 수 있는 공간이 북토크 \n싹동같은 곳을 아이들이나 놀 수 있는 공간이 되었으면 좋겠다 / 잔디가 주는 느낌이 다르다 \n글: 아이들 오게하는 난이도와 거기에 들어가는 비용이 있고, 폐허와 낡은 건물은 보면 안전하지 않다고 생각.\n    낡은 게 멋이라 설득시키게가 어려움, 인테리어 비용 와왕 있고, 구매도 잘 하지 않는다. 그것은 목적성에 맞지 않기에 \n회: 동화책, 아이들이 놀고 카페에서 엄마들도 지나가게 할 수 있는? >> 아이들이 맘껏 책을 읽고 가게끔... 이 공간이 아깝다\n글: 결국은 다 자금이다. 여기 공간도 꽤 들어갈 거 같다. 잔디밭도 , 인조잔디는 가능\n잘 모르겠다. 그런다고 사람이 올지?\n회: 그냥 생각을 해봤다. > \n이사: 나중에 트레픽이 많아지면 세미나나 대관을 원하는 업체에 컨택\n회: 어쨌든 앞단을 살려놓으면 여기 kcs에도 책을 맘껏 읽는 (애들 가족들을 위한) 공간으로 하고 싶다(몇번씩 얘기했다)\n글: 인조잔디만 깔아도 \n이사: <영도 피아크> 거기도 인조잔디 깔아서 애들이 미친듯이 달렸다.\n글: 인조잔디 추가정도야~ \n\n회: 마무리 따로 \n이사: 다시 피드백 드리겠다. \n이사: 오늘 중에 가급쩍 정리해서 드리겠다. > 가/부여부를 회장님 체크\n\n글로: 장마때 만들고,< 7월에> 오픈\n(장마때 실내부터 만들고 순차오픈을 해도 되는 부분이 있다.\n\n이번 금요일까지 서류가 오면 가/부여부를 확인\n\n회: <방마다 서적> 들어가면 \n글: \n\n회: 벽 뚫을 수 잇는 공간 \n\n-----------------------------------------------------------------------------\n\n이사님: \n1. <매출> 부분은 자료가 미비하다. 계절별, 월별로 된 연간 매출 계획표가 보여야 한다. 우리가 궁금한 건 매출과 <순수익> 보강을 받아야 할 것 같다\n2. <회장님 언급> 대관 금액을 어떻게 설정? 얼마나 구체적으로? 플리마켓도 매출 수익 근거가 부족했다\n대표: 플리마켓은 관여는 안하고 이런 식의 방향도 있어요~ 제시만 하는 듯한 느낌. 자체 운영이 어렵기 때문이 그게 얼마나 많이 <마치 플리마켓>도 애매하게 포함되어서 <무책임>한 것 같다\n이사: 부산 영도 <원지> 창고형 카페, 글로우에서 공간 전체에 대한 영업과 운영을 대 해주시고(운영대행, 대관, 푸드도 모두, 야장도 몇 프로 가져라가 이런 식으로 하는 게 낫지 않겠나?)\n진짜 무책임한 플리마켓이 되게끔 된다.  <운영대행계약서>를 샘플로라도 받아봐야 할 것 같다. 운영이 제일 중요\n대표: 1. 유지비, 운영비도 <전기, 수도> 꽤 들덴테, 대략적으로도 얼마씩 나가는 지 확인이 필요하다.\n 대표:: 동마다 시설관리방법(사람 운영)\n이사: 엑셀표로 된 사업계획표를 달라,, 했었다. > 사업계획표를 달라 (안줬었음)\n인건비, 수도전기비, 음식재료원가, 디테일하게 받아야 한다\n결국 매출 장표가 보강이 되어야 한다. 모든 운영은 너네가 + 너가 피 때고  + 계획서를 줘\n\n냉낭비 고려, 용도변경 고려 여부도 체크받아야 한다.\n이사님: 전시도 이 프로젝트로 진행하면 그때야 구체적으로 \n야외 소재같은 부분도 요청했는데 안되어서, 할지말지가 정해지면 그때 논의해보자 이런 느낌이다\n<계약서>를 받아봐야 알 것 같다. < \n이사님: <실행계약서>, <운영대행계약서> 샘플이라도 받아봐야 우리가 의사결정을 할 수 있다.\n\n예산운영 관련해서 최대한 \n추가로 기획를 요청한다면: <카페쪽에 마당쪽에 좀더 밸류업할 수 있는> 아이디어 전시쪽 좀 더 디벨롭 될 수 있는 부분 아이디어 요청\n\n화제가 될 거 같기도 하고, \n하더라도 8월부터\n\n이사님: 이동 가능한 것들을 활용해보겠다고 말했다. (처음 미팅에 유대표가)\n여기에 투입되는 것들 중에 우리가 재활용 할 수 있는 포인트???\n\n대표: 마케팅이 너무 중요한데,, 대충 설몀로는 안되는데..\n마케팅 \n \n대표: 정말 예술적이고 마이너한 분들이 오기 보다는, 온천집 관광객분들이 온다. 테이스트가 대중적인 분들이 찾아오신다\n꾸미는 건 잘 하실 것 같은데, 그렇게 꾸미면 문화예술쪽 분들이 더 활성화가 될까??? \n아크로문화예술재단, 12월에 하겠다~~ 문화예술분들이 자연스럽게 더 모이게끔하는 게 좋을 것 같다.\n너무 대형폭포 상업화 대형화되면 그런 분들이 찾아봐 주실까???\n너무 많은 대중분들이 오시면 얻는 것과 잃는 것이 있겠다.\n\n\n이사님: 일단 대행 계약서 참고용으로 보고 대단히 특별한 마케팅 계획은 없을 수 있다. 유대표 스타일이 인플루언서 초대 느낌이라 마케팅 대행 안해도 부탁할 수 있는 부분,", "category": "기타", "tags": []}, {"id": 5, "filename": "250525(월) 팀서화 미팅.txt", "date": "2025-05-25", "title": "월) 팀서화 미팅", "content": "2 존 공간 철수\n\n\n7. kcs 건물 전체 기획(예시, 간판)\n - 뿌리동 홍보: 일정한 시간 간격으로 자세를 바꿔가며 책을 읽는 미디어 작업(큰 사이즈) 외관 임팩트/\n - 구역 전체 연결: 일정한 시간 간격으로 책이 한 권씩 빠져나가는 미디어 작업 / 뿌리동보다 작은 사이즈\n - 베를린 ㅇ\n\n8. 다마스 스팟 뒷편 기획(흙 마당 정비))\n   A. 철망 펜스로 백 통일감\n   B. 다마스 구역만 정리하는 안 도 추가 요청\n\n\n\n9. 팀서화 홍보 관련 자료 (전시 관련 자료)\n\n\n10. 도슨트 일정 확인\n내일 임원 도슨트 확인 오후 빠르면 빠를수록 좋다 / 안되면 차주로 넘어감", "category": "팀서화", "tags": []}, {"id": 6, "filename": "250529_글로우서울 미팅 내용.txt", "date": "2025-05-29", "title": "글로우서울 미팅 내용", "content": "v. \n양옥집을 어린이 전용공간으로 하고 싶다.\n \n와이파이 비번 glow1234\n\n작은 책장 컨셉 스토리\n<금성 대도서관>\n - 책 이라는 요소, 역사, 출판, 흔적, \n지역사회의 아동, 교육, 지식 섹션 대도서관 단지를 만들 계획\n천 인쇄물 4 도서를 페브릭 프린팅해서 파사드 설치\n \n\n\n\nv.\n- 골목이 국가도로인데, 거기가 우리가 쓸 수 있는 방법이 있나요?\n답변: 단속이 나올 때 빼고, 하고, 그것에 대한 경계\n- 무슨 무슨길 처럼, 용리단길 처럼, 용산단길(?) 그런 느낌의 명칭이 있으면 좋겠다.\n- 창문에 도서관 \n- 사명감이요,.? (비용보다도 아이디어)\n- 아이러브츠타야\n\n\n\n\n유대표\n※ 금성의 특성이 거리에서(밖) 더 반영되도록 바꿨다.\n- 금성의 역사를 용산에 연결시켜서 책 마을을 만드는 스토리\n  (금성이 있었던 곳을 \n \n- 거리를 특화시키고, 안에 콘텐츠는 간단하게 가는 게 더 좋다. (회님 동의)\n- 책방: 설치하는 건 어렵지 않다. 책만 우리가 협찬해주면 ?\n- 금성출판사 판매, 독립서점, 아키이브 요소라면 할지? 금성이 정리해주면 될 것 같다.\n\n\n- 레이지 파머스: 비용 안들이고 할 수 있는 게 꽃집.\n대도서관 오래전 도서관에 꽃이 피어난, <마담 프루스트의 비밀정원>\n아마 인건비 정도 버는 매출이지 안ㄶ을까?\n인더스트리얼 느낌으로 하기, 가드닝에 관련 서적이나 추가하면 \n글로우에서 투자를 해서 식물샵을 운영해서 (글로우 비용으로 세팅)\n\n- 이번 주에 뿌려뜨려지면 8월 오픈도 가능\n- 되는 것 먼저 하고 프리 오픈하고,\n  시간을 두고 천천히 해 나가도 되지 않을까?\n- 지디가 왔다 갔다고, 서울에서 전시하고 싶다. (지디 후킹)\n- 성수동이 팝업 과잉이니, 성수동이 아닌 곳이 없냐 >>> 용산쪽을 잡아보쟈\n- 엔터사에서도 팝업 보러 왔었다.(하이브)\n\n에프앤비\n- 픽업 전용\n- 화장실 문제 체크 \n\n8월이 오픈이고\n9월이 매출이고 \n\n\n조합원들에게 뭔가 보여줘야 겠다.\n유대표: 5년 걸릴 수도 있다.... \n\n왼쪽 서경배집, 아랫집 이건희 회장님 예전집,\n거기 집 새로 집,ㅎㅎ 10배로 올려올라버렷엉\n\n---------------------------------------------------------------------------------------------  \n\n<진행한다고 하면 넥스트 스텝을 어떻게 해야 하는지?>\n조율이 많이 될 것 같다.\n비용 부분이 계약에 메인으로 들어 간다", "category": "글로우서울", "tags": []}, {"id": 7, "filename": "250613(금) 선임 주간 회의.txt", "date": "2025-06-13", "title": "금) 선임 주간 회의", "content": "1)- 서수원지점 부채 추가 요청\n\n2) - 네이버 브랜드검색광고 \n  결론적으로 미리 현 수준에서 \n 여름방학 시즌 실무적ㅇ인 ㅐㄴ요\n\n\n금성출판사 마케팅팀 \n다시 정비를 해서 \n\nㄹㄴㅇㄹㄹㄴㄻ", "category": "회의", "tags": []}, {"id": 8, "filename": "250617(화) 임원회의 후 회의.txt", "date": "2025-06-17", "title": "화) 임원회의 후 회의", "content": "1. 영상\n- 김윤진 대표는 안한다. \n- 회장님은 11시부터 11\n- 유홍준 교수님 단가 높여서 드리는 걸로 얘기하기로 했다.\n\n\n2. 도서전\n- 우이사님 가고싶어한다.\n- 디자인 팀장, 장미령 팀장?\n\n\n3. SNS 최초의 금성 눙물이 날 거 같다.\n회: 출석해서 용산 아카이브 전시관에서 했으면 좋겠다. 전원 모두에게 커피 기프티콘을 줘야 하는 거 아니냐?\n공문으로도 안내를 했으면 좋겠다. 이 분들께 연락 이걸 받드시 활용해야 한다.  \n조치원 교육에도 쓰고 싶다, 공문, 본사로 모셔도 인터뷰를 하고 싶다.\n>>>> 디벨롭: 살려보겠습니다.\n\n금성의 사회 공헌 활동을 역사교\n출협, 운평교, 전국 소년년글짓기 대회, 중국 윤동조 학교, \n\n앞으로, 공덕동 주민센터 더북센터 3년째 도서 기부, 중국 대련 한국 국제 학교 도서 발송, \n총무팀 이기복 팀장: 이태원 도서 기증의 금성의 사회공헌 활동, 매달이면\n\n\n4. 60주년 행사\n-. 포스트잇 단가를 5천개, 1만개로 추가 저렴하게 가능한지?\n-. 자그만한 잘게 포스트잇\n-. 포스트잇으로 안하고 뜯어쓰는 메모지나 수첩 형태로 갖고와달라\n\n-. 북마크는 그럭저럭 이었다\n\n-. 네트백:\n-. 쇼핑백 \n-. 그때의 수건 \n\n-. 보틀이 너무 괜찮은 거 같다\n샘플 구매해\n- 원하는 적정 가격대는 5천개,\n2500. 5천개 1만개 단가 \n\n- 행사: \n카페에서도 얘기하고 싶어함\n\n의자나 테이블 렌탈도 알아봐야함\n(싹동의 의자와 테이블이 어느정도 있는지 확인 후)\n\n케이터링 \n술? 병맥주랑 탄산음료 세팅도 가능한지?(아카이브앤코)\n\n공연 (김시현 선임, 평택)\n*금성미니역사골든벨: 강남구 50년이 되어서 강남구역사골든벨의 \n반영해 놓겠다.\n\n포토부스 카페에 있을 껄?\n생각해보겠다.\n\n마당이 이뻤으면 좋겠다.\n\n케이터링은 아카이브앤코랑 협의해서 \n식사느낌이 나게끔 구성을 좀 더 변경해야 할지?\n음료를 빼고, 음식을 더 늘릴 ㅅ 잇을지?(내일 미팅으로 확인)ㄴㄴ\n\n\n*피피티 템플릿 얘기해놓기", "category": "임원회의", "tags": []}, {"id": 9, "filename": "250618(수) KCS 코대표님 미팅.txt", "date": "2025-06-18", "title": "수) KCS 코대표님 미팅", "content": "60\n \n2. 행사 관련\n- 준비하고 잇는 행사가 있는지?\n- 150명 정도가 쓸 의자 테이블이 있으지?\nㄴ 의자/테이블\nㄴ 케이터링 / 음료\nㄴ 회장님 포토부스 알고 있는지?\nㄴ 행사 스케치 어땟는지?\n\n\n1. 60주년 영상 관련 \n- 전달: 24일(화) 오후 5시 촬영 장소 확인차 방문 예정\n         7/2(수) 8시반 콜타임 외주 세팅\n\n\n\n\n리스닝파티? 노들섬 소극장?\n60주년 전시? 의견을 여쭙고 싶다.\n\n코 / 행사위주로 생각하고 있다. 주부생활 전시, 에이전시를 끼고라도 전시를 새로 꾸며보고 싶다. \n전시를 업그레이드 시키고 싶다. 보강하는 방식? \n존 2개로 나눠서 아카이브동과 다른 곳 같이 운영하는 방식\n미디어전시가 계획되고 있다???\n\n<지금 아카이브 전시를 리뉴얼할 정도로 해도 나쁘지 않다.>\n전체적인 톤을 다듬어,  조금 더 보여줄 수 있는 책장? 섹션을 추가? 거기서 나오게될 디자인과 \n\n생각하신 다른 공간 후보지?\n초록색, 검은 색 공간\n\n\n<더북소사이어티> \n건축가님과 콘택 > 세미나, 작가토크, <다음 주 쯤 추가 논의 예정> \n그쪽의 입점, 임대공간이 들어올 수 있음(긍정적)\n한국 동시대 그래픽 디자이너 아카이빙, 전시도 가능할 정도로\n>>>> 초록색 공간을 픽\n글로우와 하려다가 안되게 된 걸 할 수도 여기서? 한공간엔 원더로 \n<식물샵 > 식물원을 만든다. 층을 터서 \n\n\n\n<9월 10월>\n팀서화 전시 확정, 예술경영지원센터 전문작가,\n8월22일 시작~2달 운영 예정\n\n10월 18일에 근현대 미술사 학술대회가 있다.\n10월 17일 행사를 해도 괜찮을 듯?\n\n\n-------------------------------------------------------------------------------\n1. 에이전시 후보 추리기 + 오픈은 10월 17일 기준으로 하기\n전시동 리뉴얼 + 추가로 뭘 더 할지?\n아카이브 전시 리뉴얼하고 에이전시를 끼고 해야 한다.\n참고를 해보고 진짜 출판을 좋아할만한 전시를 만들기\nㄴ 7월 초 에이전시 후보들 미팅해보기\nㄴ금성이 계약은 다이렉트로 할 수 있지만, 아카이브앤코가 직접 소통 관리\nTF처럼하면 타이트하게 준비하면 될지 않을까?\n\n\n-------------------------------------------------------------------------------------------\n우리 행사안 \n1. 150명이 빠듯하게 가능\n2. 케이터링 음료는 제하기 / 아키이브앤코에서 하고 어떻게? 소다류 맥주류? 금성에 맞는 음료를 \n3. 포토부스는 렌탈(코대표님 공유주시면 우리) > 싹동\n4. 굿즈: 방향이 잡힌 상태에서 공유드려 볼게요\n  (코대표 에코백은 고민해볼게요?)\n5.스케치촬영 어떤식으로 할지 내부적으로 정리하고    \n\n\n1. 60주년 영상 관련 \n- 전달: 24일(화) 오후 5시 촬영 장소 확인차 방문 예정\n         7/2(수) 8시반 콜타임 외주 세팅\n\n60주년 텍스트가 많이 들어간 전시가 들어갔으면 좋겠다.\n\n\n-------------------------------------------------------------------------------------------\n\n교과서, 사전, 푸르넷 학습지 1개 1개 1개 3개월????????????????????!?!?!?!?!?!?\n써서 뭘 붙여놓고?!?!? 추억을 쌓으면????\n\n학술대회, 앞뒤로 붙여서 북토크?!?!?\n\n2주 기획<글짓기대회를 꼭 해보고 싶다....> / 전시 에이전시와 연계해서 하고 싶다.\n초록건물이나 검정 건물에서 2주만 하고 \n\n환갑잔치. ]\n\n10월 19일(일)요일이 음악있는 공연? 아이디어도 \n\n26일주 글짓기하자, 바닥 분필 그리거나 풍선을 나눠준다던가.\n\n외부행사까지 정리\n\n\n------------------------------------------------\n미디어아트 \n디에어하우스 페스티벌 기다리는 중 (한다면 가을 쯤, 지켜보는 중)\n\n-------------------------------------------------\n7월말 정도 재단과 얘기해서 새로운 도자 전시(6점) 준비하는 중\n\n\n--------------------------------------------------------------------------------", "category": "KCS", "tags": []}, {"id": 10, "filename": "250618(수) 브랜디드 2탄 CSR 활동 정리 중.txt", "date": "2025-06-18", "title": "수) 브랜디드 2탄 CSR 활동 정리 중", "content": "- 도서기부: 1988 소년의 집, 도서관 새마을 문고에책 백만권 보내기 운동 90226권 기부(1993), 새마을 무료 도서실 운영, \n운평교 건립(1988)\n산간 벽지 국민학교에 도서 기증(1988.2.10\n서울역 무료 도서실 운영(1983)\n수재민 도서 무료 교환(1894)\n1987 학교 생활 게시판 설치(300개학교, 30년사 3.373\n도서 기증 (30년사 \n- 독서새물결운동ㅉ\n- 독서대상주관\n\n- 1993 ~ MBC창작동화대상(P.235)\n- MBC 창작동화대상 \n\n\n\n\n- 1987~1992 / 전국 소년소녀 글짓기 대회(금성 주관, KBS 주최, P.227 / 30년사 334~ .477 )\n당시 세계에서 가장 큰 규모의 큰잔치. 회당 16만명 수준 서울 올림픽 주 경기장을 비롯\n\n\n운평문화재단(금성문화재단) \n- 1992~1994: 중국 용정(대성)중학교, 윤동주 기념관 건립, 운평합주대(용정중학교 악대) 창단 지원_(회고록 127, 30년사 462)\n- MBC 창작동화대상 후원(30년사 464~\n- 장학생 선발 지원(30년사 468~\n- 독서대상 주관 (30년사 468\n\n- 1987: 300개 학교 생활게시판 설치(30년사 3373)\n- 2021: 초등교과서 16종, 색약자·저시력자·등 약자를 배려한 컬러유니버셜디자인 적용 'KCUD 교육 분야' 인증 획득\n\n- \n\n\n30년사(372~) 문화 예술 활동 협찬\n\n\n1. 도서기부활동\n- 수 많은 학교에 관공서, 고아원, 재활원, 도서관 등에 기부(488)\n- 1988: 소년의 집(1988, \n\n\n- 2022: 마포 지역 사회 5천만 원 상당 도서 및 장학금 기부\n- 2022: 굿네이버스 업무 협약, 미얀마 아동 및 청소년을 위한 주요 교육 콘텐츠 제공\n- 2023: 세이브더 칠드런 '걷기 캠페인' 연계 도서 기부 (125질, 총 500권, 1천만원 상당)\n- 2025: 공덕동 주민센터, 중국 대련 국제 학교\n\n\n기타\n아동안전지키미", "category": "기타", "tags": []}, {"id": 11, "filename": "250618(수) 회의록 정리.txt", "date": "2025-06-18", "title": "수) 회의록 정리", "content": "25.06.18(수) 회의록 정리\n-  일시: 2024.06.18(수) 오후 2시, KCS\n-  참여: 김윤진 대표, 배윤희 본부장, 김용수 선임\n\n\n1. 60주년 관련 전시 준비\n   - 에어전시를 섭외하여 함께 전시 준비 필요 \n      → 에이전시 후보 리스트업 후 7월 초 미팅 예정\n   - 기존 아카이브 동의 일부 섹션과 유후 별도 공간을 활용한 전시 구상\n   - '글짓기 대회' 컨셉 포함\n      · 주요 타겟: 해당 지역 주요 유동인구 20~30대\n      · 별도 예산으로 어린이 및 가족 단위 행사도 고려할 수 있음\n   - 주부생활 전시와는 다르게, 텍스트와 의미 중심의 전시 지향\n   - 10월 19일(일) 창립기념일 당일에도 기념 공연 등 행사 아이디어 구상 필요\n   - 글로우때와 유사하게 TF팀 형태로 업무 추진 고려\n\n\n2. 60주년 사내 행사\n   - 카페 흙: 150명 인원 수용 가능\n   - 케이터링: 음료 제외 / 소다 및 맥주류는 아카이브앤코에서 금성에 맞게 구성\n   - 포토부스: 렌탈 업체 정보 공유 예정\n   - 굿즈: 방향 정리 후 공유 예정 → 에코백 등 대표님 의견 주실 수 있음\n   - 스케치 영상 촬영: 어떤 식으로 진행 할 것인지 내부 정리 후 추후 공유 예정\n\n\n3. 기타 일정 및 관련 행사\n   - 7월 말: 새로운 도자 전시 (재단과 협의 중)\n   - 8월 22일: 팀서화 전시 확정 (약 2개월 전시 예정)\n   - 10월 17일: 근현대 미술사 학술대회 예정 (대회 전후 시간대에 북토크 등 다른 프로그램도 추가 아이디어 나옴)\n   - 더북소사이어티와 콘택 중(한국 동시대 그래픽 디자이너 아카이빙 or 식물샵 등 다양한 협업안 논의)\n   - 디에어하우스 페스티벌와도 접촉 진행 중\n\n\n4. 기타\n   - 60주년 영상 촬영 관련 KCS 방문 일정 공유 완료\n   - SNS 브랜디드 콘텐츠 관련 아이디어 공유(교과서, 사전, 푸르넷 학습지 등 각각 주제로 진행 등)", "category": "회의", "tags": []}, {"id": 12, "filename": "250624(화) 감자필름과 미팅 내용.txt", "date": "2025-06-24", "title": "화) 감자필름과 미팅 내용", "content": "5~7분의 영상을 쭉 촬영을 \n\n인터뷰 장소를 정해야 하는데\n1. 장소선정 카페 공간이 제일 멋있다. / 인원통제도 해야 한다.\n- \n\n2. 플로우에 대해 논의(핵심 멘트를 어떻게 칠지?)\n- 풀버전 파일을 1명씩 1시간 > 핵심 멘트는 우리가 뽑기(가이드) > 감자 제안 > 멘트 중심으로 \n키메세지 \n- 자료들을 미리 수급해달라 \n\n- 인트로: 클래식하지만 역사를 쭉 나열하는, \n- 브릿지: 핵심 키워드에 대한 정리\n- 아웃트로: 전체적인 핵심 키 메세지\n\n부탁드리고 싶은 부분\n- \n \n\n히스토리에 대한 얘기를 넣자. 60년의 숫자가 쭉 가는 모습을 보여주고 싶다\n원하는 건 현대적이여서 인터뷰이들이 \n\n, 브릿지, 아웃트로 어떤 내용들로 들어가면 좋을지?\n\n멘트만 키 메시지들은 회장님 메세지로 따로 확보한다.\n\n\n\n촬영 전\n- 회장님 나레이션 딸 내용들\n-", "category": "미팅", "tags": []}, {"id": 13, "filename": "250624(화) 임원회의 후 회의.txt", "date": "2025-06-24", "title": "화) 임원회의 후 회의", "content": "60주년 영상\n1. 전화 다 돌리고, 키워드 미리 정리해 드리기\n2. 돈도 현금으로 뽑기 / 주차 등 디테일하게 안내 (사례비 개념, 광고비로 떨면 되지 않을까요?)\n\n60주년 굿즈 \n- 뜨는 메모지 견적 >>> 고려기프트\n- 엑셀표로 정리해도 되고\n- 수건: 고려기프트 다른 데도 견적도 견적을 받아볼 수 있으면 좋겠다\n- 쇼핑백도 1만개 기준\n- 1만3천원기준으로 업데이트\n- 업체별 래퍼런스 받고\n- 무림페이퍼, 소진서림, 한솔제지 국제도서전 / 소전서림 디엠하기 \n- 김광순 이사 베스트2 ppt 얹어서 달라 > 교육에 쓰겠다. 김상미 팀장 참조로 이사님 두 분 참조로 넣어서 한다\n\n\n- 7월 계획과/ 분기 결산 준비\n- 출고: 스포츠 이야기 1권, 초등 국어 사전 초등국어사전(21년) 1권, \n> 우이사님 사전을 만들어서 팔고 시프심(속뜻 풀이 초등 국어 사전?)\n\n3시에로 KCS로 출발\n\n\n\n아 네 매니저님 안녕하세요. 회의중이라 연락을 받지 못했습니다.\n아직 내부 일정이 정리되지 않아서요. 추후에 \n\n이런 저런 이슈들이 있어서", "category": "임원회의", "tags": []}, {"id": 14, "filename": "250625(수) 회의.txt", "date": "2025-06-25", "title": "수) 회의", "content": "디콘에서 애니메이션 영상(선대 회장님)을 만들려고 콘티를 짰다.\n\n사진과, 사진이 아닌 것을 표기하면 좋을 것 같다\n영상소스 버무리기\n아카이빙북 업데이트 내용 확인하기(색 입히는 작업?)\n93 도서전 김영상 대통령과 컷팅식 하는 '\n\n윤동주 기념관 빼도 되나?'\n\n아카이브팀, 사전, 전집, 판매량 순 데이터 요청 제일 많이 팔린 것?\n뭔지?\n\n애니메이션 세계 명작<최초 해외저작권 수출>\n많이 팔린 \n\n영업조직에 대한 멘트때 연도대상 영상등 넣으면 어떨지?\n\n유홍준 교수님 퇴사일 알고있는지? 아카이브팀\n\n\n인터뷰 주제 인트로, 아웃트로, 미래 비전 정리해본다.\n\n한솔제지 3세랑 아는 사이, 뮤지엄산에서 일하고 있음\n더현대", "category": "회의", "tags": []}, {"id": 15, "filename": "250630(월) KCS 미팅_코대표.txt", "date": "2025-06-30", "title": "월) KCS 미팅_코대표", "content": "60주년 \n1.\n행사 , 인원수, 구성, 케이터링 견적서랑 같이 보내드리념ㄴ서\n대표님이 대행 견적서주시면 그걸로 계약금 지급하고 발행하려고 한다.\n견적서 주실 때 착수금 받고 / 나눠서 입금하는 방식으로 하면 어떨지?\n\n2. 전시 팀서화\n남은 기간동안 계획을 짜면 좋을 것 같아서\n에어전시에 준비기간이 얼마나 걸릴지?\n2달만에 할 수 있다고 하면, 회장님 2\n규모 8/22~10/30까지 진행 됨\n부터 검은색 지원금 작가 전시 진행\n전체 래핑을 진행할 예정 A.B.C동 EX\n회장님 큰 전시를 원하셨떤 것 같다. 근데 작가한다\n\n\n아카이브관 안쪽을 다 사용해서 새로운 전시로 쓰면 어떨지?\n외관 비쥬얼까지 포함 10월 19일까지는 리뉴얼한다 (60주년일 맞춰서)\n겉면 어떤 거 추가, 비쥬얼적인 변화\n에어전시는 이번달 안에는 끝난다. \n대표님 공간 디자인 위주로의 인테리어 에어전시 > 내용까지 꾸릴 수 있는 분인지?\n우리가 보낸 건 전시 콘텐츠 위주 에이전시\n회장님은 글로우서울 급을 원할 것 같다\n\n\n지인 다른 공간 소박한 기획안 대형 온실 식물같은 걸 만드는 아이디어<플랜트샵>\n11월 북소사이어티 들어올 수도 있고. 밖 비쥬얼은 이 사람한테 맡기면 어떨지?\n건물만 이렇게 꾸며놓고 안에는 다른 업체가 들어오는 거\n\n\n\n\n-----------------------------------------------------------------------------------\n정리\n머스트: 아카이브관 전시 준비+밖 꾸미기 \n(전시 에어전시 몇 군데는 어케 할지도 대표님 정해주세요 안밖으로 할지, 한번에 할지, 이 일정을 7월에끝내 본다.)\n내부 콘텐츠와 외부 인테리어할때 견적 받고나서 회장님 미팅때 보고\n회장님은 어떤 초고 기획을 갖고 있는지 궁금해하기에 준비가 되어있으면 좋겠다. 래퍼런스\n대표님이 먼저 추려주시면 우리가 추후 팔로업 (목요일까지는 그분들과 미팅날짜를 잡도록 하겠다)\n\n \n\n + 다양한 썸띵? (푸르넷 체험관, 키즈 놀이방든, 팝업 존 하나만 그렇게 운영하면 어떨지?)\n\n2층도(계약이 끝나면) 나가면 내년부터 공간 구성이 가능하다\n\n억이 넘어가면 회장님 고심이 깊어지니 억이 넘어가지 않는 범위에서 \n준비하면", "category": "KCS", "tags": []}, {"id": 16, "filename": "250701(목) 후토크.txt", "date": "2025-07-01", "title": "목) 후토크", "content": "후 토크 예산은 어케?\n래퍼런스 몇개 찍어서 비용 역으로 문의하기\n팀서화도 엄청 비싸면\n둘 다 엄 청 비싸면 다음 방안을 고민하기\n\n추가로 저렴해보이는 업체 콘택\n최대한 외부 공간 활용하는 걸로\n밖에서 봐도 전시 요소가 보이게 전시관 넘버 원 \n\n강연 클래스를 판다. \n지적 허영심, 관심이 많은 사람들에게 관련 서적을 팔 수 있\n\n유홍준 교수님 강연같은 건 원하면 할 수 있다.\n11월 중이라도 한 번 강의를 여쭤볼 수 있지 않을가?\n티켓도 팔 수 있고, \n문화 예술과 관련된 세션을 만들어 보자\n\n비용... 최소 1억은 생각하고 있지 않을까.....\n주부생활이 얼마 들었는지 궁금하긴 했다.\n전화로 했으면 가볍게 ㅣ확이낳ㄹ 숭 ㅣㅆ는 거 가다\n\n------------------------------------------------------------\n그 건축가 회장님과 소통 ,\n북소사이어티가 입점할 수도 있고,\n\n화요일 2시 미팅에 바로 넘어갈 예정\n------------------------------------------------------------\n\n1. 대상 \n-------------------------------------------\n구두로 설명 ; 그런 아이디어가 통일성 파사드 \n내부 야외공간을 활용ㅇ 카페랑 싹 \n비슷한 결, \n\n\n6개월이상의 상설 전시가 될 가능성이 있는지 그 중 \n첫 달은 임팩트 있게 프로그램+이벤트 같은 게 잇으면 좋겠다(플리마켓, 강연, 팝업 행사)\n\n무료로 하게 되겠지만 어느정도는 리턴 회수하고 싶다.\n초반 운영", "category": "기타", "tags": []}, {"id": 17, "filename": "250702(화) 임원회의 후 회의.txt", "date": "2025-07-02", "title": "화) 임원회의 후 회의", "content": "1. 내일 촬영\n유홍준 교수님 > 우이사님이 맞이하고 싶다. \n\n\n2. 굿즈\n신시어리 월컴키트, \n다른 업체 \n\n3.60주년 행사 관련해서\n RFP처럼 보내면 코대표한테 좋을 것 같다\n RFP 변환해서 \n시간 요일 인원, 넉넉ㅎ하게 식사 케이터링 음식, 포토부스\n골든벨 진행비 빼고,\n포토부스 및 포토죤, 음료, 참고할 수 있게 견적서와 기획안을 별도로 빼서 드리기\nㄴ\n\n4. 전시 준비\n최소 전시 에이전시 2군데는 만나보고 싶다. 코대표가 그렇게 할 거 같다\n반드시 아카이브관이 리뉴얼되어야 한다. \n\n\n5. 60주년 영상\n18, 19일에 교육을 하는데 교사들 인터뷰를 따서 \n엔딩 크레딧 열라길게 \n\n\n6. 60주년 수기 공모전\n- 우리쪽에서 해줬으면 좋겠다. \n- 1,2, 하는 것도 괜찮고, 래퍼런스 먼저 찾고 기획안 써서 보고드리기\n\n7. 화이트 보드를 지우고 2가지\n1. AI 코딩상품\n2. 새로운 콘텐츠의 홍보 방법?\n- 지점장 2명을 면접보면서 회사 스튜디오 투어를 해줬는데\n본사가 이렇게 많은 콘텐츠를 만들고 있구나 감격을 했다. 이걸 다 투어를 해줄 수 없으니\n영상으로 제작해주겠다. 교사도 보고 14F 이서인 작가에게 물어보기 혹시 소개해 주실 분이 있나?\n이사님이 문서를 정리해서 일단 주시기로 함\n\n\n8. 용혜원 시집 7월에 입고 예정\n마케팅 준비하겠습니다.\n\n9. 할부를 폐지한 게 \n\n\n7. \n서평택 지점장, 장자연 교사 \n\n푸르넷 자 보고\n\n오늘 / 경감 크레딧 공문 언제?\n내일 / 총정리 모의고사 홍보자료 언제? 내일할까? 주홍?\n죽적으로 소담", "category": "임원회의", "tags": []}, {"id": 18, "filename": "250708(화) 임원회의 후 미팅.txt", "date": "2025-07-08", "title": "화) 임원회의 후 미팅", "content": "- 고양지점이 계속 연락 옴(수학, 콘텐츠, 블로그, 여름방학 특강, 정부지원사업이니 뭐니 )\n- 제안코너는 내일까지 추려서 말씀드릴게요 / 내가 알아서 하기\n- 여름방학 홍보자료는 <여름방학 대비 특강 양식, 카톡프로필배경 양식, 인스타 비율 리사이징, OPP에 붙이는 라벨지 양식 등)\n- 그 시집 자료 왔다\n<여름방학 특강은 5월 얼리어버드, 6월에도 배포하고>\n여름방학 1~2달 전부터 현 7월 중  \n겨울방학 11월 초 발행\n\n\n\n소비쿠폰: \n\n판촉물 시트", "category": "임원회의", "tags": []}, {"id": 19, "filename": "250710_kcs 회의.txt", "date": "2025-07-10", "title": "kcs 회의", "content": "- 팀서화(다음 주 화요일에 2시에 미팅, 전시다운 전시,))  \n- 요청부분: 전시 1층 전체 아카이브, 아트샵, 플러스 알파 도자기 관까지 / 외관 전체\n  나종원 건축가(런던 서울) 제안를 주었는데 초 저예산으로 여기를 활성화 시킬 방안을 플랜을 짜봤다 (어제 회장님과 같이 미팅)\n(회장님이 푸르넷 공부방의 미래형 및 금성이 들어났으면 좋겠다)   \n\n10월에 오픈해서 최소화 6개월~\n레트로한 부분이 강조되었으면 좋겠다.\n헤리티지, 노스텔지어, 전집, 사전, 교과서 큰 시리즈물이 많다. \n반 체험형같은 전시가 되었으면 좋겠다.\n기업의 역사 + 학예적인 부분 + 대중적인 부분\n어느정도는 진지한 부분 어느 부분은 대중적인 부분\n\n빈 공간들\n\nAB\n1.우선순위: \n- 관객들 오고 싶어하는 것\n일반 관객들이 헤리티지에 관심이 생기게끔 하는게중요\n여러 아티스트들과 협업, \n-다른 공간을 충분히 활용하면 전시관만 \n보통 준비기간은 어느정도 소요: 보통 2~3개월전에 노티가 오지만\n충분히 가능한 기간: 3개월이면 딱 좋은 기간이다.\n기획을 어떻게 하느냐에 따라: 비용, \n예산이 얼마가 있는데 해달라 또는\n가이드를 정해주면 그 선에서 정리하기\n\n어느정도의 기획안을 들어보고 하고싶어한다.\n<예산>에 맞춰서 공간 기획과 \n\n중요한 건 예산\n외관 내관 콘텐츠 가이드를 잡고 \n2D로도 충분히 확인할 수 있다. (3D는 선호하지 않는다)\n저희 인력\n기획에서 시공까지 다 한다.\n스케줄 예) 10월 7일까지 준비하자\n\n직접 전시 운영같은 경우, 길면 한달정도 하고\n6개월, 1년까지는 해본적이 없다.\n필요하다면 할 수 있다. \n\n가이드를 주셔도 좋을 것 같다.\n초반에는 운영+홍보까지 맡아주고\n나중에는 상설전시식으로 가이드를 주셔도 좋을 것 같고\n홍보대행사를 함께 껴서 한다.\n보통 기업에서 쓰는 홍보대행사를 붙여주신다.\n\n주로 AB 목적성을 파악하고 \n관객 많은디, 2\n먼저 타겟을 잡고 기획을 잡는다.\n보통 20~30대 여성이 타겟을 선호 \n30~40대 남성여성에 맞게 기획이나 디자인\n무료로 줘서 받을려고 오는 건 지양한다\n팝업과 전시의 밸런스를 맞추는 게 진짜 어렵다\n\n\n1 / 래퍼런스를 회사 소개서 주시면 먼저 참고하고 있겠다.\n2/ 어느정도의 예산을 측정해야 할지 그 기준점? (가능하다)\n\nYES24 너무 많이 돈이 5억 5천  전시관 안밖\n정말로 공사가 들어갔다.\n/ 제외 외부 아트사 + 카페사\n\n카페라공사 전\n\n*예산을 아예 정해서 주는 게 너무 다르다 오히려 편하다\n래퍼런스를 주면 > 비용 문의하고, > 비용 던지고 고할지 안할지 스탑할지''\n\n과거의 책들, 사진들, \n30주년때, 60주년, 영상자료까지 더해진다. 책을 종료도 다양해\n\n내가 얻어갈 게 있는 전시\n아티스트와 협업해서 무언갈 만드는 식으로 하면 좋지 않을가\n아티스트빨도 어느 정도 있다. 전시를 보러 토스 은행\n\n*백인선집 최초 출간100>>>> MZ 세대 타겟으로 만들기\n*여성백과 12권짜리 시리즈 > 화장하는 법, 에어로빅 스트레칭, 결혼한는 법 (그 책 삽화 모델,EX김희애\n이병헌, 김창완 모델 썰\n\n코대표: 아티스트 협업보다는 책들 편찬하셨던 유홍준 이어령 이런 점이 관객들이 흥미를 갖는다\n너무 좋다 너무 좋다 >> 이런 걸 되게 MZ 스럽게 \n아티스트 콜라보는 커미션도 드려야 하니까,\n지금은 대가가 되신 분들의 하이라이트식으로 \n\n이런 것들을 정리를 해주셔서, 삽화 \n역사는 사이사이 자연스럽게 섞어주고, 관객들  \n\n국민출판사에 대해 체감못하는 세대들한테 다시 느끼게끔\n국제도서전 1회를 개최한다. 책의 해, 독서 대상\n\n\n1 / 서류 왓다갔다 하고 참고할 수 있는 간단한 자료들은 따로 보내드리겠다.\n2 / 일반인들에게 \n요즘의 젊은이들에게 가까워지는 계기가 되었으면 좋겠다.\n \n\n\n아카이브 전시 먼저 열고\n페이즈 2로 푸르넷 공부방에 대한 내용으로 추후 협의\n\n수익성이 있어야 하는지?\n더 알려야 하는 걸하는 거 목적인지\n가능한다면 전시 자체는 무료였으면 좋겠다\n카페가 있으니까 카페로 연결하여 수익이 나게끔 할\n\n외장\n유니셰프는 전산화가 안되어잇어서, 하나하나 찾아내서 한 적이 있었다.\n-96\n마하한남", "category": "KCS", "tags": []}, {"id": 20, "filename": "250715(화) 임원회의 후 + 팀서화 미팅 전.txt", "date": "2025-07-15", "title": "화) 임원회의 후 + 팀서화 미팅 전", "content": "[AB군단 관련]\n뿌리동은 도자기전 정리를 놔둔다면 4~5천만원대로도 충분히 썸띵을 만들 수 있지 않을까 싶다.\n\n\n[팀서화]\n글 기획 진행하고\n<팀서화가 아는 팀을 소개해서 >\n전시 비주얼잡는 시공 디자인을 커뮤니케이션을 해주신데\n1. 일정은 가능하다. 10월 중순에는 오픈을 해야하는 상황\n2. 비용은 팀서화에게 집행하면 PM처럼 비용을 컨트롤할 수 있는지?\n(가장 편한 방안)\n3. 현대) 하청의 하청이 있어서 일사분란하게 했었다\n그 전시는 엔진에 집중했다: 포인트 지점들이 있다.\n차파는 기업이니까 차파는 것만 보여주면 되니까. 방향성 잡기는 편했다.\n금성은 워낙 다양했으니까 방향성 잡는 게 중요하다.\n4. 최소 어느정도 금액을 예산을 잡아야 하는지?\n기본 그 공간만 한다면 <2억 5천에서 3억>, 추가로 외관도 한다면 비용 추가된다\n\n----------------------------------------------------------------------------------------------------\n\n층고가 낮은 가로로 긴 공간이라 층고가 높다면 임팩트를 줄 수있을 텐데\n요즘바이럴은 인스타로 세로비율이기 때문에, 세로로 ㄱㄱㄱ\n\n공간의 물성에 시각촉각후각적으로 잡아준다면\n자료들의 규모감을 어떻게 표현할 수 있을까\n\n책같은 건, 키네틱 전시? \n\n비쥬얼 임팩트도 있지만 모든 시작은 글이디. \n책만 만들었구나가 아닌 글은 크리에이티브의 글본이니 그런 인사이트를 전달할 수 있는 전시?\n\n홍보도 재밌다고 소문만 나면, 알아서 찾아 온다\n코: 대로변 건물을 홍보 툴로 이런저런 방안들을 고민하고 있다.\n\n밖 건물의 창문마다 래핑하거나 하는 방안이 있다\n\n---------------------------------------------------------------------------------------------------\n\n우리가 알만한,알 수 있는 래퍼런스 보내주시면 좋을 것 같다\n금성 입장에서는 조금 다운하고 싶은 의지가 있을 거 같긴 하다. \n그렇게 된다면 미리 예산 상의를 드리게 될 것 같다\n어떤 생각을 하고 있는지 아이디어를 들어 보고싶어하다. \n구두로 이런 아이디어 정도는 있을 것 같다\n비용 말고 우리가 제공해 드려야 할 것은?\n역으로 우리에게 궁금하신 거가 있다면?\n\n\n팀서화:글과 그림에서 모든 게 시작된다는 의미\n현대미술 10인의 차세대 작가 40대 이하 젊은 작가 1달뒤 준비: 8/22 오픈~ \n시간상 60주년 전시도 가능하다 \n\n--------------------------------------------------------------------------------------------------\n아이디어:금성어린이전집 그시절 삽화를 활용한 굿즈, \n지금은 유명한 화백이신 분이 생계를 위해 삽화를 그린적: 박서보?!?!?!\n 서적 방판 판매 재밌는 포인트, \n\n--------------------------------------------------------------------------------------------------\n넥스트스탭: 빠르게 회장님 미팅을 잡아보는 게 좋을 것 같다.\n\n\n브랜디드 콘텐츠: \n숫자로 읽는 금성출판사의 60년\n- 1965년 창립\n- 1993년 책의해 > 1995년 서울국제도서전으로 격상\n- 2025년 20년 연속 교육브랜드 대상 수상\n- 2024년 명문장수기업 선정\n- 그동안의 푸르넷 교사수:\n\n-------------------------------------------------------------------------------------------------------\n[세팅을 이렇게 하자] <1억 5천>\n- ab 1억 정도 희망하나 5천 추가까지도 고려하고 있다.\n굿즈및 외관에 대한 아이디어 꼭 하고 싶다. 회장님 직접 미팅\n간단하게 컨셉을 보여주시면 좋고, 안되면 구두로라도 대략 컨셉, 주제, 강점을 요소\n회장님 준비를 해주셨으면 다음 주 화요일 오후\n\n\n \n- 팀서화 1억 5천\n\n사진&영상을 올려도 좋을 것 같다", "category": "임원회의", "tags": []}, {"id": 21, "filename": "250721(월) 팀서화 미팅(회장님 포함).txt", "date": "2025-07-21", "title": "월) 팀서화 미팅(회장님 포함)", "content": "회장님 60주년 얘기 \n제대로 알리고 책이 많다는 느낌이 안든다\n얼마나 많은 책과 대한민국에 역할을 한게 많다 학술대회 ~~~ LP판, 세계영화음악, 영어대화, 국악, 출판의 역사, 스케일을 보여주고 싶다.\n\n이렇게 많은 책이 있었고, <학생백과>라는 명칭을 금성출판사가 먼저 \n필름 \n\n미래의 교육을 금성출판사가 이렇게 제시하겠다.  거기서 형제애를 느끼고, 어쩌구 저쩌구\n메인은 공부이지만, 사회, 예절 이런 것 다 한다~~~~~ \n\n체험학습 얘기, \n이렇게 멋있는 공부방이 있어?!?!?\n\n목욕탕도 전시장이 되는데,\n교육\n\n\n1. 헤리티지 공간\n2. 현재와 미래 공부방(도자기 전)\n일단 10월까지 헤리티지 공간부터 리뉴얼\n\n오픈할 때 미래형 푸르넷 공부방도 되었으면 많은 사람들이 찾아 \n\n욕심 안나요!?!?!?\n\n----------------------------------------------\n팀서화 고민: 어떻게 이걸 보러오게 할지?\n어떤 출판사의 히스토리가 궁금하냐고 물어보니 이 사람들을 어떻게 데려오\n히스토리만으로는 사람들을 끌어오기엔 어려움이 있을 듯 > 세대불문하고 모두가 궁금해할만한 화두를 던지면, EX> 인공지능 시대에 교육이란 무엇인가 그것만 조명하고, 전시 오픈하기 전부터 그걸 계속 릴리즈 시키고 그 콘텐츠를 궁금해 할만한 인공지능이 오면 어떻게 바뀔지 다들 궁금해하니까 그걸 보러오고 아카이브쪽도 자연스럽게 알리는 식으로 \n\n그런 부분은 저희가 계약서 사인을 하고 ㅎㅎ\n\n회사가 추구해온 맥락과 키포인트가 \n며칠내로 재미난 건 갖고 오다면\n>>> \n----------------------------------------------\n코: 미술사, 사회공헌적인 부분들도 기획에 반영되었으면 좋겠다. \n사회공헌 사진들이 다 남아있다\n어린이 교육에 워낙 열정적이었다.\n독서새물결운동, 책의 해, 출판문화협회 초대 2대 회장, 가장 최근에는 명문장수기업하고\n\n------------------------------------------\n회: 박서보 전시 를 조율하다가 돌아가심\n\n-----------------------------------------\nKCS: 사회공헌적인 컨ㅅ베이 좋다. \n\n----------------------------------------------\n추가적인 \n순차적으로 끊어서 하는 게 좋을 거 같다.\n\n팀서화\n내가 뭘 했고, 꼰대가 되는 걸 지양한다,\n그 무드를 최대한 빼고, 그랬구나 그걸를 만드는 데 최대한 중점\n\n누굴 교육, 강요하려는 무드보다는 재밌어서 들여다보게 되는 걸로 \n\n----------------------------------------------\n\n추가를 한다면 신세계 부동산과, 벽면, 야외 공간 정도 1억 5천 선에서는 하고 싶은데\n\n----------------------------------------------\n\n그 정도로 계획을 할 수 있는\nVIP: 1억 5천이면 굉장히 타이트할 거 같다\n\n\n한전 문제, 전기 도면 설계도 어쩌구 저쩌구,\n까만 건물은 전기를 새로 끌어와야한다\n\n\n----------------------------------------------\n계약서를 쓰거나, 이런 대략적인 기획이나 \n템플릿 (문체부의 표준계약서)\n계약서 안을 주시면, 수정할 사항을 하면 피드백 드려서 하는 거로, \n기획을 간략히해서 회장님 한번더 가능할지?\n<목요일 오후 추가 4시 미팅> > 회신드리겠다.\n\n계약서 초안을 내일 중에 보낼 예정\n전기 사용 관련해서는 빠르면 오늘", "category": "팀서화", "tags": []}, {"id": 22, "filename": "250722(화)_AB군단 회의.txt", "date": "2025-07-22", "title": "화)_AB군단 회의", "content": "플래그쉽 스토어 <미래형 공부방>하고 싶다 싶다 이렇게 꾸며 나갈 것이다. <상징적>인 <스타>공부방을 만들고 싶다.\n\n즐길 수 있는 공부방\n비전은 제시하고, 현실성ㅇ있게 \n\n진  "category": "임원회의", "tags": []}, {"id": 25, "filename": "250808(금) 주간회의.txt", "date": "2025-08-08", "title": "금) 주간회의", "content": "제가 처음에 책임자, 교사 , 행정교사 포함 명단 달라 했는데\n\n- 교사 명단만 줘서 (이거 기준으로 견적받고)\n- 행정교사만 포함되었구 (이거 기준으로 견적 받고_(하나 통폐합 된거 반영이 안되었대) <신광양+동광양>\n- 또 어제 막팍에 책임자 빠진 거 아녀(해서 ?또 문의 중)\n\n149 컨셉 기획도 요청드리겠습니다.", "category": "주간회의", "tags": []}, {"id": 26, "filename": "250811(월) 팀서화 본사 미팅.txt", "date": "2025-08-11", "title": "월) 팀서화 본사 미팅", "content": "전시 콘텐츠에 대해서 어떻게 끌고 갈 것인가?\n추가 컨셉 기획관련해서 \n\n1. AI 시대에 출판사는 어떤 역할을 할 것인가? 큰 컨셉을 잡아서 \n2. 1층 전체를 도자기 있는 곳까지 빼고 10월 20일(월)에 오픈할 예정\n3. 멀티미디어방\n\n\n---------------------------------------------------------------------------------------------------\n[회의 미팅]\n\n1. 직접봐야 실제로 무엇이 디피가 가능한지 알 것 같다\n. EX. 음악 LP, 미로같은 공간에는 실물보단 파일을 \n2. 멀티미디어 방(여기): 행사 사진, 과거 어린이용 교육만화 원본 등 \n3. 서재 또 모든 책들의 사본은 여기 있는 건지\n\n\n- 1층 여기에 꽂혀있는 게 유일한 경우가 대부분이다\n- 도난의 위험도 있을 것 같다\n- 멋있는 양장본 느낌의 예전 책들이 얼마나 있을지?\n 여러 분 디피하기엔 어려움이 있을 것 같다.\n- 어린이 도서가 이런 것들이 불량이 충분할까요? / 물량은  \n\n- 60주년 아카이브책을 보시면 도움이 될 것 같다. <쭉 설명 중> > \n- 사전이 많아서 볼륨이 될 것 같다\n- 숫자로 보는 60주년사 4교 나온 파일을 공유드리겠다.(이번 주 내로 공유드리겠다)\n- 회장님은 청음할 수 있는 코너가 있으면 좋지 않을까? (디지털파일도 있고, 아이패드도있구)\n- CO.전반적인 문화예술을 후원한다는 차원에서 도서 뿐만 아니라 음원도 같이 다루면 좋지 않을까? \n- 학생백과(우리가 학생백과라는 처음으로 씀)\n- CO.영업사원들의 스토리를 낸 30주년 책이 있다 > 그것도 용산에 있어서 곧 드리겠다\n- 세계 아동 그림 모음 \n- 조선왕조 500년 드라마를 책으로 엮은 게 이거다\n- (엄청 유명한 드라마다)\n- 광고문 래퍼런스 이미지들도 받을 수 있을지? > 광고철이 30~50장 들어있는 게 \n  그것도 디지털 파일 요청 > (주부사원 모집) 열정 25시, 나도 한때는/ 레트로적인 게 강조되면 좋겠다. \n92년도에 처음 입사해서 했다. ㅎㄷㄷ 나이..\n수상한 어린이가 북토크를 하게 된 경우도 잇다\n\n한강 작가의 책나무 썰 \n애플파피 \n옛날 교과서까지 \n\n---------------------------------------------------------------------------------------------------\n\n이 내용을 미로에 적용할 수 있을 것 같다\n성인용: 조선왕조500년, 여성백과, 혼수품이었다 당시에는 (미용, 출산, 요리 등)\n모델이 김희애였다. 그 필름들이 많다 당시 시대상을 알 수 있다.\n\n미로쪽을 어떻게 나눌지 고민이 된다.\n\n\n지금 그냥 드는 생각은 섹션은 교과서 /전집 / 어린이 등 크게크게 기념할만한 것들 위주로하면 재미도 챙기면서 할 수 있지 않을가?\n------------------------------------------------------------------------------------------------------------------------------\n\n미리 준 자료에서 \n60주년 영상 스크립트를 열심히 보고있었다.\n-------------------------------------------------------------------------------------------------------------------------------\n책 둘러보고, 멀티미디어실도 봄\n\n-------------------------------------------------------------------------------------------------------------------------------\n\n미로 부분에 필요한 것 \n팀서화: 분류를 먼저 하고 공간 실측을 좀 해보고 이런저런 내용들이 들어가면 어떨까?\n그러면서 필요한 걸 요청하면 되지 않을까?\n\n cfe디지털화일 2~3개화일이라도 금성출판사 로고있고  미니 패드로 다 \n팀서화의 링크에 다같이 올리는 걸로\n\n---------------------------------------------------------------------------------------------------------------------------------\n계약서 관련해서\n\n- 깔끔하게 연앤지로 된 걸로 보내달라(자료)\n- 이동 가능한 다마스??!?!? 위치는 같이보고 픽스해야 할듯 싶다. / 1번정도는 옮길 수 잇음\n  용산가서 같이 위치 확인해보기로\n- 일정관련해서는 내일 체크해보고 다시 확인해보기로 \n- AI  \n- 수요일 오후 3시 미팅이 가능할지?(다시)2 / 계약서도 맺고 / \n\n----------------------------------------------------------------------------------------------------------------------------------\n\n외벽 철거 등 노나숴 비용처리할지 보기\n냉난방비 얹고 / 이건 붙일지 말지해서 최종계약금액 정하기\n\n\n 알앤알 정리가 필요한 상황\n기본 소통은 메일하자\n참조. 전시 구체: 코대표님\n참조. 행정 조율: 배이사, 나\n수요일에 다마스 위치도 정하기\n컨셉기획안 확정, 계약서 확정", "category": "팀서화", "tags": []}, {"id": 27, "filename": "250812(화) SNS 브랜디드 콘텐츠.txt", "date": "2025-08-12", "title": "화) SNS 브랜디드 콘텐츠", "content": "전집 246종 7,273책\n단행본 2,317책\n사전 55종 80책\n학습지 331종 11,739책\n잡지 604부\n교과서 674책\n3차 교육과정 \n참고서 336종 728책\n\n\n1/  전집 246종 7,273책\n그림마당 창작동화 - 반달곰 미순이 / 박서보 그림\n\n2/ 교과서 674책\n3차 교육과정서부터 시작\n\n3/ 단행본 2,317책\n국내 최초 ‘창작동화 백과사전’ 형식 시리즈 발간\n아동문학과 학습을 결합한 **‘한국 창작동화 대전집’**을 출간하며, 백과사전식 체계와 대규모 시리즈 구성을 도입\n.당대 유명 작가와 화가들이 대거 참여한 최초의 기획형 아동문학전집.\n\n학습참고서와 아동문학의 융합\n교과서 편찬 노하우를 바탕으로, 참고서의 체계성과 동화의 흥미 요소를 결합한 **‘학습형 창작동화’**를 선보인 것도 국내 최초 시도 중 하나\n\n4/ 잡지 604부\n금성출판사는 1990년대 초반, 여성들의 생활 전반을 아우르는 종합 생활정보지 『그레이스 여성생활백과』를 창간하였다. 이 잡지는 패션과 미용은 물론, 가정경제, 건강, 육아, 요리, 인테리어 등 실생활에 필요한 정보를 백과사전처럼 체계적으로 담아내어 독자들의 호평을 받았다. 특히 20대 신혼부부에서 40~50대 주부까지 전 연령층을 대상으로 하여, 다양한 세대의 여성들이 참고할 수 있는 잡지로 자리매김했다. 또한 실용 정보 외에도 사회·문화·여성 인권에 관한 기사를 수록하여 생활 속 교양을 함께 제공하였다.\n\n5/ 사전 55종 80책\n991년, 연세대 명예교수 김형석 선생님은 당시 “최고 수준”으로 평가받던 금성출판사 국어대사전(총 50,000여 표제어, 120,000여 용례 수록)을 구입하셨습니다. 해방 이전, 일제 치하에서는 국어사전조차 펴볼 수 없었던 세대였기에, 이 사전은 단순한 참고서가 아니라 언어 주권과 학문적 자립을 상징하는 도구였습니다. 30년이 넘은 지금까지도 글을 쓸 때마다 반드시 펼쳐보며, 모르는 단어가 있으면 사전을 확인하기 전까지 절대 쓰지 않는 습관을 이어오고 계십니다.\n금성 사전류는 방대한 어휘 수록(국어·방언·전문어 포함), 표제어 간 정확한 상호참조, 20만여 예문 제공 등 학문적 엄밀성과 실용성을 겸비한 것이 강점입니다. 덕분에 금성 국어대사전은 한 세대의 지적 성장을 함께한 ‘한국어 문화유산’이자, 시대를 넘어 지속되는 언어의 동반자로 자리매김했습니다.", "category": "기타", "tags": []}, {"id": 28, "filename": "250812(화) 임원회의 후 미팅 내용.txt", "date": "2025-08-12", "title": "화) 임원회의 후 미팅 내용", "content": "1. 기획안을 회장님은 마음에 안든다\n기획까지는 / 시공은 따로\n\n2. 1억 8천 <250백만원>\n\n3. 삽화 같은 거   \n\n4. \n\n오후 3시로 이메일 회신 / 카\n\n------------------------------------------------------------------\n1. 팀서화 메일 보내기 / 계약서\n2. \n-------------------------\n2. \n서울시 성동구 왕십리로 88 (성수동1가), 노벨빌딩 4층 크레비스파트너스 주식회사", "category": "임원회의", "tags": []}, {"id": 29, "filename": "250813(수) 연앤지 미팅.txt", "date": "2025-08-13", "title": "수) 연앤지 미팅", "content": "1. 전시 기획 제안서\n> 회의로 정리되고 나서 추가 수정\n   기획안내 금액 표시 / 팀서화 표기를 연앤지로 변경\n\n2. WBS \n> 변경 사항 없는 듯\n   기존 공간 철수(8/26)는 변동 체크 필요\n\n대담자 섭외 비용 \n운영 매뉴얼 확정 (10월 11일)\n \n사이시공, 사이시공간\n\n미술주간 공식\n---------------------------------------------------------------------\n<회장님 포함 미팅>\n포인트,, 강조가 되면 좋겠다. 저게 저런 칼라가? 압도적 포인트가 있으면 좋겠다\n여튼 임팩트가 있으면 좋겠다. (약하다)\n\n입구쪽: 포대자루 정리좀 해달라, 천을 \n연두색처럼 컬러로 건물의 상징적인 포인트?\n현 상태는 금성의 60년을 보여주기엔 너무 약하다\n\n외벽 며칠만 더 고민\n\n---------------------------------------------------------------------\n\n밖 건물\n1층 건물을 개방 카세트테이프가 하고 싶다\n\n\n------------------------------------------------------------------------\n다마스 설치 위치\n마대자루 빼고 그곳에 설치 회장님 기댁가 된다.\n\n-------------------------------------------------------------------------\n건물마다 ㅡㄴ 간판 표식등을 넣는다\n사이니지를 통일해서 싹 하기\n컬러풀하게 가난으로 하라(보라색)\n보라색에 미친자 아크릴 (보라색 보라색)\n\n------------------------------------------------------------------------\n\n추가 요청 / 이번 계약서에서는 분리해서 하기\n건물 전체 기획안 요청 / 뿌리동 외관 / 다마스 뒤쪽 정리 작업\n기획안 나오 ----------------------------\n\n전시 안하는 기간동안 직원들 심플하게 해결할 수 잇겠다 그럼  벳트\n\n=----------------------------------------------------------------------------\n<토탈 정>\n1. \n사진, pr 관련 자료 요청, 우리도 pr하고 \n스케쥴 자료 사진 자료 받아서 살짝 다른 결로 하고 우리\n\n2.\n다음 주 월요일에 다뤄져야 할 것들을 리마인드 (WBS와 함께)\n\n3.\n블로그도 차주 준비", "category": "팀서화", "tags": []}, {"id": 32, "filename": "250825(월) 팀장 회의.txt", "date": "2025-08-25", "title": "월) 팀장 회의", "content": "영상 \n디데이 콘텐츠로 \n\n굿즈\n총무,운영지원팀\n품의 올리기 \n- 유관 부서 9 계획\n- 임원별 배정 수량  \n\n공모전\n- 심사 유관부서+ 이메일 \n- 참고) 우수제안\n- \n\n10월 16(목), 18(토)\n- 16일 행사: 빔 프로젝터 정보 > 교육지원팀 사전 공유할 것(직접 견적을 받아서 받아라)\n- 영상X, 사진은 찍고 싶어할 수도?\n- 사진 작가 견적받기 \n\n+ 전시 완공 사진, 둘러보는 샷 \n+ 션 포토 / 스케치 사진 이틀 모두 견적", "category": "팀장회의", "tags": []}, {"id": 33, "filename": "250826(화) 팀서화 회의.md", "date": "2025-08-26", "title": "화) 팀서화 회의", "content": "1\\. 전시 기획서 요청\n\n&nbsp;- AI ROOM 대담자 리스트\n\n&nbsp;- 대담자 섭외용 기획안(A/B)안\n\n&nbsp;- AI ROOM 전시에서 관객이 얻어나가는 조금 더 구체화된 핵심 주제 \n\n&nbsp;- 전시 제목안: 김윤진 대표님 추가 의견 주신 것 포함하여 포스터 시각화\n\n\\-  책의 미로: 1) 설명주신 8개 카테고리에 푸르넷 추가, 2) '글짓기' 카테고리에 백일장 아이디어 추가\n\n&nbsp;\n\n2\\. 회장님 별도 요청\n\n\\- 뿌리동 홍보/구역 전체 연결 기획안: 책 읽는 미디어 아트, 책 한 권씩 빠져나가는 미디어 아트\n\n\\- 흙마당(다마스 뒷편) 정비안: A안 철망 펜스로 백 통일감 + 다마스 구역만 정리하는 B안도 추가\n\n\\- 해당 기획/작업에 대한 대략적인 예산 금액\n\n&nbsp;\n\n3\\. <사이시공 생태계>\n\n\\- 홍보에 활용 가능한 자료: 전시/관람 사진 , PR 기사, 리플릿, 도슨트 일정 등\n\n\n\n\n\n============================================================\n\n이세돌 대국 > ai의 대결구도? >  ai 대화를 우리도 앞으로의 미래에 대해서 고민하고 있다 > 그걸 전시 방식으로 풀어낸다\n\n국민/신한은행 그게 ai \n\n\n\n============================================================\n\n\n\n\\+ 업계와 관련된 분들을 같이 초청해서 현장에서의 이야기를 추가\n\n&nbsp; - 현장에서 겪는 따뜻한 이야기, ai와의 대결 구도가 아닌, 앞으로는 이 시대에 어떻게 해야 할까? >>> 사전 인터뷰를 따서\n\n&nbsp;   자연스럽게 건질만한 이야기들이 나오지 않을까?\n\n&nbsp; - 최소 2명 이상 \n\n&nbsp; - <내가 할 액션>?: 인터뷰 영상 링크를 공유하여서 거기서 후보군을 추려도 될 것 같다\n\n&nbsp; - 회장님 의견: 그동안의 재직인원들의 이름을 쫙 나열하는 거(회장님 의견) + 유명한 분들 리스트도(박서보 뭘 했다. 한강, 이어령, 삽화가)\n\n&nbsp;   + 백일장 수상자를 신문에 깨알같이 빼곡히 적어서 \n\n&nbsp;- 시계, 영상 이런 거가 호기심을 이끌어낼 수 잇음 > \n\n&nbsp;- <내가 헐 액션> 여성생활백과 필름/ 책자 실물이 보관되어 있는지? 평택에 없을 거 같은데\n\n&nbsp;- 회장님 추천 전집: 애니메이션, 세계동화, 전래동화, 성서이야기, 위인전기 (삽화 원본 이야기)\n\n&nbsp;- 사전: 당시 교정지가 있다(아카이브 팀장이 그렇게 말했다) 종이들이 있을지?\n\n&nbsp;- 미술섹션: 김창열 작가의 젊은 시절의 우리만 보유하고 있는 사진이 있다.\n\n&nbsp;- 교과서: \n\n&nbsp;- LP: 큐알 / 주차장  + 서브로 카세트 CDI로 다루고 \n\n&nbsp;- 글짓기: 글짓기대회\n\n&nbsp;- 방판 차량\n\n&nbsp;- 푸르넷: 뒷 이야기가 궁금하다. 어떤 취지와 의의를 가지고 하게 되었는지\n\n&nbsp;  <인터뷰 자료나 교실의 모습, 관련된 글 등> 비하인드 /휴머니즘 자료들\n\n&nbsp;  제2의 담임, 엄마의 마음, 보육의 액션\n\n&nbsp;  진심으로 아이들을 교육에 이바지할 수 있다는 내용들\n\n&nbsp;  (공부방을 두 군데 정도만 가도 알 수 있다 <영상을 공유해줘라>)\n\n&nbsp;- 보육의 액션 푸르넷 영상도 만들어라?????\n\n\n\n우리가 자료 전달드리고 세부 기획안\n\n&nbsp;  \n\n\n\n\\+ 전시 제목: \n\n기록하는 살마들\n\n기록하는 사람들 넥스트 페이지\n\n기록하는ㅅ ㅏㄹ마들 넥스트 60\n\n기록하는 사람들의 뮤지엄\n\n기록하는 살마들, 책을 짓는 사람들, 미래를 만드는 사람들\n\n기로된 미래, 다가온 과거,, 그리고 우리 \n\n\n\n\n\n============================================================\n\n&nbsp;\n\n&nbsp;- 박제성(서울대 조소과 교수) : 자기는 ai를 아이키운다고 생각한다. 어떻게 키우냐에 따라서 달라진다/ 인간이 좋은 엄빠가 되어야 잘 키우는 데. 이렇게 분쟁만 있는데 어케 잘 키우겠냐. 인간이 인간성, 인간으로서의 역할을 잘해야 ai도 잘 키운다/ 카이스트 교수들도 중점적으로 \n\n본다\n\n\n\n\n\n=============================================================\n\n\n\n\\[팀서화측에 전달해야할 자료]\n\n\n\n1\\. 마케팅팀 → 팀서화\n\n\\- 푸르넷 교사 인터뷰 영상 목록 (ai 룸 연사 섭외용)\n\n\n2. 아카이브 팀 → 팀서화\n\n&nbsp;- 전집: 특히 조명되었으면 하는 전집류\n\n&nbsp;- 사전: 주요 이력이 수치화된 자료 + 당시 교정지 등 제작할 때 자료 (EX. 국어대사전)\n\n&nbsp;- 미술: 화집에 들어간 원본 삽화 이미지 (아카이브 팀장이 미팅에선 별도로 보관한 건 없는 것 같다고 말함)\n\n&nbsp;          김창열 작가 사진(우리만 갖고 있는 사진)\n\n&nbsp;- 푸르넷: 인터뷰 자료나, 교실 모습, 관련 글 등 제2의 담임, 엄마의 마음, 보육 컨셉을 살릴만한 자료들\n\n&nbsp;-여성생활백과: 원본 및 필름 등 자료(물류팀과도 확인 필요)\n\n - 지금까지 직원 전체 이름 목록(그 중 유명인은 이력과 함께 정리\\_박서보, 유홍준, 한강, 염혜란 등)\n\n&nbsp;   cf. 글짓기 수상자 목록 신문 전면 광고 스타일", "category": "팀서화", "tags": []}, {"id": 34, "filename": "250826(화) 팀서화 회의.txt", "date": "2025-08-26", "title": "화) 팀서화 회의", "content": "1. 전시 기획서 요청\n - AI ROOM 대담자 리스트\n - 대담자 섭외용 기획안(A/B)안\n - AI ROOM 전시에서 관객이 얻어나가는 조금 더 구체화된 핵심 주제 \n - 전시 제목안: 김윤진 대표님 추가 의견 주신 것 포함하여 포스터 시각화\n-  책의 미로: 1) 설명주신 8개 카테고리에 푸르넷 추가, 2) '글짓기' 카테고리에 백일장 아이디어 추가\n \n2. 회장님 별도 요 가 따로 있다. > \n\n=====================================================================\n\n[회장님  보고]\n\n싹동 \n- 케이블 간접 조명 주황색 아늑하게\n- 뭐시기 전무 오디오 전문가 ㅇㄹㅇ\n- 벽 전체 우드느낌으로 좀더 따뜻한 톤 ㄱㄱ / KAS 처럼\n- 회장님실 TV 옮기기 > 강연을 하고  음악도 있고\n>>> 회장님 피드백대로 좀 더 구체화(예산 포함)\n>>> 차주 기획안 수급 예정(음악 다방)\n>>> 헤드셋 청음 \n>>> 체어는 기본 위주로\n>>> 학회때만 유명작품을 싹동에 전시하는 방안 고려 > \n\n60주년 기획안 보고\n- AI 룸: 기술 세팅 룸 검토 > 디자인적으로 \n- 책거울: okay\n- 책미로: \n- 비밀의문\n>>>> 회장님 컨펌 완료 추진 확정\n----------------------------- 보고 완료\n- 방판차량 > 차주 공유\n- 굿즈 > 차주 공유\n- 대로변 건물 > 차주 공유 > \n  *삽화를 1~2가지 정도를 받아볼 수 있을까? (아카이브팀?)\n  *전기상황체크\n- 외관 led 간판 비용 > 넘 비싸서 문제 > 다른 방안을 고민ㅇ 예정\n- 외관 철조망: 어떻게 할 건지?\n-----------------------------\n- 결국 싹동이 문제?\n- 차주 화요일에 회장님 미팅 오후 2시\n- 간판 조례를 확인해보기(총무팀장)- 많아야 4군데\n- 명단/삽화\n- 대로변 전기 연결 언제되는지? \n- 회장님: 푸르넷을 강조하고 싶어함(미래로 연결되는 지금 우리 사업이니)\n\n- 푸르넷(전체 품목을 보여주는 느낌으로 책미로 전체에 2권이나 할애 등 강조하기)\n 책 배치를 푸르넷을 향해가는 가도록?\n- 캠핑 태블릿(최첨단 학습지요? 메타버스, ai 간접적)  + 푸르넷이 하이라이트  /  \n  온라인 시스템 규모감을 연출시키고 싶다\n- 공부방을 다니는 누구의 하루 영상을 만들자(코대표), 1분처럼 릴스? 실제 공부방을 촬영하고\n- *월드디닥 영상을 전달해라 / 우리 공부방\n책미로는 좀더 디벨롭하자 >> 오후 박은정 구리점 공부방가서 방문해?\n>>>> 구역을 나눠서 푸르넷을 중앙에 (책 형태는 아니고) 몰빵하고 둘러쌓고 ( 기존 9개에서 4~5개로 나누거나)\n책 미로는 재기획(우주공간?)  >>> 4권정도는 덜어내야 한다\n\nbi 가이드랑 교사 인터뷰 영상도 공유하기 (부천 갔다오기)\n수요일 마포 1시 출발 / 돌아오면 4시에 떨어지기 \n공부방 위치: 부천 \n\n===========================================================================\n[회장님 가심>>> 내용 정리하기]\n책미로 어떻게 덜어낼지 대략적으로 정리해서 주시면 >> 확실하기 \n\n\n\n[전달]\n- 푸르넷 BI 가이드\n- 푸르넷 교사 감동 영상\n- 명단전달(총무팀)\n- 간판 조례 확인(총무팀>이사님) \n- P\n- 무료체험 페이지, 브로슈어 페이지(푸르넷 / 캠핑 자료)\n- 월드 디닥 영상?\n- 대로변 삽화( 어떻게?)\n- 캠핑 관련 내용은 어떻게?\n\n\n======================================================================================\n[250909.화 용수 정리]\n\n1. 자료\n- 전달 완료: 푸르넷 / 캠핑/ 버디(월드디닥) 참고 자료, 퇴사자 명단\n\n2. 외관 리뉴얼\n- LED 간판 \n   · 조례 검토(총무팀): 4~5층 이상 건물에만 가능\n   · 설치 비용 과다 → '예산'안 포함된 재기획 필요\n- 마당 펜스: 설치 미정 → '예산'안 포함된 재기획 필요\n\n3. 싹동\n- '예산'안 포함된 상세 기획 필요\n- 컨셉: 따뜻한 분위기, 음악다방 느낌 (우드톤, 회장님방 TV, 헤드셋 청음, 기본 체어)\n- 기타: 10.18(토)학회 시 작품 전시(KAS 설치 미술품)도 고려\n\n4. 60주년 전시\n- AI룸, 책거울, 비밀의 문: 컨펌 완료 → 제작 추진\n- 책미로: 푸르넷+캠핑 위주로 재기획 (금성의 현재·미래, 온라인 시스템 규모감 반영)\n- 연사 섭외: 섭외 기획안 컨펌 없이 섭외 돌입 / 푸르넷 교사 9/9(화)까지 후보 2인 추천 예정\n- 대로변 건물: 상세 기획 필요, 1층용 삽화 이미지 요청(→아카이브팀?), 전기 수급 검토\n- 방판 차량: 차량 섭외 중\n\n5. 차주 기획 수급\n- 싹동 상세 기획\n- 외관 리뉴얼 재기획\n- 전시: 책미로 / 대로변 건물 / 굿즈 / 방판 차량\n\n6. 기타\n- 영상 아이디어: 공부방 다니는 학생의 하루를 담은 1분 영상 제작 (코대표 제안) → 일정상 불가\n- 현장 일정: 9/10(수) 부천 공부방 방문\n- 차주 미팅: 9/16(화) 오후 2시(회장님 참석)\n- WBS: 금주 GPT 결제 포함되어 있음", "category": "팀서화", "tags": []}, {"id": 40, "filename": "250909(화)_임원회의 후 미팅.txt", "date": "2025-09-09", "title": "화)_임원회의 후 미팅", "content": "1. 유홍준 교수님 정보?\n\n--------------------------------------------------------------------------------------------\n포스터 (삽화는 김윤진 대표가 줄 거다)\nai룸은 기술 이슈 검토되는대로 얘기해달라\n푸르넷 교사 후보 2인\n책의 미로 + 책별 상세 콘텐츠\n방판\n굿즈: 화요일 오후 2시 / 자료는 \n중간 정산\n\n싹동 전부 견적 포함해서 기획해달라 \n의자나 조명이 배치된 시뮬레이션으로 보여달라\n\n60기념 책, 다큐멘터리 영상도 나온는데 이것도 전시에 연계되는 방안 알려달라\n\n---------------------------------------------------------------------------------------------------\n\n1. 10월 16일(목) 지점장 교육 <용수 출근 >\n- 이안 아이티 > 교육지원팀 유경숙 팀장님(?? 일단 홀딩)\n\n\n------------------------------------------------------------------------------------", "category": "임원회의", "tags": []}, {"id": 41, "filename": "250911(목) 팀서화.txt", "date": "2025-09-11", "title": "목) 팀서화", "content": "* 아카이브관 나무 목공 뒤에 소방시설\n철거해야 하는지? 법적으로 필요해서 넣은 건지? 아마 유지는 해야 할 것 같다고(총무팀) \n\n* 이동 가능한 것들\n인포데스크 의자 입구 철제박스, 우물 의자는 이동하면 된다, 2층에?\n우물존은 어떻게 할지 내부적으로 어떻게 처리할지 결정 못함(고정되어있는 상태) > 확인 후 이동가능하면 킾 여부 결정\n\n* 가벽\n철거하는 방향\n\n===============================\n* 공부방 다녀온 얘기\n서화:\n푸르넷 비중을 살짝 키울 수 있는 정도만 가능하다. 보여주고 싶은 만큼 모두 보여주기가 어려울 것 같다. 일정상 지금은 정리를 해야하는 시점\n\n이사: 여기에 푸르넷 공부방 쇼룸 얘기 자주함(싹동 포함), 의중을 최소한이라도 반영해야 하지 않을까?  신세계 부동산 유리창 부분을 최소한으로도 푸르넷 쇼룸처럼 해보면  어떨까? 약간의 썸띵이라도 \n\n서화: \n구체적으로 무슨 사업을 하느냐보다는 금성에 대해 좋은 이미지를 만들고 싶었다. 수입 얘기는 빼야한다. 한 인간이 AI시대에 대안이 될 수 있다는 중점으로 하고 싶다. 쇼룸은 한다고해도 역효과가 날 것 같다. 푸르넷의 <따뜻함> 정도 강조하되, 다음 세대의 준비하고 잇는 것들을 자연스럽게 언급하는 정도. 사업적인 색깔은 반드시 빼야\n\n대중을 타겟으로 하는 전시를 고려하고 있는데 푸르넷이 전시에 집중하게 되면 내부 타겟이 될지 \n\n이사:\n원안대로 9권 구성으로 가되, 푸르넷을 핵심가치를 표현하고 박람회가면 표지들을 벽면에 쭉 붙여놓는다. 푸르넷은 상품군이 많아서 신세계 부동산 안쪽 건물에 디스플레이하는 방은 어떨지? 뭔가 회장님의 가려운 부분을 해소할만한 썸딩이 있어야 하지 않을까?\n\n서화:\n그걸로 노만족, 전시장 센터를 푸르넷으로 하고 7권이 푸르넷 주변으로 둘러싸서 \n중앙에는 푸르넷의 따뜻함 >>> 그리고 다음 전시까지 기약\n\n이사;\n기업 전시가 아니라 멋진 전시를 간다는 니즈가 될지?\n\n서화\n이렇게 하면 좀 줄것 같다. 그래도 보기에는 나쁘지 않다\n\n한국사람 선입견. 어찌되었건 사교육 타이틀이 붙는 순간 푸르넷을 선입견있게 보지 않을까?\n\n이사\nAI 시대에도 가장 중요한 본질은 사람이고 그건 푸르넷이다\n\n서화\n그러면 푸르넷을 광고하고 싶어하는거구나라고 관객들이 느끼지 않을까?\n\n이사\n콘텐츠적으로는 <사랑> 의 느낌\n미로의 느낌도 사라짐\n\n서화\n여튼 관객들은 푸르넷을 광고하려하는 거구나 느끼지 않을까?\n \n대표\n푸르넷이 보이더라도 그렇게 상업적으로 안보이지 않을까?\n희망은 초반처럼 모든 걸 담은  쇼룸이겠지만\n\n서화\n추후에는 푸르넷 쇼룸 전시 가능하다\n일단 60주년은 디저트처럼 푸르넷 광고하되\nAI시대라도 가장 중요한 건  사람이고 교사이고 사랑 이정도 까지만 보여주고\n아예 경루이나 글짓기대회  하고 싶어하시면 그때는 푸르넷 위주로 어떤 걸 할 수 있찌 않을까?\n\n대표\n광고영상은 영상은 어떠세요? 한 달안에 맡겨서 제작한다고 하면?\n\n서화\n너무 좋은 것 같다. 따듯함까지 전달 될 것 같다.\n효과적으로 푸르넷  사업을 소개할 수 있다\n\n대표\n아시아나 광고  영상 소개 \nhttps://youtu.be/xiC-SVlwqsA?si=WYHtsenl-7nvc56P\n광고더라도 공익광고 느낌이 있어서 따뜻함만 강조되서 만들 수있지 않을까.\n한 달안에 제작을 해야 하면 되지 않을까?\n\n서화 이사\n신세계 부동산쪽에 이런 영상을 틀면 좋지 않을까?\n그 비용도 시간도 어마어마 할 것 최소 1억이지 않을까\n\n이사\n푸르넷이 홍보되는 게 있으면 좋겠다는 생각이 크다 다만\n다만 기존안과 결이 다르게 갈 필요가 있을까?\n\n서화\n잘 푸르넷을 다루고 싶은데 잘못 건드렸다가 너무 사익추구처럼 보일까봐\n충분히 고민하고 접근하고 싶다잉 \n따뜻함을 강조하는 제2의 엄마와 + 대박 사업이다 라는 메세지가 동시에 담는 건 좀 넌센스이지 않을까?\n서화가 제일 강조하고 싶은 건 좋은 교육프로그램, 너무 상세한 시스템적인, 수익적인 , 모집인 구체적인 내용은 좀 부담되지 않을까?\n\n*비싼 학원 아니고 집을 공부방으로 바구면 어떨까?\n 우리가 도와줄게, 금성이 해결해줄게,  >>> 그러면 진짜 집에서 엄마한테 받는 교육, 집이라는 이질적인 않은 환경,\n 교육의 질은 위위, 그것이 굉장히 좋은 시스템이다~~~ 이렇게 다루고 싶었다\n\n이사\n\n회장님, 뉴욕 브르클린 따듯한 공부방 쇼룸 > 가정집 느낌으로 원했다\n여튼 책미로로 바뀐다면 \n\n서화\n원생중에 잘된 케이스? > 이사님 없다\n\n대표\n\n서화\n인터뷰는 한계가 있다. 어색하던가 과하다\n누구의 하루 이렇게해서 브이로그처럼 만들면 어떨지? 현장에서 연출이 가능한 부분이 있을지?\n어마어마한 콘티로 메시지.. 이사님: 그게 담길까요?\n\n달느 책들은 모두 빾빽한데 \n푸르넷 책은 심플한 몇 줄만 넣어서 (금성의 고민, 따뜻한 수업) ,큐알코드 하나 넣어서(찍어봤을 때 조금 더 자세한, 따뜻한 정보)\n오히려 푸르넷을 미니멀하게 전시해서 임팩트를 키울 수 있지 않을까?\n이번  전시가 프리퀄 개념이라고 생각한다면 ???????\n\n이사\n회장님은 오랫동안 푸르넷 공간을 보여주고 싶어했다.\n현실적으로 공부방을 다루기가 어렵다.\n어느 정도로 \n\n푸르넷 방향 정리\n1. 1권에 푸르넷을 넣되 가볍게 짧게\n2. 푸르넷 2권에 설명을 \n3. 중앙에 포커싱 되는 방향\n4. \n\n\n이사님\n영상을 한다고 하면 현실적으로 사람이 나오면 시간이 걸린다\n그래픽 효과만 만드는 것 정도만  가능하다 / 10월 연휴가 있어서 2주밖에 안남음\n\n한우리 독서토론 노술 AI와 우리아이에게 물었습니다\n프롬프트, 아이에게 지피티에게 이시대의 교육은 어떻게 썸띵띵 이 정도 영상은 현실적으로 가능할 거 같은데\n이게 만들만한 건가?\n\n이사님\n결국 방향을 잡아주시고, 설득하는 방향으로 해야 하지 않을까?\n좀 더 고민을 해봐야겠다. 할 수 있는 게 한정적이다.\n\n팀서화\n여기서는 이렇게만 가능하지만 > 나중에 가는 \n저희가 생각했을 때 가장 효과적인 안을 얘기하는 게 맞는 것 같다\n\n\n대표\n푸르넷이 빠지는 건 절대 안 될 것 같다.\n어떤 안이 있을 지 좋을 거것 같다.\n\n누구누구의 하루 가벼운 릴스같은 영상을 만든다고 하면\n주변에 영상하는 사람이 있어서 물어볼 수는 있느데\n이게 오피셜한 광고가 아니면 얼마나 걸릴지? 라이트하게 간다면\n계속 쓸거를 생각하지 않고 정말 가볍게?// (용: 근데 그러면 의미가 실려?)\n\n팀서화\n광고를 찍는 다면 성인 연기자를 섭외해서\n건실한 직장인이 자연스럽게 얘기하는 상황(내가 푸르넷 공부방이 있어서 살아남았다`~~)\n좋은 환경은 아니었지만 그 선생님을 만나러 가는 \n\n뭔가 성인이 회상을 해서 무너가를 하는 아주 간략한 릴스\n\n이사\n회장님은 싫어하실 수 있다. 따듯한도 있지만 최첨단, \n너무 저소득층 타겟으로 보이는 것도 조심스러운 포인트가 있다.\n\n팀서화\n너무 어렵다\n저소득 컨셉은 빼고, 질풍노도의 시기에 \n\n대표\n어른이 \n\n팀서화\n몇 가지 푸르넷 안 중에서 설득할만한 포인트를 잡아서 먼저 공유를 드리고\n그 안에서 해결을 봐야 하지 않을까?\n후속에 대한 얘기를 드리면 어떨지? (예를 들어 양옥집을 꾸민다던가)\n\n이사\n책에 미로에 우겨넣으면 회장님은 만족하실 지 모르겠지만 전시가 실패하지 않을까/?\n회장님 미니멀한 거 안좋아한다 / 한번 안 잡아서 공유 주시는 걸로\n\n\n용수 아이디어\n양옥집 커밍 순 홈스윗홈(즐거운 나의 집) 큰 천막으로 가리되 \n(바뀐 미래 지향적인 모습이 그리면 양옥집)\n\n책나무라는 사보에서 우수 공부방 한 꼭지를 아이들이 수업하는 모습 학부모가 그런거 \n학부모 후기 / 책의 미로 동의받고 엄마 애기들 사진ㅊ\n애기들이랑 수업하며 \n\n대표\n1분짜리 이내 영상을 찍으면 제가 그 견적이라던지 그 촬영가능여부를 오늘안에 주겠다.\n이사 가능하다고 하면 그게 반영한 \n\n초3학년의 푸르넷 브이로그 콘티(요청함, 광고 영상 아닌 광고) 마지막엔 휴면터치\n\n이사님\n기본적으로 짧은 영상을 안좋아한다. 이렇게 하고픈 얘기가 많은데\n왜 자꾸 짧게 가느냐~~~~ 그게 기본적으로 있다....\n숏폼에 대한 의문이 회장님이 있을 것 같다. 우리가 그걸 했는데 사람이 많이와? 그러면 이게 통하네? 하겠지이이?\n\n팀서화\n아무리 생각해도 분리를 하고 싶다\n\n대표\n가벼운 영상 콘티를 좀 더 디벨롭하면 \n인간적인 터치가 있는 한두장면 어느정도의 세팅은 필요하다 >> 그래야 메세지도 확실하쥬?\n\n팀서화\n설득안 + 푸르넷 후속 커밍순 내용으로 준비하겠다\n\n대표\n영상\n\n===============================================================\n\n팀서화\n다마스 수배 중 창\n\n=================================================\n\n그 이름들일 돌아가는 형식\n책장 플립으로 후다랃라다 넘어가는 형식 도 꼭 이름을 다 넣을 필요도 없고\n===============================================\n\n담 주: 화 포스터 - 키비쥬얼\n담 주: 금 굿즈, 외관 초안\n================================================\n화요일까지 최소한 되어야 하는 것\n1. 책의 미로: 최소한 어떤 내용\n2. 싹동\n- 내가 보 ===========\n[정리]\n- 책미로 교열(수)\n- 책거울 구역 기획안\n- 60주년 영상 어디다가 세팅할지 > 오늘 오후\n- 방판 차량 차주\n- 연사섭외 오늘 내일 결론내고\n- 신세계 건물 색깔 베리한 거 보고\n- 간판도 최종시뮬레이션 보내주시고\n- 포스터 사이즈 기프트로 줄것도 고민하기", "category": "팀서화", "tags": []}, {"id": 46, "filename": "250923(화) 임원 회의 후 내용 정리.txt", "date": "2025-09-23", "title": "화) 임원 회의 후 내용 정리", "content": "10.16 1세트만 용산에 전시\n\n10.16 수기공모전 시상식 하기로, 1~2등/ 총 5명 초청하기로\n최종 12인이 이렇게 되었는데 5 / 오늘 퇴근전까지 \n교육지원팀이랑 시상식 준비해야지 \n임원회의 결정 사항이 있었습니다.\n\n\nESG 경영 대상은 알아서, 참석하시라 /5명 \n\n60주년 전시 \n\n금성출판사 60주년 기념 \n금성과 함께한 나의 성장 이야기 수기 공모전\n\n\n· 10/2(목) 최재천 교수 오후 / 푸르넷 교사 오전 (10시까지 오라고 하겠다)", "category": "회의", "tags": []}, {"id": 47, "filename": "250924(수) 회의.txt", "date": "2025-09-24", "title": "수) 회의", "content": "10/2 연사 촬영 확정 / 최재천 오후 2-5시,  / 정재승 오후 7-9시\n11/11(토) 푸르넷 선생님 촬영 확정\n\n\n=======================================================================\n[수기 공모전]\n- 최종 인원\n- 선정을 제가 해요?\n\n* PDF 한 파일로 각각 파일명 / \n* 안점준 국장님(정정)\n* 전원 참가상 (3만원)\n* 수상자 품의(합의 사업본부-사연 / 교육지원팀-시상식 일체 교육지원팀 협조)\n품의 명시 낭독 / \n------------------------------------------------------------------------------------------------\n\n\n\n------------------------------------------------------------------------------------------------\n[전시]\n\n\n[섭외]\n- 1) 최재천 400(10/2.목 오후만 가능),\n  푸르넷 선생님은 포항 정선영, KTX 2일 오전이면 좋겠다.\n- 2) 정재승 500(10/2 목 늦은 오후\n\n팀서화가 100은 부담하겠으니, 800 우리가 준비(거마비 품의, 현찰박치기: 필요 정보, 마케팅 활용 동의, 신분증 사본, 당일 현금 지급 )\n도대표랑: 언제로 잡히냐, 공유해줘라 우리도 가야하니, 확정이 되었냐, 필요서류가 있으니 받아달라(마케팅 활용 동의서 전달)\n              푸르넷 선생님: 10/2은 안될 거 같고, 별도로 날짜를 주시거나, 푸르넷 선생님께 이번 주말된다면, 아니면 도대표랑 상의해\n              거마비 30마넌  \n\n===============================================================================================\n\n- 포스트잇 6종, 판촉물로도 팔고 스마트스토어도 팔고, / 개당 1500 / 무신사 2,500원, \n- 최대한 빨리 (본문/ 전시 이벤용 / ㅍ나촉물 스마트 스통/ 적극 적으로 고려)\n\n- 굿즈: 제작처를 알려달라, 최소 수량, 100-150 4종 내부적으로 검토 품의를 받아야 해서 컨펌의 시간이 소요될 것 같다. \n\n================================================================================================\n\n\n[팀서화 도대표 통화 내용]\n- 연사 섭외: 정재승 교수도 10/2(목) 오후 늦게 가능하다고 해서, 그 날로 추진 준비하는 중(다만 촬영팀이 가능한지 그쪽 협의 중), 포항 정선영 선생님은 그날 절대 안되니 다른 날짜 찍어서 회신달라고 했습니다. 필요서류종수는 메일로 주기로 했습니다.\n\n- 굿즈: 6종 중 4종 픽해서 피드백 주면 디벨롭해서 회신하겠다. 종당 제작 수량은 100~150개 고려 하고\n  업체 정보는 최종 추려지면, 추천할 수 있는 업체 정보도 주겠다.\n\n- 간판:\n  10/16 까지 전체동 간판 설치하는 건 일정상 절대 불가하다고 간판 업체측으로부터 회신받아서, 흙, 싹, 뿌리동만이라도 그날까지 가능한지 확인중에 있다. \n  비용은 뿌리동 간판 제작비 팀서화측이 하는데, 설치(전기 끌어오는 등), 그리고 포스터 현수막 등은 협의가 필요하다. (우리는 계약서에 그리 써져 있어서 다 되는 쪽으로 이해하고 있었다고는 얘기하긴 했습니다)\n\n- 기타:\n  ·홍보 전략: 금요일까지 어려울 거 같다. 차주 화요일까지 주겠다\n  ·아카이브 팀장과 미팅을 금요일 오전중으로 (도대표 혼자) 고려하고 있으나, 이것도 준비하면 메일 주겠다고 합니다.\n\n\n-------------------------------------------------------------------------------------------------------------------------------------------------\n\n- 뿌리 전시동: 이사님 계약서상 그렇게 적혀있어서 아마 이사님은 그런걸로 이해하고 계신 것 같다\n**** 오늘 받기로 한거 ()\n- 코대표 영상 콘티 어케 드랍()\n- \n- 홍보전략 용수 하고 있음 (이제 시작, 돈을 태워도 되는지, 안되는지?, 이사님 모를거 같음)\n\n==============================================================================================\n간판\n- 뿌리동 간판 정도 (제작 팀서화) (설치 협의. )\n- 포스터 천막 (비용도 협의) \n- 뿌리/싹/ 흙 >>>(10/16 확인 중)\n- 10/16 \n\n=============================================================================\n\n\n10.18(토) 미술 학회\n- 교육 ?!?! \n- 와인 > 재견적받으면 품의 수정해서 올리겠습니다. \n- 책상 배치는 어떻게 할까요? 여기에 사람이 다 들어가나요?\n- 정상 > 할인가 보이게끔\n- 3안 ) 42명 기준으로 테이블\n- 데코: 효상+우이사+강팀장이 해주기로 \n- 테이블배치까지만 업뎃하기\n         (에디슨 측우기/여수/절)", "category": "회의", "tags": []}, {"id": 48, "filename": "250925(수) 미팅.txt", "date": "2025-09-25", "title": "수) 미팅", "content": "-초상권 동의서, 입금증, 거마비, 신분증 사본 / 걸리는 게 있는 게 \n\n- 푸르넷 영상 촬영(750만원)\n- 수기 품의 올리기\n- \n\n--------------------\n무시하기 / 대로변/ 현수막 - 윤진대표랑 도대표가 통화를 했다. 처리를 한다\n비둘기 알아서 하실 것 같고\n\n사례금 500만원 (세전)\n-교통비 없음\n-입금 \n-회계 담당자 \n-10/2(목)\n최재천 / 선생님\n\n최재천 300+100 \n정승제 500 \n\n100만원은 지들이 지원하겠다고 했는데 무엇?\n푸르넷 \n\n주관/운영처\n\n================================================\n\n대표님 PC는 저도 정확히는 잘모르겠어서 ㅠㅠ\n아마 당시 물건 정리하는 걸 강효임팀장님이 분류해서 진행했다고 하더라구요?\n강팀장님께 확인해보시겠어요?", "category": "미팅", "tags": []}, {"id": 49, "filename": "250926(금) 미팅 내용 정리.txt", "date": "2025-09-26", "title": "금) 미팅 내용 정리", "content": "", "category": "미팅", "tags": []}, {"id": 50, "filename": "250926(금) 코대표, 팀서화 미팅(공덕).txt", "date": "2025-09-26", "title": "금) 코대표, 팀서화 미팅(공덕)", "content": "- 시상식 내용 쓰지마\n- 1등 2명은 초청해서 시상식 진행\n--------------------------------------------------------------------\n1. 책의 미로 내 푸르넷 영상 제작 관련(혜진)\n- 시나리오 디테일하게 받았으면 좋겠고\n- 캐스팅: 후보군 추려서 픽 (3년 초상권 동의: 온오프채널 활용 모두 가능)\n- 분량 2분\n- 이해를  위한 사전 서울지역 \n- 소품 요청\n- 스튜디오 정보는 어떻게?\n- 가편 > 컨펌 > 작업 (2회 편집/컨펌 최종 납품)\n- 일정 잡히면 금성도 같이 동행하겠다.\n- 계약서(비용 지급, 배우 계약 어떻게?0\n\n==========\n2. 팀서화 뿌러뜨릴 내용\n\n- 간판 / 마당 흙\n  · 흙벽: like 혼다: 디자인을 할거면 아무 심플하게 하는 걸 패턴화하든 어딘가 하나에만 하든지\n  · 식물을 스텐박스에 옮기기로 얘기되고 있음. 연결되는 실버나 메탈 컬러로 현수막을 친다면?\n  · 윤진대표 아는 디자이너 >>> 미팅 끝나고 (효상/회장님/윤진대표님 포함 소통)  \n    \n  간판\n  · 뿌리동은 꼭 되었으면 한다\n  · 가능 여부/견적 빨리 알고 싶은데  \n \n \n- 굿즈\n  · 9/26(금) 오늘 제작 셀렉을 하면 > 9/29(월) 최종파일\n  · 엽서: 종이 스펙을 모두 지정을 해주시면 그대로 발주\n  · 키링: 팀서화가 회신 예정\n  · 포토카드: 업체?\n  · 회의 끝나고 회장님 오전 중 선정하여 보고\n \n- 연사(신분증/통장 사본/우리쪽 인원)\n  사무장 10.2(목)  / 익 영업일은 10.10(금)으로 택해달라   \n\n- 푸르넷 선생님 촬영 가이드\n  평소에 아이들을 만날 때 복장과 양식 그대로 \n  촬영 그 모습 정도로    \n  11시까지 오시기로 함 \n\n- 책과 거울의 방 상세 기획\n\n- 마케팅 기획안\n  2일 촬영 후 > 10일에 파일을 넘기고 11일(토)부터 홍보가 들어갈 수 있게끔\n  부분 쇼츠  영상을 만져서 \n  풀 영상은 15일(수) 컨펌\n  9월 30일(화)까지 기획안 받기\n  메인 KCS 인스타그램 > 포스터 메타 광고 태우기(제일 확실하다)\n  플레이스 아카이브? (영향력 있는 데 콘택을 해서  몇번을 때려줘야 계정  팔로우수가 금방 늘어난다)\n  2~3군데 정도 초반에 홍보를 해줘야  한다 (효과적인 것들 위주로 정리를 해보겠다) \n  푸르넷은 미러링 하는 정도로 사용하지 않을까\n  얼마 예산/어느 기간동안 태웠는데 \n\n - KCS 인스타는 아주 큰 \n   젊은 타겟 전시를 할 땐 어떻게 마케팅을 진행했는데\n   광고 디자인 그리드 \n   쇼츠 릴스 주별로 다르게 나가는 방법 등  \n   EX. 전시를 찾아가는 콘텐츠, 본인들이 유튜브하시는데 콘텐츠 찾으시는 분들,  \n         니네 콘텐츠좀 찍을래? >>> 우리 취합명단은 그걸 고려하긴 했었음\n   \n  코대표: <아카이브 라이브러리 개관> 컨셉으로 가야 한다.  뿌리관 컨셉은 안쓸 듯\n  마케팅 8할은 AI에 쏟고 저게 뭐야?, 그런 느낌으로 설렙 등으로 포인트로 >>> 바이럴이 된다는지\n \n- 전시 촬영은 누가 해주실???? 서화가 직접 코대표님께 2분정도 서로 소통해서 정리하기(차주 월요일까지 공유해주기) \n  <화려하고 과장되게!!>\n  10/15(수)에 오후 클린한 상태에서 촬영을 해야 한다\n  팀서화가 아는 업체 전시 전경 잘담는, 사람들을 잘 찍는  사람, 영상을 잘 보이게\n  짧고 자극 적인 영상이 필요하다. \n  이것도 마케팅안과 같이 보내주겠다.\n  코대표 공간감을 잘 찍는 사람이 맞지 않을까?\n  공간감 / \n  일정이 되는  사람 \n  용수생각 : 인물사진말고, 공간사진, 스케치 사진을 잘 찍으면 돈이 되면 \n\n  젊고 힙한 사람들이 \n  사람 있는날 2팀이 었으면 좋겠다.\n   \n  명단도, 작은 이벤트라도, 지인 파티 날을 하나 잡아야 겠구나....  VIP 데이라도  \n  VIP가능하면 토욜이나 19(일) 오후 3~5시 스케치 촬영 (일반 손님을 굳이 막지는 않는 걸로)\n  오시는 분들을 위한 썸딩 프리뷰/ 초대시 빌미 3~5시: 굿즈는 어디에 두나요?\n  그랜드 퍼블릭 오픈은 10.23(목)?!??!?!?!\n \n 굿즈는 현실적으로 카페에 두기+원래 있던 것들도 함게 팔기 \n 카페 흙에 어떻게 세팅할건지?\n창립기념일이 10.19(일) 이다\n* KCS 창립 기념일: 10.23(목) ㅁ\n\n--------------------------------------------------------------------------------------------------------------\n- 운영메뉴얼\n  10월에 정리하는  걸로\n- 리셉션 직원은 HOW? \n\n- 리플릿도 제작이 된다 (차주에 상황 공유하기로)\n  공간 맵정도 만들려면 이쁘게 간단하게 쓰고\n  엽서 형태의 리플렛으로 \n\n- 차량 \n\n- AI 룸(중도금 2차)\n\n- 차주 미팅은?\n회장님 10/2(목) 여행가심\n회장님 미팅 10/1(수) 오후 2시반~3시\n\n----------------------------------------------------------------------------------------------------------\n[회장님 포인트]\n- 현장을 한번 이해를 하고 \n\n\n- 오선희 선생님 영상 편집본 틀고\n- 푸르넷 브랜드 영상 10월 말까지 세팅\n- 가실 거다.~~` 갈 예정이다. 보고드리고 \n- 영상은 아이스쿨보단 이게 더 결이 맞다\n>>>> 이것때문에 이걸 만들엇구나.\n목공  목공 \n- \n- ------------------------------------------------------------------------------------------------------------\n아이들을 가르치는 모습만??\n애들 관리하는 시스\n--------------------------------------------------------------------------------------------------------------\n영상 멘트 20초짜리 모션 영상 >>>>\n가능한한 \n=============================================================\n \n\n- 미디어: 19(일), 23(목)에 오시면 기프트를 드린다.\n   프리뷰데이를 하기로 했다.\n\n VIP 데이는 하루가지고는 안될 것 같다.\n촬영 \n\n\n신용카드 A-2, B-2\n엽서(4종) 6미술 / 3공통수학 /2사회과부도 / 1체육\n포스터: (종이) A-1, 2  믹스된 느낌으로 보고 싶다.\n볼펜을 하면 좋을 것 같다. (색상  2종빨간색/ 검정색)\n=======================================================\n스티커는 빼고 가기로 띠부스티커 재질? 스티커는 기프트로 가기엔 조금 애매하긴 함\n========================================================\n\n벽면 디자인 공간 오너쉽을 코대표님이 가져가셔서 디자인 작업 잡아서 하면 어떨지?\n뿌리동 현수막 주문하는 곳에 하라고 하면 ㄱㄱㄱㄱ\n \n책나무 로고 AI 파일 이메일로 요청\n\n===================================================================================\n\n\n※ 결정된 사항\
