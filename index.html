<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📋 회의록 관리</title>
<style>
:root {
  --bg: #f0f2f5;
  --header-bg: #1a1a2e;
  --accent: #4f46e5;
  --text: #1e1e2e;
  --text-light: #666;
  --border: #e0e0e0;
  --shadow: 0 2px 12px rgba(0,0,0,0.10);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

header {
  background: var(--header-bg);
  color: #fff;
  padding: 0 32px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  gap: 12px;
}
header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; white-space: nowrap; }
header h1 span { color: #a5b4fc; }
.header-actions { display: flex; gap: 8px; align-items: center; }
.btn-new {
  background: #4f46e5; color: #fff; border: none;
  padding: 9px 18px; border-radius: 8px; font-size: 14px;
  font-weight: 600; cursor: pointer; transition: background 0.2s;
  white-space: nowrap;
}
.btn-new:hover { background: #4338ca; }
.btn-settings {
  background: rgba(255,255,255,0.12); color: #fff; border: none;
  padding: 9px 14px; border-radius: 8px; font-size: 16px;
  cursor: pointer; transition: background 0.2s;
}
.btn-settings:hover { background: rgba(255,255,255,0.22); }

.toolbar {
  padding: 16px 32px 10px;
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  background: var(--bg); position: sticky; top: 64px; z-index: 90;
}
.search-box {
  flex: 1; min-width: 200px; padding: 9px 14px;
  border: 1.5px solid var(--border); border-radius: 8px;
  font-size: 14px; background: #fff; outline: none; transition: border 0.2s;
}
.search-box:focus { border-color: var(--accent); }
.filter-select {
  padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 8px;
  font-size: 14px; background: #fff; outline: none; cursor: pointer; color: var(--text);
}
.stats { font-size: 13px; color: var(--text-light); margin-left: auto; white-space: nowrap; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 16px; padding: 14px 32px 40px;
}

.card {
  background: #fffde7; border-radius: 10px; padding: 16px;
  box-shadow: var(--shadow); cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  border-top: 4px solid #fbc02d;
  display: flex; flex-direction: column; gap: 8px; min-height: 150px;
}
.card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
.card[data-cat="임원회의"] { border-top-color: #e53935; background: #fff8f8; }
.card[data-cat="팀서화"]   { border-top-color: #8e24aa; background: #fdf8ff; }
.card[data-cat="KCS"]      { border-top-color: #1e88e5; background: #f0f7ff; }
.card[data-cat="글로우서울"]{ border-top-color: #43a047; background: #f1fff4; }
.card[data-cat="주간회의"] { border-top-color: #fb8c00; background: #fff8f0; }
.card[data-cat="팀장회의"] { border-top-color: #00897b; background: #f0fdfb; }
.card[data-cat="미팅"]     { border-top-color: #5e35b1; background: #f8f4ff; }
.card[data-cat="회의"]     { border-top-color: #546e7a; background: #f5f8fa; }

.card-meta { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
.card-date { font-size: 11px; color: var(--text-light); font-weight: 500; }
.card-cat {
  font-size: 11px; padding: 2px 8px; border-radius: 20px;
  font-weight: 600; background: rgba(0,0,0,0.07); color: var(--text); white-space: nowrap;
}
.card-title { font-size: 14px; font-weight: 700; line-height: 1.4; }
.card-preview {
  font-size: 12px; color: var(--text-light); line-height: 1.6; flex: 1;
  overflow: hidden; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical;
}
.card-actions { display: flex; gap: 6px; justify-content: flex-end; margin-top: 4px; }
.btn-sm {
  font-size: 11px; padding: 4px 10px; border-radius: 6px;
  border: none; cursor: pointer; font-weight: 600; transition: 0.15s;
}
.btn-edit { background: #e8eaf6; color: #3949ab; }
.btn-edit:hover { background: #c5cae9; }
.btn-del  { background: #fce4ec; color: #c62828; }
.btn-del:hover  { background: #ef9a9a; }

.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.45); z-index: 200;
  align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: #fff; border-radius: 16px;
  width: 90%; max-width: 700px; max-height: 92vh;
  overflow-y: auto; padding: 28px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  display: flex; flex-direction: column; gap: 14px;
}
.modal h2 { font-size: 19px; font-weight: 700; }
.form-row { display: flex; gap: 12px; }
.form-group { display: flex; flex-direction: column; gap: 5px; flex: 1; }
.form-group label { font-size: 12px; font-weight: 600; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; }
.form-group input, .form-group select, .form-group textarea {
  padding: 9px 13px; border: 1.5px solid var(--border);
  border-radius: 8px; font-size: 14px; font-family: inherit;
  outline: none; transition: border 0.2s; color: var(--text);
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
.form-group textarea { min-height: 260px; resize: vertical; line-height: 1.7; }
.editor-toolbar {
  display: flex; flex-wrap: wrap; gap: 4px; align-items: center;
  padding: 6px 10px; background: var(--bg); border: 1.5px solid var(--border);
  border-radius: 8px 8px 0 0; border-bottom: none;
}
.editor-toolbar button {
  background: none; border: 1px solid transparent; border-radius: 5px;
  padding: 3px 8px; font-size: 13px; cursor: pointer; color: var(--text);
  font-family: inherit; transition: 0.15s; min-width: 28px;
}
.editor-toolbar button:hover { background: #e8e8f0; border-color: var(--border); }
.editor-toolbar button.active { background: #dde0ff; border-color: var(--accent); color: var(--accent); }
.editor-toolbar select {
  padding: 3px 6px; border: 1px solid var(--border); border-radius: 5px;
  font-size: 13px; font-family: inherit; background: #fff; color: var(--text); cursor: pointer;
}
.editor-toolbar .sep { width: 1px; height: 20px; background: var(--border); margin: 0 2px; }
.editor-toolbar label { font-size: 12px; color: var(--text-light); cursor: pointer; display: flex; align-items: center; gap: 3px; }
.editor-toolbar input[type=color] { width: 24px; height: 24px; border: 1px solid var(--border); border-radius: 4px; padding: 1px; cursor: pointer; }
#fContent {
  min-height: 260px; max-height: 400px; overflow-y: auto;
  padding: 9px 13px; border: 1.5px solid var(--border);
  border-radius: 0 0 8px 8px; font-size: 14px; font-family: inherit;
  outline: none; transition: border 0.2s; color: var(--text);
  line-height: 1.7; white-space: pre-wrap; word-break: break-word;
}
#fContent:focus { border-color: var(--accent); }
#fContent:empty:before { content: attr(data-placeholder); color: #aaa; pointer-events: none; }
.modal-actions { display: flex; gap: 10px; justify-content: space-between; align-items: center; }
.autosave-msg { font-size: 12px; color: #43a047; font-weight: 600; opacity: 0; transition: opacity 0.4s; }
.autosave-msg.show { opacity: 1; }
.btn-cancel { background: #f5f5f5; color: var(--text); border: none; padding: 9px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
.btn-primary { background: var(--accent); color: #fff; border: none; padding: 9px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
.btn-primary:hover { background: #4338ca; }

.detail-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.detail-header-left .d-meta { font-size: 12px; color: #888; margin-bottom: 4px; }
.detail-header-left .d-title { font-size: 20px; font-weight: 700; }
.detail-header-right { display: flex; gap: 6px; flex-shrink: 0; }
.detail-content {
  white-space: pre-wrap; font-size: 14px; line-height: 1.8;
  color: var(--text); background: var(--bg); padding: 16px;
  border-radius: 8px; max-height: 55vh; overflow-y: auto;
  border: 1px solid var(--border);
  font-family: 'Malgun Gothic', 'Noto Sans KR', monospace;
}

/* AI Summary */
.ai-summary {
  margin-top: 16px;
  padding: 16px;
  background: #f0f7ff;
  border-left: 4px solid #4f46e5;
  border-radius: 8px;
  display: none;
}
.ai-summary.show { display: block; }
.ai-summary-header {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 600;
  color: #4f46e5;
  margin-bottom: 8px;
}
.ai-summary-content {
  font-size: 14px;
  line-height: 1.7;
  color: var(--text);
}

.settings-modal { max-width: 480px; }
.section-title { font-size: 13px; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.cat-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.cat-item {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg); border-radius: 8px; padding: 8px 12px;
}
.cat-item span { flex: 1; font-size: 14px; font-weight: 500; }
.cat-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.btn-cat-del {
  background: none; border: none; color: #ccc; cursor: pointer; font-size: 16px;
  padding: 2px 4px; border-radius: 4px; transition: 0.15s; line-height: 1;
}
.btn-cat-del:hover { color: #e53935; background: #fce4ec; }
.cat-add-row { display: flex; gap: 8px; }
.cat-add-row input {
  flex: 1; padding: 8px 12px; border: 1.5px solid var(--border);
  border-radius: 8px; font-size: 14px; font-family: inherit; outline: none;
}
.cat-add-row input:focus { border-color: var(--accent); }
.btn-add-cat {
  background: var(--accent); color: #fff; border: none; padding: 8px 16px;
  border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
  white-space: nowrap;
}
.divider { border: none; border-top: 1px solid var(--border); margin: 4px 0; }

.api-section input {
  width: 100%; padding: 9px 13px; border: 1.5px solid var(--border);
  border-radius: 8px; font-size: 13px; font-family: monospace; outline: none;
}
.api-section input:focus { border-color: var(--accent); }
.api-hint { font-size: 11px; color: #888; margin-top: 4px; }
.api-hint a { color: var(--accent); }

.no-results { grid-column: 1/-1; text-align: center; padding: 60px; color: var(--text-light); font-size: 15px; }

@media (max-width: 600px) {
  .grid { grid-template-columns: 1fr; padding: 10px 14px 32px; }
  .toolbar { padding: 12px 14px 8px; }
  header { padding: 0 14px; }
  .form-row { flex-direction: column; }
  .modal { padding: 20px; }
}
</style>
</head>
<body>

<header>
  <h1>📋 회의록 <span>관리</span></h1>
  <div class="header-actions">
    <button class="btn-settings" onclick="openSettings()" title="설정">⚙️</button>
    <button class="btn-new" onclick="openNew()">＋ 새 회의록</button>
  </div>
</header>

<div class="toolbar">
  <input class="search-box" type="text" id="searchInput" placeholder="🔍 제목, 내용으로 검색..." oninput="renderCards()">
  <select class="filter-select" id="catFilter" onchange="renderCards()">
    <option value="">전체 분류</option>
  </select>
  <select class="filter-select" id="sortOpt" onchange="renderCards()">
    <option value="date-desc">최신순</option>
    <option value="date-asc">오래된순</option>
    <option value="title">제목순</option>
  </select>
  <span class="stats" id="statsText"></span>
</div>

<div class="grid" id="cardGrid"></div>

<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h2 id="modalTitle">✍️ 새 회의록</h2>
    <div class="form-row">
      <div class="form-group">
        <label>날짜</label>
        <input type="date" id="fDate" oninput="triggerAutoSave()">
      </div>
      <div class="form-group">
        <label>분류</label>
        <select id="fCat" onchange="triggerAutoSave()"></select>
      </div>
    </div>
    <div class="form-group">
      <label>제목</label>
      <input type="text" id="fTitle" placeholder="회의 제목을 입력하세요" oninput="triggerAutoSave()">
    </div>
    <div class="form-group">
      <label>상세 내용</label>
      <div class="editor-toolbar">
        <select id="fFontSize" onchange="applyFontSize(this.value)" title="폰트 크기">
          <option value="">크기</option>
          <option value="1">매우 작게</option>
          <option value="2">작게</option>
          <option value="3">보통</option>
          <option value="4">크게</option>
          <option value="5">매우 크게</option>
          <option value="6">더 크게</option>
          <option value="7">최대</option>
        </select>
        <div class="sep"></div>
        <button onclick="fmt('bold')" title="굵게 (Ctrl+B)"><b>B</b></button>
        <button onclick="fmt('italic')" title="기울임 (Ctrl+I)"><i>I</i></button>
        <button onclick="fmt('underline')" title="밑줄 (Ctrl+U)"><u>U</u></button>
        <button onclick="fmt('strikeThrough')" title="취소선"><s>S</s></button>
        <div class="sep"></div>
        <label title="글자 색상">
          A <input type="color" id="fFontColor" value="#000000" onchange="applyFontColor(this.value)">
        </label>
        <label title="글자 배경색">
          <span style="background:#ffeb3b;padding:0 3px;border-radius:2px">A</span>
          <input type="color" id="fBgColor" value="#ffeb3b" onchange="applyBgColor(this.value)">
        </label>
        <div class="sep"></div>
        <button onclick="fmt('removeFormat')" title="서식 초기화">✕</button>
      </div>
      <div id="fContent"
        contenteditable="true"
        data-placeholder="회의 내용을 자유롭게 작성하세요...&#10;&#10;예) 주요 안건, 결정 사항, 액션 아이템 등"
        oninput="triggerAutoSave()"></div>
    </div>
    <div class="modal-actions">
      <span class="autosave-msg" id="autosaveMsg">✓ 자동 저장됨</span>
      <div style="display:flex;gap:10px">
        <button class="btn-cancel" onclick="closeModal('editModal')">닫기</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="detail-header">
      <div class="detail-header-left">
        <div class="d-meta" id="dMeta"></div>
        <div class="d-title" id="dTitle"></div>
      </div>
      <div class="detail-header-right">
        <button class="btn-sm btn-edit" onclick="editFromDetail()">✏️ 편집</button>
        <button class="btn-sm btn-del" onclick="closeModal('detailModal')">✕</button>
      </div>
    </div>
    <div class="detail-content" id="dContent"></div>
    <div class="ai-summary" id="aiSummary">
      <div class="ai-summary-header">
        <span>🤖</span>
        <span>AI 요약</span>
      </div>
      <div class="ai-summary-content" id="aiSummaryContent"></div>
    </div>
    <div style="margin-top: 16px; text-align: right;">
      <button class="btn-primary" onclick="summarizeContent()" id="btnSummarize">🤖 AI 요약 생성</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="settingsModal">
  <div class="modal settings-modal">
    <h2>⚙️ 설정</h2>

    <div>
      <div class="section-title">📂 분류 관리</div>
      <div class="cat-list" id="catListEl"></div>
      <div class="cat-add-row">
        <input type="text" id="newCatInput" placeholder="새 분류 이름..." onkeydown="if(event.key==='Enter')addCategory()">
        <button class="btn-add-cat" onclick="addCategory()">＋ 추가</button>
      </div>
    </div>

    <hr class="divider">

    <div class="api-section">
      <div class="section-title">🤖 Gemini AI</div>
      <p style="font-size:13px;color:#666;margin-bottom:8px">API 키를 입력하면 회의록 요약 기능이 활성화됩니다.</p>
      <input type="password" id="geminiKeyInput" placeholder="AIza...">
      <p class="api-hint">
        무료 키 발급: <a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI Studio</a>
        → "Get API key" 클릭
      </p>
    </div>

    <hr class="divider">

    <div class="api-section">
      <div class="section-title">☁️ 클라우드 동기화 상태</div>
      <p id="cloudStatusMsg" style="font-size:13px;font-weight:600"></p>
      <p style="font-size:12px;color:#888;margin-top:4px">15초마다 자동 동기화됩니다.</p>
    </div>

    <div class="modal-actions">
      <span></span>
      <div style="display:flex;gap:8px">
        <button class="btn-cancel" onclick="closeModal('settingsModal')">닫기</button>
        <button class="btn-primary" onclick="saveSettings()">저장</button>
      </div>
    </div>
  </div>
</div>

<script>
const DEFAULT_CATS = ['임원회의','팀서화','KCS','글로우서울','주간회의','팀장회의','미팅','회의','기타'];
const CAT_COLORS = {
  '임원회의':'#e53935','팀서화':'#8e24aa','KCS':'#1e88e5',
  '글로우서울':'#43a047','주간회의':'#fb8c00','팀장회의':'#00897b',
  '미팅':'#5e35b1','회의':'#546e7a','기타':'#fbc02d'
};

function getSetting(k, def) { try { return JSON.parse(localStorage.getItem(k)) ?? def; } catch { return def; } }
function setSetting(k, v) { localStorage.setItem(k, JSON.stringify(v)); }

function getCategories() { return getSetting('cats', DEFAULT_CATS); }
function getLocalMeetings() { return getSetting('meetings_custom', []); }
function saveLocalMeetings(arr) { 
  setSetting('meetings_custom', arr); 
  pushToFirebase(arr, { categories: getCategories() }); // ✅ 수정: 카테고리도 함께 저장
}
function getGeminiKey() { return localStorage.getItem('gemini_key') || ''; }

const FIREBASE_URL = 'https://meeting-notes-cd43f-default-rtdb.asia-southeast1.firebasedatabase.app/';
function getUrlSecret() { return location.hash.slice(1).trim(); }
function getFirebasePath() {
  const s = getUrlSecret();
  return s ? `${FIREBASE_URL}${s}.json` : null; // ✅ 수정: /meetings 제거
}

// ✅ 수정: settings 파라미터 추가
async function fetchFromFirebase() {
  const url = getFirebasePath();
  if (!url) return;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('fetch failed');
    const data = await res.json();
    
    if (data?.meetings && Array.isArray(data.meetings)) {
      setSetting('meetings_custom', data.meetings);
    }
    if (data?.settings?.categories && Array.isArray(data.settings.categories)) {
      setSetting('cats', data.settings.categories);
    }
  } catch(e) { console.warn('Firebase 불러오기 실패, 로컬 데이터 사용:', e); }
}

// ✅ 수정: settings 파라미터 추가
async function pushToFirebase(arr, settings = null) {
  const url = getFirebasePath();
  if (!url) return;
  try {
    const payload = { meetings: arr };
    if (settings) payload.settings = settings;
    
    await fetch(url, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
  } catch(e) { console.warn('Firebase 저장 실패:', e); }
}

function getAllMeetings() {
  const local = getLocalMeetings();
  const localMap = {};
  local.forEach(m => { localMap[m.id] = m; });
  const result = [];
  PRELOADED.forEach(m => {
    if (localMap[m.id]) { if (!localMap[m.id]._deleted) result.push(localMap[m.id]); }
    else result.push(m);
  });
  local.forEach(m => {
    if (!m._deleted && !PRELOADED.find(p => p.id === m.id)) result.push(m);
  });
  return result;
}

function findMeeting(id) {
  const local = getLocalMeetings().find(m => m.id === id);
  if (local && !local._deleted) return local;
  return PRELOADED.find(m => m.id === id);
}

const COLOR_POOL = ['#d32f2f','#7b1fa2','#1565c0','#2e7d32','#e65100','#00695c','#4527a0','#37474f','#f9a825','#ad1457'];
function getCatColor(cat) {
  if (CAT_COLORS[cat]) return CAT_COLORS[cat];
  const cats = getCategories();
  return COLOR_POOL[cats.indexOf(cat) % COLOR_POOL.length] || '#888';
}

function populateCatSelects() {
  const cats = getCategories();
  const filterEl = document.getElementById('catFilter');
  const fCatEl = document.getElementById('fCat');
  const savedVal = fCatEl.value;
  filterEl.innerHTML = '<option value="">전체 분류</option>' + cats.map(c => `<option>${c}</option>`).join('');
  fCatEl.innerHTML = cats.map(c => `<option>${c}</option>`).join('');
  if (cats.includes(savedVal)) fCatEl.value = savedVal;
}

function renderCards() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const cat = document.getElementById('catFilter').value;
  const sort = document.getElementById('sortOpt').value;
  let data = getAllMeetings();

  if (q) data = data.filter(m =>
    m.title.toLowerCase().includes(q) ||
    (m.content || '').toLowerCase().includes(q) ||
    (m.category || '').toLowerCase().includes(q)
  );
  if (cat) data = data.filter(m => m.category === cat);

  if (sort === 'date-asc') data.sort((a,b) => a.date.localeCompare(b.date));
  else if (sort === 'title') data.sort((a,b) => a.title.localeCompare(b.title));
  else data.sort((a,b) => b.date.localeCompare(a.date));

  document.getElementById('statsText').textContent = `총 ${data.length}건`;
  const grid = document.getElementById('cardGrid');

  if (!data.length) {
    grid.innerHTML = '<div class="no-results">검색 결과가 없어요 😅</div>';
    return;
  }

  grid.innerHTML = data.map(m => {
    const preview = (m.content || '').replace(/\n+/g, ' ').slice(0, 150);
    const cat = m.category || '기타';
    const color = getCatColor(cat);
    return `<div class="card" data-cat="${esc(cat)}" style="border-top-color:${color}" onclick="openDetail(${m.id})">
      <div class="card-meta">
        <span class="card-date">📅 ${m.date}</span>
        <span class="card-cat" style="background:${color}22;color:${color}">${esc(cat)}</span>
      </div>
      <div class="card-title">${esc(m.title)}</div>
      <div class="card-preview">${esc(preview)}</div>
      <div class="card-actions">
        <button class="btn-sm btn-edit" onclick="event.stopPropagation();openEdit(${m.id})">✏️ 편집</button>
        <button class="btn-sm btn-del" onclick="event.stopPropagation();deleteCard(${m.id})">🗑</button>
      </div>
    </div>`;
  }).join('');
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let detailId = null;

let editingId = null;
let autoSaveTimer = null;

function triggerAutoSave() {
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => {
    performSave(true);
  }, 1200);
}

function performSave(isAuto = false) {
  const date = document.getElementById('fDate').value || new Date().toISOString().slice(0,10);
  const title = document.getElementById('fTitle').value.trim();
  const content = document.getElementById('fContent').innerHTML.trim();
  const cat = document.getElementById('fCat').value;

  if (!title && !content) return;

  const locals = getLocalMeetings();

  if (editingId !== null) {
    const idx = locals.findIndex(m => m.id === editingId);
    if (idx >= 0) {
      locals[idx] = { ...locals[idx], date, title, content, category: cat };
    } else {
      const orig = PRELOADED.find(m => m.id === editingId) || {};
      locals.push({ ...orig, date, title, content, category: cat });
    }
  } else {
    if (!window._newCardId) window._newCardId = Date.now();
    const existIdx = locals.findIndex(m => m.id === window._newCardId);
    if (existIdx >= 0) {
      locals[existIdx] = { ...locals[existIdx], date, title, content, category: cat };
    } else {
      locals.push({ id: window._newCardId, date, title, content, category: cat, tags: [], filename: '' });
    }
    editingId = window._newCardId;
  }

  saveLocalMeetings(locals);
  renderCards();

  if (isAuto) {
    const msg = document.getElementById('autosaveMsg');
    msg.classList.add('show');
    setTimeout(() => msg.classList.remove('show'), 2000);
  }
}

  document.getElementById('fTitle').value = '';
  document.getElementById('fContent').innerHTML = '';
  populateCatSelects();
  const cats = getCategories();
  document.getElementById('fCat').value = cats[0] || '기타';
  clearTimeout(autoSaveTimer);
  openModal('editModal');
}

function openEdit(id) {
  const m = findMeeting(id);
  if (!m) return;
  editingId = id;
  window._newCardId = null;
  document.getElementById('modalTitle').textContent = '✏️ 회의록 편집';
  document.getElementById('fDate').value = m.date;
  document.getElementById('fTitle').value = m.title;
  document.getElementById('fContent').innerHTML = m.content || '';
  populateCatSelects();
  const cats = getCategories();
  document.getElementById('fCat').value = cats.includes(m.category) ? m.category : (cats[0] || '기타');
  clearTimeout(autoSaveTimer);
  openModal('editModal');
}

function deleteCard(id) {
  if (!confirm('이 회의록을 삭제할까요?')) return;
  const locals = getLocalMeetings();
  const idx = locals.findIndex(m => m.id === id);
  if (idx >= 0) { locals.splice(idx, 1); }
  else { locals.push({ id, _deleted: true }); }
  saveLocalMeetings(locals);
  renderCards();
}

function openSettings() {
  renderCatList();
  document.getElementById('geminiKeyInput').value = getGeminiKey();
  const secret = getUrlSecret();
  const statusEl = document.getElementById('cloudStatusMsg');
  if (secret) {
    statusEl.style.color = '#43a047';
    statusEl.textContent = `● 연결됨 (키: ${secret.slice(0,4)}••••${secret.slice(-4)})`;
  } else {
    statusEl.style.color = '#e53935';
    statusEl.textContent = '● URL에 비밀키 없음 - 동기화 비활성';
  }
  openModal('settingsModal');
}

function renderCatList() {
  const cats = getCategories();
  document.getElementById('catListEl').innerHTML = cats.map((c, i) => {
    const color = getCatColor(c);
    return `<div class="cat-item">
      <span class="cat-dot" style="background:${color}"></span>
      <span>${esc(c)}</span>
      <button class="btn-cat-del" onclick="removeCategory(${i})" title="삭제">×</button>
    </div>`;
  }).join('');
}

// ✅ 수정: 카테고리 추가 시 Firebase 동기화
function addCategory() {
  const input = document.getElementById('newCatInput');
  const name = input.value.trim();
  if (!name) return;
  const cats = getCategories();
  if (cats.includes(name)) { alert('이미 있는 분류예요!'); return; }
  cats.push(name);
  setSetting('cats', cats);
  pushToFirebase(getLocalMeetings(), { categories: cats }); // ✅ 추가
  input.value = '';
  renderCatList();
  populateCatSelects();
}

// ✅ 수정: 카테고리 삭제 시 Firebase 동기화
function removeCategory(idx) {
  const cats = getCategories();
  if (cats.length <= 1) { alert('분류는 최소 1개 필요해요!'); return; }
  cats.splice(idx, 1);
  setSetting('cats', cats);
  pushToFirebase(getLocalMeetings(), { categories: cats }); // ✅ 추가
  renderCatList();
  populateCatSelects();
  renderCards();
}

function saveSettings() {
  const key = document.getElementById('geminiKeyInput').value.trim();
  localStorage.setItem('gemini_key', key);
  closeModal('settingsModal');
  populateCatSelects();
  renderCards();
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', function(e) {
    if (e.target === this) {
      if (this.id === 'editModal') performSave(false);
      this.classList.remove('open');
    }
  });
});

populateCatSelects();
if (!getUrlSecret()) {
  alert('⚠️ URL에 비밀키(#...) 가 없습니다.\n\n정확한 주소를 북마크에서 열어주세요.\n(예: ...meeting-notes/#k7m4p9nj3xt2qr8f)');
  renderCards();
} else {
  fetchFromFirebase().then(() => renderCards());
  setInterval(() => {
    if (!document.getElementById('editModal').classList.contains('open')) {
      fetchFromFirebase().then(() => renderCards());
    }
  }, 15000);
}
</script>
</body>
</html>
